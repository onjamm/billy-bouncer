        // ------------------------------------------------------------
        // World generation
        // ------------------------------------------------------------
        seedWorld() {
          const startPlatform = this.createPlatform(GAME_W / 2, START_PLATFORM_Y, "normal", PLATFORM_W + 30, true);
          this.platforms.push(startPlatform);
          this.topSpawnY = START_PLATFORM_Y;
          this.lastSpawnPlatform = startPlatform;
          this.lastPlatformX = startPlatform.x;
          while (this.topSpawnY > -GAME_H) {
            this.spawnPlatformRow();
          }
        }

        getAltitudeBand(altitude) {
          return PLATFORM_TABLE.find((entry) => altitude < entry.ceiling) || PLATFORM_TABLE[PLATFORM_TABLE.length - 1];
        }

        getEnemyWeights(altitude) {
          return altitude < 3500 ? ENEMY_WEIGHTS_LOW : ENEMY_WEIGHTS_HIGH;
        }

        getEnemyScreenCap(altitude) {
          if (altitude < 2200) {
            return 2;
          }
          if (altitude < 4500) {
            return 3;
          }
          return 4;
        }

        choosePlatformEnemyX(platform, enemyWidth) {
          const usableHalf = Math.max(16, platform.w / 2 - enemyWidth / 2 - 8);
          const laneHalf = PLATFORM_LANDING_STRIP / 2 + enemyWidth / 2;
          if (usableHalf <= laneHalf) {
            return null;
          }
          const edgeMin = laneHalf + 4;
          const edgeMax = usableHalf;
          const side = Math.random() > 0.5 ? 1 : -1;
          return wrapPlayableX(platform.x + side * Phaser.Math.Between(Math.round(edgeMin), Math.round(edgeMax)));
        }

        chooseAirEnemyX(platform, enemyWidth) {
          for (let attempt = 0; attempt < 8; attempt += 1) {
            const candidate = Phaser.Math.Between(40, GAME_W - 40);
            const laneDistance = Math.abs(shortestWrappedDelta(platform.x, candidate));
            if (laneDistance >= ENEMY_SAFE_LANE_WIDTH / 2 + enemyWidth / 2) {
              return candidate;
            }
          }
          return null;
        }

        canSpawnEnemyCandidate(enemy, platform, altitude) {
          const aliveEnemies = this.enemies.filter((other) => !other.dead);
          if (aliveEnemies.length >= this.getEnemyScreenCap(altitude)) {
            return false;
          }

          const laneDistance = Math.abs(shortestWrappedDelta(platform.x, enemy.x));
          const requiredLane = enemy.platformId ? PLATFORM_LANDING_STRIP / 2 + enemy.w / 2 : ENEMY_SAFE_LANE_WIDTH / 2 + enemy.w / 2;
          if (laneDistance < requiredLane) {
            return false;
          }

          let sameBandCount = 0;
          for (const other of aliveEnemies) {
            const verticalDistance = Math.abs(other.y - enemy.y);
            if (verticalDistance > ENEMY_BAND_SPACING) {
              continue;
            }
            sameBandCount += 1;
            if (Math.abs(shortestWrappedDelta(other.x, enemy.x)) < (other.w + enemy.w) / 2 + ENEMY_SAME_BAND_X_SPACING) {
              return false;
            }
          }

          if (sameBandCount >= 1) {
            return false;
          }

          return true;
        }

        getSpawnAnchor() {
          if (this.lastSpawnPlatform) {
            return this.lastSpawnPlatform;
          }
          if (this.platforms.length === 0) {
            return null;
          }
          return this.platforms.reduce((best, platform) => (!best || platform.y < best.y ? platform : best), null);
        }

        getSafeGapCap(altitude) {
          const gentleCap = altitude < SAFE_OPENING_ALTITUDE ? 118 : SAFE_VERTICAL_GAP_CAP;
          return clamp(gentleCap, 96, SAFE_VERTICAL_GAP_CAP);
        }

        getReachableCenterDelta(anchor, nextWidth, verticalGap, altitude) {
          const flightTime = jumpFlightTimeForGap(JUMP_VELOCITY, verticalGap);
          const horizontalTravel = PLAYER_SPEED * flightTime;
          const widthAssist = anchor.w * 0.5 + nextWidth * 0.5 - SAFE_JUMP_HORIZONTAL_MARGIN;
          const totalReach = Math.max(MIN_SPAWN_X_OFFSET, horizontalTravel + widthAssist);
          const challengeRatio = map(altitude, 0, 7000, EARLY_X_CHALLENGE, LATE_X_CHALLENGE);
          return Math.max(MIN_SPAWN_X_OFFSET, totalReach * challengeRatio);
        }

        chooseReachablePlatformX(anchor, nextWidth, verticalGap, altitude) {
          const maxOffset = this.getReachableCenterDelta(anchor, nextWidth, verticalGap, altitude);
          const minOffset = Math.min(MIN_SPAWN_X_OFFSET, maxOffset);
          let bestX = clamp(anchor.x, PLAYFIELD_MIN_X, PLAYFIELD_MAX_X);
          let bestDistance = 0;

          for (let attempt = 0; attempt < 8; attempt += 1) {
            const offsetMagnitude = Phaser.Math.Between(Math.round(minOffset), Math.round(maxOffset));
            const offset = offsetMagnitude * (Math.random() > 0.5 ? 1 : -1);
            const candidate = wrapPlayableX(anchor.x + offset);
            const wrappedDistance = Math.abs(shortestWrappedDelta(anchor.x, candidate));
            if (wrappedDistance <= maxOffset + 1) {
              return candidate;
            }
            if (wrappedDistance > bestDistance) {
              bestDistance = wrappedDistance;
              bestX = candidate;
            }
          }

          return bestX;
        }

        spawnPlatformRow() {
          const anchor = this.getSpawnAnchor() || { x: GAME_W / 2, y: START_PLATFORM_Y, w: PLATFORM_W + 30 };
          const altitude = Math.max(0, START_Y - anchor.y);
          const band = this.getAltitudeBand(altitude);
          const gapCap = Math.min(band.gapMax, this.getSafeGapCap(altitude));
          const gap = Phaser.Math.Between(band.gapMin, gapCap);
          const nextY = anchor.y - gap;

          const type = altitude < SAFE_OPENING_ALTITUDE
            ? (Math.random() < 0.85 ? "normal" : "movingH")
            : chooseWeighted(band.weights);
          const width = PLATFORM_W + Phaser.Math.Between(-10, 18);
          const x = this.chooseReachablePlatformX(anchor, width, gap, altitude);
          const platform = this.createPlatform(x, nextY, type, width, false);
          this.topSpawnY = nextY;
          this.lastPlatformX = x;
          this.lastSpawnPlatform = platform;

          if (type === "normal" && Math.random() < band.springChance) {
            platform.spring = {
              xOffset: Phaser.Math.Between(-22, 22)
            };
          }

          this.platforms.push(platform);
          this.maybeSpawnCollectible(platform, altitude);
          this.maybeSpawnPowerup(platform, altitude);
          this.maybeSpawnEnemy(platform, altitude);
          this.maybeSpawnBlackHole(platform, altitude);
        }

        createPlatform(x, y, type, width, safe) {
          const platform = {
            id: this.idCounter++,
            x,
            y,
            baseX: x,
            baseY: y,
            w: width,
            h: PLATFORM_H,
            type,
            noise: noisyBox(x, y, width, PLATFORM_H, 2),
            grainOffsets: [Phaser.Math.Between(-5, -1), Phaser.Math.Between(1, 5), Phaser.Math.Between(6, 10)],
            nails: [Phaser.Math.Between(-34, -22), Phaser.Math.Between(20, 34)],
            dir: Math.random() > 0.5 ? 1 : -1,
            speed: PLATFORM_MOVING_SPEED,
            phase: Math.random() * Math.PI * 2,
            visible: true,
            active: true,
            safe,
            spring: null,
            hiddenUntil: 0,
            breakAt: 0,
            falling: false,
            fallSpeed: 0,
            explodeAt: 0,
            exploded: false,
            shakeUntil: 0
          };
          return platform;
        }

        maybeSpawnCollectible(platform, altitude) {
          if (platform.safe || Math.random() > 0.42) {
            return;
          }
          const type = Math.random() < 0.8 ? "gold" : "silver";
          this.collectibles.push({
            id: this.idCounter++,
            type,
            value: type === "gold" ? 10 : 50,
            x: platform.x + Phaser.Math.Between(-34, 34),
            y: platform.y - Phaser.Math.Between(28, 40),
            baseY: platform.y - Phaser.Math.Between(28, 40),
            bobPhase: Math.random() * Math.PI * 2,
            w: type === "gold" ? 14 : 18,
            h: type === "gold" ? 14 : 18
          });
        }

        maybeSpawnPowerup(platform, altitude) {
          if (platform.safe || Math.random() > map(altitude, 0, 7000, 0.08, 0.13)) {
            return;
          }
          const type = chooseWeighted(POWERUP_WEIGHTS);
          this.pickups.push({
            id: this.idCounter++,
            type,
            x: platform.x + Phaser.Math.Between(-28, 28),
            y: platform.y - Phaser.Math.Between(36, 52),
            baseY: platform.y - Phaser.Math.Between(36, 52),
            bobPhase: Math.random() * Math.PI * 2,
            radius: PICKUP_RADIUS
          });
        }

        maybeSpawnEnemy(platform, altitude) {
          if (platform.safe || altitude < SAFE_ENEMY_START_ALTITUDE || this.playerState.repellentUntil > this.time.now || Math.random() > map(altitude, 0, 7000, 0.08, 0.18)) {
            return;
          }

          const type = chooseWeighted(this.getEnemyWeights(altitude));
          const enemy = {
            id: this.idCounter++,
            type,
            dead: false,
            damaged: false,
            hitFlashUntil: 0,
            platformId: null,
            baseY: platform.y,
            bobPhase: Math.random() * Math.PI * 2,
            beamCharge: 0,
            beamActive: false,
            dir: Math.random() > 0.5 ? 1 : -1,
            stepDistance: 0,
            stepIndex: 0
          };

          if (type === "snake") {
            const spawnX = this.choosePlatformEnemyX(platform, SNAKE_W);
            if (spawnX === null) {
              return;
            }
            enemy.x = spawnX;
            enemy.y = platform.y - 18;
            enemy.w = SNAKE_W;
            enemy.h = SNAKE_H;
            enemy.hp = 1;
            enemy.platformId = platform.id;
          } else if (type === "heavy") {
            const spawnX = this.choosePlatformEnemyX(platform, HEAVY_W);
            if (spawnX === null) {
              return;
            }
            enemy.x = spawnX;
            enemy.y = platform.y - 26;
            enemy.w = HEAVY_W;
            enemy.h = HEAVY_H;
            enemy.hp = 2;
            enemy.platformId = platform.id;
          } else if (type === "vulture") {
            const spawnX = this.chooseAirEnemyX(platform, VULTURE_W);
            if (spawnX === null) {
              return;
            }
            enemy.x = spawnX;
            enemy.y = platform.y - Phaser.Math.Between(56, 90);
            enemy.w = VULTURE_W;
            enemy.h = VULTURE_H;
            enemy.hp = 1;
          } else {
            const spawnX = this.chooseAirEnemyX(platform, UFO_W);
            if (spawnX === null) {
              return;
            }
            enemy.x = spawnX;
            enemy.y = platform.y - Phaser.Math.Between(64, 112);
            enemy.w = UFO_W;
            enemy.h = UFO_H;
            enemy.hp = 1;
          }

          if (!this.canSpawnEnemyCandidate(enemy, platform, altitude)) {
            return;
          }

          this.enemies.push(enemy);
        }

        maybeSpawnBlackHole(platform, altitude) {
          if (altitude < SAFE_BLACK_HOLE_START_ALTITUDE || Math.random() > map(altitude, SAFE_BLACK_HOLE_START_ALTITUDE, 7000, 0.05, 0.1)) {
            return;
          }
          const x = Phaser.Math.Between(70, GAME_W - 70);
          const y = platform.y - Phaser.Math.Between(86, 138);
          if (this.blackHoles.some((hole) => distance(hole.x, hole.y, x, y) < 240)) {
            return;
          }
          this.blackHoles.push({
            id: this.idCounter++,
            x,
            y,
            angle: Math.random() * Math.PI * 2,
            radius: 20
          });
        }

        // ------------------------------------------------------------
        // Update loop
        // ------------------------------------------------------------
        update(time, delta) {
          const dt = delta / 1000;
          const altitude = Math.max(0, START_Y - this.highestY);

          this.updatePlayerControl(time);
          this.updateCamera();
          this.updatePlatforms(time, dt);
          this.updatePickupsAndCollectibles(time);
          this.updateEnemies(time, dt);
          this.updateBlackHoles(dt);
          this.updatePellets(dt);
          this.checkPlatformLandings(time);
          this.checkPickupCollects(time);
          this.checkCollectibleCollects();
          this.checkEnemyCollisions(time);
          this.checkShotInput(time);
          this.cleanupWorld();
          this.spawnAhead();
          this.updateScore();
          this.updateHUD(time);
          this.updateEffects(dt);
          this.renderAll(time, altitude);

          if (!this.gameOverShown) {
            this.highestY = Math.min(this.highestY, this.player.y);

            if (this.player.y > this.cameras.main.scrollY + GAME_H + 48) {
              this.triggerGameOver();
            }
          }

          this.prevPlayerX = this.player.x;
          this.prevPlayerY = this.player.y;
        }

        // ------------------------------------------------------------
        // Player movement and power-up logic
        // ------------------------------------------------------------
        setupMotionControls() {
          this.motion = {
            supported: supportsTiltControls(),
            active: this.motionGranted || (supportsTiltControls() && !needsExplicitTiltPermission()),
            orientationSupported: typeof window.DeviceOrientationEvent !== "undefined",
            motionSupported: typeof window.DeviceMotionEvent !== "undefined",
            permissionDenied: false
          };
          this.motion.orientation = {
            calibrated: false,
            baseline: 0,
            raw: 0,
            intent: 0,
            lastAt: 0
          };
          this.motion.accel = {
            calibrated: false,
            baseline: 0,
            raw: 0,
            intent: 0,
            lastAt: 0
          };

          if (!this.motion.supported) {
            return;
          }

          this.applyMotionChannel = (channel, rawValue, deadZone, fullScale) => {
            if (!Number.isFinite(rawValue)) {
              return;
            }

            channel.raw = rawValue;
            channel.lastAt = performance.now();

            if (!channel.calibrated) {
              channel.baseline = rawValue;
              channel.intent = 0;
              channel.calibrated = true;
            } else if (Math.abs(channel.intent) < TILT_MIN_INTENT) {
              channel.baseline = lerp(channel.baseline, rawValue, TILT_BASELINE_LERP);
            }

            const relative = rawValue - channel.baseline;
            const absValue = Math.abs(relative);
            const normalized = absValue <= deadZone ? 0 : clamp(relative / fullScale, -1, 1);
            channel.intent = lerp(channel.intent, normalized, TILT_SMOOTHING);
          };

          this.onDeviceOrientation = (event) => {
            if (!this.motion.active) {
              return;
            }

            const angle = getScreenAngle();
            let horizontalTilt = null;

            if (Math.abs(angle) === 90 || Math.abs(angle) === 270) {
              if (typeof event.beta === "number") {
                horizontalTilt = angle === 90 ? -event.beta : event.beta;
              }
            } else if (Math.abs(angle) === 180) {
              if (typeof event.gamma === "number") {
                horizontalTilt = -event.gamma;
              }
            } else if (typeof event.gamma === "number") {
              horizontalTilt = event.gamma;
            }

            if (horizontalTilt === null && typeof event.gamma === "number") {
              horizontalTilt = event.gamma;
            }
            if (horizontalTilt === null && typeof event.beta === "number") {
              horizontalTilt = event.beta;
            }
            if (horizontalTilt === null) {
              return;
            }

            horizontalTilt = clamp(horizontalTilt, -45, 45);
            this.applyMotionChannel(this.motion.orientation, horizontalTilt, TILT_DEAD_ZONE, TILT_FULL_STEER);
          };

          this.onDeviceMotion = (event) => {
            if (!this.motion.active) {
              return;
            }

            const acceleration = event.accelerationIncludingGravity || event.acceleration;
            if (!acceleration) {
              return;
            }

            let horizontalAccel = null;
            const angle = getScreenAngle();
            if (Math.abs(angle) === 90 || Math.abs(angle) === 270) {
              if (typeof acceleration.y === "number") {
                horizontalAccel = angle === 90 ? acceleration.y : -acceleration.y;
              }
            } else if (Math.abs(angle) === 180) {
              if (typeof acceleration.x === "number") {
                horizontalAccel = -acceleration.x;
              }
            } else if (typeof acceleration.x === "number") {
              horizontalAccel = acceleration.x;
            }

            if (horizontalAccel === null && typeof acceleration.x === "number") {
              horizontalAccel = acceleration.x;
            }
            if (horizontalAccel === null) {
              return;
            }

            this.applyMotionChannel(this.motion.accel, horizontalAccel, TILT_ACCEL_DEAD_ZONE, TILT_ACCEL_FULL_STEER);
          };

          this.onOrientationChange = () => {
            if (!this.motion) {
              return;
            }
            this.motion.orientation.calibrated = false;
            this.motion.orientation.intent = 0;
            this.motion.accel.calibrated = false;
            this.motion.accel.intent = 0;
          };

          window.addEventListener("deviceorientation", this.onDeviceOrientation);
          window.addEventListener("devicemotion", this.onDeviceMotion);
          window.addEventListener("orientationchange", this.onOrientationChange);
        }

        async ensureMotionPermission() {
          if (!this.motion || !this.motion.supported || this.motion.active) {
            return this.motion ? this.motion.active : false;
          }

          const granted = await requestTiltPermission();
          this.motion.active = granted;
          this.motion.permissionDenied = !granted;

          if (granted) {
            this.motion.orientation.calibrated = false;
            this.motion.orientation.intent = 0;
            this.motion.orientation.lastAt = 0;
            this.motion.accel.calibrated = false;
            this.motion.accel.intent = 0;
            this.motion.accel.lastAt = 0;
          }

          return granted;
        }

        getTiltAxis() {
          if (!this.motion || !this.motion.active) {
            return 0;
          }

          const now = performance.now();
          const orientationFresh = now - this.motion.orientation.lastAt < TILT_SOURCE_TIMEOUT_MS;
          const accelFresh = now - this.motion.accel.lastAt < TILT_SOURCE_TIMEOUT_MS;
          const orientationIntent = orientationFresh ? this.motion.orientation.intent : 0;
          const accelIntent = accelFresh ? this.motion.accel.intent : 0;

          let combined = 0;
          if (orientationFresh && accelFresh) {
            combined = Math.abs(orientationIntent) >= Math.abs(accelIntent) ? orientationIntent : accelIntent;
          } else if (orientationFresh) {
            combined = orientationIntent;
          } else if (accelFresh) {
            combined = accelIntent;
          }

          return Math.abs(combined) < TILT_MIN_INTENT ? 0 : clamp(combined, -1, 1);
        }

        updatePlayerControl(time) {
          const body = this.player.body;
          const left = this.cursors.left.isDown || this.keys.A.isDown;
          const right = this.cursors.right.isDown || this.keys.D.isDown;
          let move = 0;
          if (left) {
            move = -1;
          }
          if (right) {
            move = 1;
          }
          if (move === 0) {
            move = this.getTiltAxis();
          }

          if (!this.playerState.abducting && time < this.playerState.rocketUntil) {
            body.velocity.x = 0;
            body.velocity.y = Math.min(body.velocity.y, ROCKET_VELOCITY);
          } else if (!this.playerState.abducting) {
            body.velocity.x = move * PLAYER_SPEED;
          } else {
            body.velocity.x = 0;
          }

          if (move !== 0) {
            this.playerState.dir = move < 0 ? -1 : 1;
          }

          if (time < this.playerState.jetpackUntil) {
            body.velocity.y = Math.min(body.velocity.y, JETPACK_VELOCITY);
            this.audio.setJetpack(true);
          } else {
            this.audio.setJetpack(false);
          }

          if (time < this.playerState.propellerUntil) {
            body.velocity.y = Math.min(body.velocity.y, PROPELLER_LIFT_VELOCITY);
          }

          if (this.playerState.springBoostActive && body.velocity.y >= 0) {
            this.playerState.springBoostActive = false;
          }

          if (this.playerState.abducting && this.playerState.abductionEnemy && !this.playerState.abductionEnemy.dead) {
            const enemy = this.playerState.abductionEnemy;
            this.player.x = Phaser.Math.Linear(this.player.x, enemy.x, 0.08);
            body.velocity.y = -260;
            if (this.player.y < this.cameras.main.scrollY - 60) {
              this.triggerGameOver();
            }
          }

          if (this.player.x < -PLAYER_WRAP_MARGIN) {
            this.player.x = GAME_W + PLAYER_WRAP_MARGIN;
          } else if (this.player.x > GAME_W + PLAYER_WRAP_MARGIN) {
            this.player.x = -PLAYER_WRAP_MARGIN;
          }

          this.playerState.flashActive = time < this.playerState.flashUntil || (this.hasSpringInvincibility(time) && Math.floor(time / 90) % 2 === 0);
        }

        stretchLanding() {
          this.tweens.killTweensOf(this.playerState);
          this.playerState.scaleX = 0.8;
          this.playerState.scaleY = 1.3;
          this.tweens.add({
            targets: this.playerState,
            scaleX: 1,
            scaleY: 1,
            duration: 80,
            ease: "Quad.Out"
          });
        }

        stretchLaunch() {
          this.tweens.killTweensOf(this.playerState);
          this.playerState.scaleX = 1.2;
          this.playerState.scaleY = 0.75;
          this.tweens.add({
            targets: this.playerState,
            scaleX: 1,
            scaleY: 1,
            duration: 80,
            ease: "Quad.Out"
          });
        }

        applyBounce(baseVelocity, sourceY) {
          let jumpVelocity = baseVelocity;

          this.playerState.springBoostActive = false;

          if (this.playerState.springBoots > 0) {
            jumpVelocity = Math.min(jumpVelocity, BOOTS_VELOCITY);
            this.playerState.springBoots -= 1;
          }

          this.player.y = sourceY - PLAYER_BODY_H / 2 - 3;
          this.player.body.velocity.y = jumpVelocity;
          this.playerState.lastLandAt = this.time.now;
          this.stretchLanding();
          this.stretchLaunch();
          this.audio.land();
          this.audio.jump();
          this.spawnDust(this.player.x, sourceY);
        }

        consumeShield(pushSourceX, pushSourceY) {
          if (!this.playerState.shield) {
            return false;
          }
          const dx = this.player.x - pushSourceX;
          const dy = this.player.y - pushSourceY;
          const mag = Math.max(1, Math.hypot(dx, dy));
          this.player.body.velocity.x += (dx / mag) * 340;
          this.player.body.velocity.y = -580;
          this.playerState.shield = false;
          this.playerState.flashUntil = this.time.now + 120;
          return true;
        }

        // ------------------------------------------------------------
        // Camera, scoring, and HUD
        // ------------------------------------------------------------
        updateCamera() {
          const target = this.player.y - CAMERA_FOLLOW_OFFSET;
          if (target < this.cameras.main.scrollY) {
            this.cameras.main.scrollY = Phaser.Math.Linear(this.cameras.main.scrollY, target, CAMERA_SMOOTH);
          }
        }

        updateScore() {
          const height = Math.max(0, Math.floor(START_Y - this.highestY));
          this.score = height + this.collectScore;
          this.heightOnly = height;
        }

        updateHUD(time) {
          this.scoreText.setText(`${formatPoints(this.heightOnly)} FT`);
        }

        // ------------------------------------------------------------
        // Platform logic
        // ------------------------------------------------------------
        updatePlatforms(time, dt) {
          for (const platform of this.platforms) {
            if (platform.type === "movingH") {
              platform.x += platform.dir * platform.speed * dt;
              if (platform.x < platform.w / 2 || platform.x > GAME_W - platform.w / 2) {
                platform.dir *= -1;
                platform.x = clamp(platform.x, platform.w / 2, GAME_W - platform.w / 2);
              }
            }

            if (platform.type === "movingV") {
              platform.y = platform.baseY + Math.sin(time * 0.002 + platform.phase) * PLATFORM_VERTICAL_RANGE * 0.5;
            }

            if (platform.breakAt > 0 && time >= platform.breakAt) {
              platform.falling = true;
              platform.breakAt = 0;
            }

            if (platform.falling) {
              platform.fallSpeed += 1200 * dt;
              platform.y += platform.fallSpeed * dt;
            }

            if (platform.type === "vanish" && platform.hiddenUntil > 0 && time >= platform.hiddenUntil) {
              platform.hiddenUntil = 0;
              platform.visible = true;
              platform.active = true;
            }

            if (platform.type === "explode" && platform.explodeAt > 0 && time >= platform.explodeAt && !platform.exploded) {
              this.spawnExplosion(platform.x, platform.y);
              platform.exploded = true;
              platform.active = false;
              platform.visible = false;
            }
          }
        }

        checkPlatformLandings(time) {
          if (this.gameOverShown || this.player.body.velocity.y <= 0 || this.playerState.abducting) {
            return;
          }

          const prevBottom = (this.prevPlayerY ?? this.player.y) + PLAYER_BODY_H / 2;
          const currBottom = this.player.y + PLAYER_BODY_H / 2;

          for (const platform of this.platforms) {
            if (!platform.active || !platform.visible || platform.exploded) {
              continue;
            }

            const top = platform.y - platform.h / 2;
            const overlapX = Math.abs(this.player.x - platform.x) < platform.w / 2 + PLAYER_BODY_W / 2 - 4;
            const crossedTop = prevBottom <= top + LANDING_TOLERANCE && currBottom >= top - 2;

            if (!overlapX || !crossedTop) {
              continue;
            }

            let bounceVelocity = JUMP_VELOCITY;
            if (platform.spring) {
              const springX = platform.x + platform.spring.xOffset;
              if (Math.abs(this.player.x - springX) < 16) {
                bounceVelocity = PLATFORM_SPRING_VELOCITY;
              }
            }

            this.applyBounce(bounceVelocity, top);

            if (platform.type === "fragile" && !platform.falling && platform.breakAt === 0) {
              platform.shakeUntil = time + 280;
              platform.breakAt = time + 500;
            }

            if (platform.type === "vanish") {
              platform.active = false;
              platform.visible = false;
              platform.hiddenUntil = time + 2000;
            }

            if (platform.type === "explode" && platform.explodeAt === 0) {
              platform.explodeAt = time + 1000;
            }

            return;
          }
        }

        // ------------------------------------------------------------
        // Pickups, collectibles, and power-ups
        // ------------------------------------------------------------
        updatePickupsAndCollectibles(time) {
          for (const pickup of this.pickups) {
            pickup.y = pickup.baseY + Math.sin(time * PICKUP_BOB_SPEED + pickup.bobPhase) * 6;
          }
          for (const item of this.collectibles) {
            item.y = item.baseY + Math.sin(time * COIN_BOB_SPEED + item.bobPhase) * 5;
          }
        }

        checkPickupCollects(time) {
          const playerHit = { x: this.player.x, y: this.player.y, w: PLAYER_BODY_W, h: PLAYER_BODY_H };
          this.pickups = this.pickups.filter((pickup) => {
            const hit = rectsOverlap(playerHit, { x: pickup.x, y: pickup.y, w: 28, h: 28 });
            if (!hit) {
              return true;
            }

            this.playerState.flashUntil = time + 90;
            this.audio.powerup();

            if (pickup.type === "spring") {
              this.player.body.velocity.y = PICKUP_SPRING_VELOCITY;
              this.playerState.springBoostActive = true;
              this.stretchLaunch();
            } else if (pickup.type === "jetpack") {
              this.playerState.jetpackUntil = time + JETPACK_MS;
            } else if (pickup.type === "rocket") {
              this.playerState.rocketUntil = time + ROCKET_MS;
            } else if (pickup.type === "propeller") {
              this.playerState.propellerUntil = time + PROPELLER_MS;
            } else if (pickup.type === "boots") {
              this.playerState.springBoots = BOOTS_BOUNCES;
            } else if (pickup.type === "shield") {
              this.playerState.shield = true;
            } else if (pickup.type === "repellent") {
              this.playerState.repellentUntil = time + REPellent_MS;
              this.scareOffEnemies();
            }

            return false;
          });
        }

        checkCollectibleCollects() {
          const playerHit = { x: this.player.x, y: this.player.y, w: PLAYER_BODY_W, h: PLAYER_BODY_H };
          this.collectibles = this.collectibles.filter((item) => {
            const hit = rectsOverlap(playerHit, item);
            if (!hit) {
              return true;
            }

            this.collectScore += item.value;
            if (item.type === "gold") {
              this.audio.collectGold();
            } else {
              this.audio.collectSilver();
            }
            this.spawnBurst(item.x, item.y, item.type === "gold" ? COLORS.gold : COLORS.silver, 5);
            return false;
          });
        }

        activatePoofText(x, y) {
          const poof = this.add.text(x, y, "POOF", {
            fontFamily: "Georgia, serif",
            fontSize: "20px",
            fontStyle: "bold",
            color: CSS.ink
          }).setOrigin(0.5).setDepth(30);
          this.tweens.add({
            targets: poof,
            scale: 1.4,
            alpha: 0,
            y: y - 20,
            duration: 300,
            onComplete: () => poof.destroy()
          });
        }

        // ------------------------------------------------------------
        // Enemy logic and collisions
        // ------------------------------------------------------------
        updateEnemies(time, dt) {
          for (const enemy of this.enemies) {
            if (enemy.dead) {
              continue;
            }

            const platform = enemy.platformId ? this.platforms.find((p) => p.id === enemy.platformId) : null;
            if (enemy.platformId && (!platform || !platform.visible || platform.exploded || platform.falling)) {
              enemy.dead = true;
              continue;
            }

            if (enemy.type === "snake" && platform) {
              enemy.y = platform.y - 18 + Math.sin(time * 0.004 + enemy.bobPhase) * 4;
            } else if (enemy.type === "heavy" && platform) {
              const previousX = enemy.x;
              enemy.y = platform.y - 24;
              enemy.x += enemy.dir * HEAVY_SPEED * dt;
              const minX = platform.x - platform.w / 2 + 18;
              const maxX = platform.x + platform.w / 2 - 18;
              if (enemy.x < minX || enemy.x > maxX) {
                enemy.dir *= -1;
                enemy.x = clamp(enemy.x, minX, maxX);
              }
              enemy.stepDistance += Math.abs(enemy.x - previousX);
              if (enemy.stepDistance >= 30) {
                enemy.stepDistance = 0;
                enemy.stepIndex += 1;
                if (enemy.stepIndex % 2 === 0) {
                  this.cameras.main.shake(80, 0.006);
                }
              }
            } else if (enemy.type === "vulture") {
              enemy.x += enemy.dir * VULTURE_SPEED * dt;
              enemy.y = enemy.baseY + Math.sin(time * 0.003 + enemy.bobPhase) * 10;
              if (enemy.x < 34 || enemy.x > GAME_W - 34) {
                enemy.dir *= -1;
              }
            } else if (enemy.type === "ufo") {
              enemy.x += enemy.dir * 80 * dt;
              enemy.y = enemy.baseY + Math.sin(time * 0.002 + enemy.bobPhase) * 8;
              if (enemy.x < 40 || enemy.x > GAME_W - 40) {
                enemy.dir *= -1;
              }

              const inBeam =
                Math.abs(this.player.x - enemy.x) <= Ufo_BEAM_WIDTH / 2 &&
                this.player.y > enemy.y &&
                this.player.y < enemy.y + Ufo_BEAM_HEIGHT &&
                !this.gameOverShown;

              enemy.beamActive = inBeam;
              enemy.beamCharge = inBeam ? enemy.beamCharge + this.game.loop.delta : 0;
              if (enemy.beamCharge >= Ufo_ABDUCT_MS && !this.playerState.abducting) {
                this.playerState.abducting = true;
                this.playerState.abductionEnemy = enemy;
              }
            }
          }

          this.enemies = this.enemies.filter((enemy) => !enemy.dead || enemy.fadeUntil > time);
        }

        damageEnemy(enemy, amount) {
          enemy.hp -= amount;
          enemy.hitFlashUntil = this.time.now + 120;
          if (enemy.hp <= 0) {
            enemy.dead = true;
            this.audio.enemyDeath();
            this.spawnBurst(enemy.x, enemy.y, this.getEnemyColor(enemy), 5);
            this.activatePoofText(enemy.x, enemy.y - 16);
          }
        }

        checkEnemyCollisions() {
          if (this.gameOverShown) {
            return;
          }

          if (this.hasSpringInvincibility()) {
            return;
          }

          const propellerActive = this.time.now < this.playerState.propellerUntil;

          const prevBottom = (this.prevPlayerY ?? this.player.y) + PLAYER_BODY_H / 2;
          const playerRect = { x: this.player.x, y: this.player.y, w: PLAYER_BODY_W, h: PLAYER_BODY_H };

          for (const enemy of this.enemies) {
            if (enemy.dead) {
              continue;
            }

            const hit = rectsOverlap(playerRect, enemy);
            if (!hit) {
              continue;
            }

            if (propellerActive && enemy.y < this.player.y + 8) {
              this.damageEnemy(enemy, enemy.hp);
              continue;
            }

            const enemyTop = enemy.y - enemy.h / 2;
            const fallingOnTop = this.player.body.velocity.y > 0 && prevBottom <= enemyTop + STOMP_TOLERANCE && this.player.y < enemy.y;

            if (fallingOnTop) {
              this.damageEnemy(enemy, 1);
              this.applyBounce(JUMP_VELOCITY, enemyTop);
              return;
            }

            if (!this.consumeShield(enemy.x, enemy.y)) {
              this.triggerGameOver();
              return;
            }
          }
        }

        scareOffEnemies() {
          for (const enemy of this.enemies) {
            if (enemy.dead) {
              continue;
            }
            this.tweens.add({
              targets: enemy,
              x: enemy.x + 6,
              duration: 60,
              yoyo: true,
              repeat: 2,
              onComplete: () => {
                enemy.dead = true;
                this.spawnBurst(enemy.x, enemy.y, this.getEnemyColor(enemy), 4);
              }
            });
          }
        }

        getEnemyColor(enemy) {
          if (enemy.type === "snake") {
            return COLORS.tan;
          }
          if (enemy.type === "vulture") {
            return COLORS.charcoal;
          }
          if (enemy.type === "heavy") {
            return COLORS.sheriff;
          }
          return COLORS.ufo;
        }

        // ------------------------------------------------------------
        // Black hole hazard
        // ------------------------------------------------------------
        updateBlackHoles(dt) {
          let highestLevel = 0;
          for (const hole of this.blackHoles) {
            hole.angle += dt * (Math.PI / 3);
            const dist = distance(this.player.x, this.player.y, hole.x, hole.y);
            if (dist < BLACK_HOLE_PULL_RADIUS) {
              const t = 1 - dist / BLACK_HOLE_PULL_RADIUS;
              highestLevel = Math.max(highestLevel, t);
              const dx = hole.x - this.player.x;
              const dy = hole.y - this.player.y;
              const mag = Math.max(1, Math.hypot(dx, dy));
              const force = BLACK_HOLE_FORCE * t * t;
              this.player.body.velocity.x += (dx / mag) * force * dt;
              this.player.body.velocity.y += (dy / mag) * force * dt;
            }

            if (dist < BLACK_HOLE_KILL_RADIUS) {
              if (this.hasSpringInvincibility()) {
                continue;
              }
              if (!this.consumeShield(hole.x, hole.y)) {
                this.triggerGameOver();
              }
            }
          }
          this.audio.setBlackHoleLevel(highestLevel);
        }

        // ------------------------------------------------------------
        // Shooting and pellets
        // ------------------------------------------------------------
        checkShotInput(time) {
          if (Phaser.Input.Keyboard.JustDown(this.keys.SPACE) && !this.gameOverShown) {
            this.tryShoot(this.player.x, this.player.y - 400);
          }
          if (time >= this.playerState.shootingUntil) {
            this.playerState.shootingUntil = 0;
          }
        }

        tryShoot(targetX, targetY) {
          const now = this.time.now;
          if (this.gameOverShown || now - this.lastShotAt < SHOT_COOLDOWN || this.pellets.length >= MAX_PELLETS) {
            return;
          }

          const gunX = this.player.x + 14 * this.playerState.dir;
          const gunY = this.player.y + 4;
          const dx = targetX - gunX;
          const dy = targetY - gunY;
          const mag = Math.max(1, Math.hypot(dx, dy));

          this.pellets.push({
            x: gunX,
            y: gunY,
            vx: (dx / mag) * PELLET_SPEED,
            vy: (dy / mag) * PELLET_SPEED,
            w: 10,
            h: 6,
            trail: []
          });

          this.lastShotAt = now;
          this.playerState.shootingUntil = now + 40;
          this.audio.shoot();
        }

        updatePellets(dt) {
          this.pellets = this.pellets.filter((pellet) => {
            pellet.trail.unshift({ x: pellet.x, y: pellet.y, life: 1 });
            pellet.trail = pellet.trail.slice(0, 3);
            pellet.x += pellet.vx * dt;
            pellet.y += pellet.vy * dt;

            for (const enemy of this.enemies) {
              if (enemy.dead) {
                continue;
              }
              if (rectsOverlap(pellet, enemy)) {
                this.damageEnemy(enemy, 1);
                return false;
              }
            }

            return pellet.y > this.cameras.main.scrollY - 80 && pellet.y < this.cameras.main.scrollY + GAME_H + 80 && pellet.x > -40 && pellet.x < GAME_W + 40;
          });
        }

        // ------------------------------------------------------------
        // Spawn maintenance and cleanup
        // ------------------------------------------------------------
        cleanupWorld() {
          const topCull = this.cameras.main.scrollY - CULL_ABOVE_MARGIN;
          const bottomCull = this.cameras.main.scrollY + GAME_H + CULL_BELOW_MARGIN;

          this.platforms = this.platforms.filter((platform) => platform.y > topCull && platform.y < bottomCull && !platform.exploded);
          this.pickups = this.pickups.filter((pickup) => pickup.y > topCull && pickup.y < bottomCull);
          this.collectibles = this.collectibles.filter((item) => item.y > topCull && item.y < bottomCull);
          this.enemies = this.enemies.filter((enemy) => enemy.y > topCull - 60 && enemy.y < bottomCull);
          this.blackHoles = this.blackHoles.filter((hole) => hole.y > topCull - 80 && hole.y < bottomCull);
          if (this.effects.length > 120) {
            this.effects.splice(0, this.effects.length - 120);
          }
          if (this.pellets.length > MAX_PELLETS) {
            this.pellets.splice(0, this.pellets.length - MAX_PELLETS);
          }
          if (this.platforms.length > 0) {
            this.lastSpawnPlatform = this.platforms.reduce((best, platform) => (!best || platform.y < best.y ? platform : best), null);
            this.topSpawnY = this.lastSpawnPlatform.y;
            this.lastPlatformX = this.lastSpawnPlatform.x;
          } else {
            this.lastSpawnPlatform = null;
          }
        }

        spawnAhead() {
          let guard = 0;
          while (guard < 24) {
            const highestPlatformY = this.platforms.length > 0 ? Math.min(...this.platforms.map((platform) => platform.y)) : this.cameras.main.scrollY + GAME_H;
            const visiblePlatforms = this.platforms.filter((platform) => platform.y > this.cameras.main.scrollY - 40 && platform.y < this.cameras.main.scrollY + GAME_H + 40 && platform.visible).length;
            this.topSpawnY = highestPlatformY;
            if (highestPlatformY <= this.cameras.main.scrollY - PLATFORM_SPAWN_AHEAD && visiblePlatforms >= PLATFORM_VISIBLE_MIN) {
              break;
            }
            this.spawnPlatformRow();
            guard += 1;
          }
        }

        // ------------------------------------------------------------
        // Effects helpers
        // ------------------------------------------------------------
        spawnDust(x, y) {
          for (let i = 0; i < 3; i += 1) {
            this.effects.push({
              type: "dust",
              x: x + Phaser.Math.Between(-12, 12),
              y,
              vx: Phaser.Math.Between(-10, 10),
              vy: -Phaser.Math.Between(10, 30),
              radius: Phaser.Math.Between(5, 8),
              life: 0.36,
              maxLife: 0.36,
              color: COLORS.tan
            });
          }
        }

        spawnBurst(x, y, color, count) {
          for (let i = 0; i < count; i += 1) {
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
            const speed = Phaser.Math.Between(40, 120);
            this.effects.push({
              type: "particle",
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              radius: Phaser.Math.Between(4, 6),
              life: 0.4,
              maxLife: 0.4,
              color
            });
          }
        }

        spawnExplosion(x, y) {
          this.effects.push({
            type: "ring",
            x,
            y,
            radius: 18,
            endRadius: 74,
            life: 0.45,
            maxLife: 0.45,
            color: COLORS.gold
          });
          for (let i = 0; i < 6; i += 1) {
            const angle = (Math.PI * 2 * i) / 6;
            const speed = Phaser.Math.Between(90, 150);
            this.effects.push({
              type: "debris",
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed - 10,
              angle: angle,
              spin: Phaser.Math.FloatBetween(-7, 7),
              w: 10,
              h: 5,
              life: 0.58,
              maxLife: 0.58,
              color: COLORS.rust
            });
          }
        }

        updateEffects(dt) {
          this.effects = this.effects.filter((effect) => {
            effect.life -= dt;
            if (effect.life <= 0) {
              return false;
            }
            if (effect.type === "dust" || effect.type === "particle" || effect.type === "debris") {
              effect.x += effect.vx * dt;
              effect.y += effect.vy * dt;
              effect.vy += 60 * dt;
            }
            if (effect.type === "debris") {
              effect.angle += effect.spin * dt;
            }
            return true;
          });
        }

        // ------------------------------------------------------------
        // Game over handling
        // ------------------------------------------------------------
        triggerGameOver() {
          if (this.gameOverShown) {
            return;
          }
          this.gameOverShown = true;
          this.audio.stopAll();
          this.audio.gameOver();
          this.finalScore.setText(`${formatPoints(this.score)} PTS`);
          localStorage.setItem(BEST_SCORE_KEY, String(Math.max(this.bestScore, this.score)));
          this.overlay.setVisible(true);
          this.tweens.add({
            targets: this.overlay,
            alpha: 1,
            duration: 400,
            ease: "Quad.Out"
          });
        }

        shutdown() {
          this.audio.stopAll();
          if (this.onPointerDown) {
            this.input.off("pointerdown", this.onPointerDown);
          }
          if (this.onDeviceOrientation) {
            window.removeEventListener("deviceorientation", this.onDeviceOrientation);
          }
          if (this.onDeviceMotion) {
            window.removeEventListener("devicemotion", this.onDeviceMotion);
          }
          if (this.onOrientationChange) {
            window.removeEventListener("orientationchange", this.onOrientationChange);
          }
          this.platforms.length = 0;
          this.pickups.length = 0;
          this.collectibles.length = 0;
          this.enemies.length = 0;
          this.blackHoles.length = 0;
          this.pellets.length = 0;
          this.effects.length = 0;
          [
            this.overlay,
            this.finalScore,
            this.scoreText,
            this.bg,
            this.worldLayer,
            this.uiLayer,
            this.player
          ].forEach((obj) => {
            if (obj && obj.destroy) {
              obj.destroy();
            }
          });
          this.overlay = null;
          this.finalScore = null;
          this.scoreText = null;
          this.bg = null;
          this.worldLayer = null;
          this.uiLayer = null;
          this.player = null;
        }

        // ------------------------------------------------------------
        // Rendering
        // ------------------------------------------------------------
        renderAll(time, altitude) {
          drawSketchbookBackground(this, this.bg, altitude, this.cameras.main.scrollY, time);
          this.worldLayer.clear();

          for (const platform of this.platforms) {
            if (platform.visible && !platform.exploded) {
              drawPlatform(this.worldLayer, platform, time);
            }
          }

          for (const hole of this.blackHoles) {
            drawBlackHole(this.worldLayer, hole);
          }

          for (const pickup of this.pickups) {
            drawPickup(this.worldLayer, pickup);
          }

          for (const item of this.collectibles) {
            drawCollectible(this.worldLayer, item);
          }

          for (const enemy of this.enemies) {
            if (!enemy.dead) {
              drawEnemy(this.worldLayer, enemy, time);
            }
          }

          for (const pellet of this.pellets) {
            drawPellet(this.worldLayer, pellet);
          }

          for (const effect of this.effects) {
            drawEffect(this.worldLayer, effect);
          }

          drawBandit(this.worldLayer, {
            x: this.player.x,
            y: this.player.y,
            vy: this.player.body.velocity.y,
            dir: this.playerState.dir,
            scaleX: this.playerState.scaleX,
            scaleY: this.playerState.scaleY,
            shooting: this.playerState.shootingUntil > this.time.now,
            flash: this.playerState.flashUntil > this.time.now || (this.hasSpringInvincibility(time) && Math.floor(time / 90) % 2 === 0),
            propeller: this.time.now < this.playerState.propellerUntil,
            shield: this.playerState.shield,
            jetpack: this.time.now < this.playerState.jetpackUntil,
            rocket: this.time.now < this.playerState.rocketUntil
          }, time);

          this.drawHUDDecor(time);
        }

        drawHUDDecor(time) {
          this.uiLayer.clear();

          if (this.playerState.shield) {
            for (let r = 34; r >= 18; r -= 8) {
              this.uiLayer.lineStyle(2, COLORS.white, 0.06 * r / 18);
              this.uiLayer.strokeCircle(GAME_W - 96, 58, r);
            }
          }

          if (time < this.playerState.jetpackUntil) {
            const pct = clamp((this.playerState.jetpackUntil - time) / JETPACK_MS, 0, 1);
            this.uiLayer.fillStyle(COLORS.ink, 0.25);
            this.uiLayer.fillRect(GAME_W - 170, 96, 140, 10);
            this.uiLayer.fillStyle(COLORS.gold, 1);
            this.uiLayer.fillRect(GAME_W - 170, 96, 140 * pct, 10);
            this.uiLayer.lineStyle(2, COLORS.ink, 1);
            this.uiLayer.strokeRect(GAME_W - 170, 96, 140, 10);
          }

          if (this.playerState.springBoots > 0) {
            this.uiLayer.fillStyle(COLORS.gold, 1);
            for (let i = 0; i < this.playerState.springBoots; i += 1) {
              this.uiLayer.fillCircle(GAME_W - 40 - i * 14, 118, 4);
            }
          }
        }
      }

      // ============================================================
      // World drawing functions
      // ============================================================
      function drawPlatform(g, platform, time) {
        const wobbleX = platform.shakeUntil > time ? Math.sin(time * 0.05) * 3 : 0;
        const points = platform.noise.map((p, index) => {
          const dx = index === 0 || index === 3 ? -wobbleX : wobbleX;
          return { x: p.x + (platform.x - platform.baseX) + dx, y: p.y + (platform.y - platform.baseY) };
        });

        let fillColor = COLORS.wood;
        let fillAlpha = 1;
        if (platform.type === "fragile") {
          fillColor = COLORS.woodDark;
        } else if (platform.type === "explode") {
          fillColor = platform.explodeAt > 0 && Math.floor(time / 90) % 2 === 0 ? COLORS.gold : 0x8B5A00;
        } else if (platform.type === "vanish") {
          fillColor = 0x648CC8;
          fillAlpha = platform.hiddenUntil > 0 ? 0 : 0.3 + Math.sin(time * 0.005) * 0.225;
        }

        g.fillStyle(fillColor, fillAlpha);
        pathPolygon(g, points);
        g.fillPath();

        if (platform.type === "vanish") {
          drawDashedPolygon(g, points, 8, 5, COLORS.ink, 3, 0.9);
        } else {
          g.lineStyle(3, COLORS.ink, 1);
          pathPolygon(g, points);
          g.strokePath();
        }

        if (platform.type === "normal" || platform.type === "movingH" || platform.type === "movingV") {
          g.lineStyle(2, COLORS.woodGrain, 0.45);
          platform.grainOffsets.forEach((offset) => {
            g.beginPath();
            g.moveTo(platform.x - platform.w / 2 + 12, platform.y + offset);
            g.lineTo(platform.x + platform.w / 2 - 12, platform.y + offset + Phaser.Math.Between(-1, 1));
            g.strokePath();
          });
          g.fillStyle(COLORS.silver, 1);
          platform.nails.forEach((offset) => g.fillCircle(platform.x + offset, platform.y, 3));
        }

        if (platform.type === "movingH") {
          const dashDir = platform.dir < 0 ? 1 : -1;
          g.lineStyle(3, COLORS.ink, 0.2);
          for (let i = 0; i < 3; i += 1) {
            const y = platform.y - 8 + i * 8;
            g.beginPath();
            g.moveTo(platform.x + dashDir * (platform.w / 2 + 8), y);
            g.lineTo(platform.x + dashDir * (platform.w / 2 + 20), y);
            g.strokePath();
          }
        }

        if (platform.type === "fragile") {
          g.lineStyle(3, COLORS.ink, 0.9);
          g.beginPath();
          g.moveTo(platform.x - platform.w / 2 + 18, platform.y - 4);
          g.lineTo(platform.x + platform.w / 2 - 18, platform.y + 4);
          g.strokePath();
          g.beginPath();
          g.moveTo(platform.x - platform.w / 2 + 8, platform.y + 1);
          g.lineTo(platform.x - platform.w / 2 + 2, platform.y + 8);
          g.strokePath();
          g.beginPath();
          g.moveTo(platform.x + platform.w / 2 - 8, platform.y - 1);
          g.lineTo(platform.x + platform.w / 2 + 2, platform.y - 8);
          g.strokePath();
        }

        if (platform.type === "explode") {
          g.lineStyle(2, COLORS.ink, 0.8);
          for (let i = 0; i < 4; i += 1) {
            const x = platform.x - 30 + i * 20;
            g.beginPath();
            g.moveTo(x, platform.y - 14);
            g.lineTo(x + 6, platform.y - 22);
            g.strokePath();
          }
        }

        if (platform.spring) {
          const springX = platform.x + platform.spring.xOffset;
          g.lineStyle(3, COLORS.gold, 1);
          const top = platform.y - platform.h / 2 - 1;
          for (let i = 0; i < 4; i += 1) {
            const y = top - i * 4;
            g.beginPath();
            g.moveTo(springX - 6, y);
            g.lineTo(springX, y - 2);
            g.lineTo(springX + 6, y);
            g.strokePath();
          }
        }
      }

      function drawBandit(g, state, time) {
        const rising = state.vy < -50;
        const falling = state.vy > 120;
        const hatOffsetY = rising ? -2 : falling ? 2 : 0;
        const ponchoExtra = rising ? 4 : falling ? -2 : 0;
        const eyeRadius = rising ? 6 : 5;
        const pupilRadius = rising ? 3 : 2.5;
        const x = state.x;
        const y = state.y;
        const avgScale = (state.scaleX + state.scaleY) * 0.5;
        const sx = (value) => x + value * state.scaleX;
        const sy = (value) => y + value * state.scaleY;

        if (state.shield) {
          for (let r = 34; r >= 18; r -= 8) {
            g.lineStyle(3, COLORS.white, 0.04 + r * 0.003);
            g.strokeCircle(x, y, r * avgScale);
          }
        }

        if (state.jetpack) {
          for (let i = 0; i < 4; i += 1) {
            g.fillStyle(COLORS.poncho, 0.2 + i * 0.08);
            g.fillCircle(sx(-6 + i * 4), sy(34 + i * 7), (8 + i * 2) * avgScale);
          }
        }

        if (state.rocket) {
          g.fillStyle(COLORS.rust, 1);
          g.fillTriangle(sx(-10), sy(16), sx(-2), sy(2), sx(6), sy(16));
          g.lineStyle(2, COLORS.ink, 1);
          g.strokeTriangle(sx(-10), sy(16), sx(-2), sy(2), sx(6), sy(16));
          g.fillStyle(COLORS.gold, 0.7);
          g.fillCircle(sx(-2), sy(22), 6 * avgScale);
        }

        const ponchoPoints = [
          { x: sx(-16 - ponchoExtra), y: sy(4) },
          { x: sx(-11), y: sy(22) },
          { x: sx(-5), y: sy(28) },
          { x: sx(7), y: sy(28) },
          { x: sx(14), y: sy(22) },
          { x: sx(18 + ponchoExtra), y: sy(4) },
          { x: sx(0), y: sy(-12) }
        ];
        fillStrokePolygon(g, ponchoPoints, COLORS.poncho, 1, COLORS.ink, OUTLINE_W);

        g.fillStyle(COLORS.bandana, 1);
        g.fillRect(sx(-11), sy(-2), 22 * state.scaleX, 12 * state.scaleY);
        g.lineStyle(OUTLINE_W, COLORS.ink, 1);
        g.strokeRect(sx(-11), sy(-2), 22 * state.scaleX, 12 * state.scaleY);

        g.fillStyle(COLORS.white, 1);
        g.fillEllipse(sx(-6), sy(-11), 9 * state.scaleX, eyeRadius * 2 * state.scaleY);
        g.fillEllipse(sx(8), sy(-11), 9 * state.scaleX, eyeRadius * 2 * state.scaleY);
        g.fillStyle(COLORS.ink, 1);
        const pupilShift = state.dir * 3;
        g.fillCircle(sx(-6 + pupilShift * 0.55), sy(-11), pupilRadius * avgScale);
        g.fillCircle(sx(8 + pupilShift * 0.55), sy(-11), pupilRadius * avgScale);

        if (falling) {
          g.lineStyle(3, COLORS.ink, 1);
          g.beginPath();
          g.moveTo(sx(-11), sy(-18));
          g.lineTo(sx(-1), sy(-20));
          g.strokePath();
          g.beginPath();
          g.moveTo(sx(13), sy(-20));
          g.lineTo(sx(3), sy(-18));
          g.strokePath();
        }

        if (state.propeller) {
          const rotorAngle = time * 0.04;
          const rotorDx = Math.cos(rotorAngle) * 14;
          const rotorDy = Math.sin(rotorAngle) * 3;
          g.fillStyle(COLORS.teal, 1);
          g.fillEllipse(sx(0), sy(-28 + hatOffsetY), 28 * state.scaleX, 10 * state.scaleY);
          g.lineStyle(OUTLINE_W, COLORS.ink, 1);
          g.strokeEllipse(sx(0), sy(-28 + hatOffsetY), 28 * state.scaleX, 10 * state.scaleY);
          g.beginPath();
          g.moveTo(sx(0), sy(-38 + hatOffsetY));
          g.lineTo(sx(0), sy(-26 + hatOffsetY));
          g.strokePath();
          g.beginPath();
          g.moveTo(sx(-rotorDx), sy(-38 + hatOffsetY - rotorDy));
          g.lineTo(sx(rotorDx), sy(-38 + hatOffsetY + rotorDy));
          g.strokePath();
          g.lineStyle(2, COLORS.ink, 0.35);
          g.beginPath();
          g.moveTo(sx(-10), sy(-38 + hatOffsetY));
          g.lineTo(sx(10), sy(-38 + hatOffsetY));
          g.strokePath();
        } else {
          g.fillStyle(COLORS.hat, 1);
          g.fillEllipse(sx(0), sy(-28 + hatOffsetY), 42 * state.scaleX, 10 * state.scaleY);
          g.fillRect(sx(-16), sy(-42 + hatOffsetY), 28 * state.scaleX, 14 * state.scaleY);
          g.lineStyle(OUTLINE_W, COLORS.ink, 1);
          g.strokeEllipse(sx(0), sy(-28 + hatOffsetY), 42 * state.scaleX, 10 * state.scaleY);
          g.strokeRect(sx(-16), sy(-42 + hatOffsetY), 28 * state.scaleX, 14 * state.scaleY);
          drawStar(g, sx(4), sy(-34 + hatOffsetY), 2 * avgScale, 5 * avgScale, 5, Math.PI / 2, COLORS.gold, COLORS.ink, 1);
        }

        g.fillStyle(COLORS.boots, 1);
        g.fillRect(sx(-11), sy(26), 9 * state.scaleX, 11 * state.scaleY);
        g.fillRect(sx(3), sy(26), 9 * state.scaleX, 11 * state.scaleY);
        g.lineStyle(OUTLINE_W - 1, COLORS.ink, 1);
        g.strokeRect(sx(-11), sy(26), 9 * state.scaleX, 11 * state.scaleY);
        g.strokeRect(sx(3), sy(26), 9 * state.scaleX, 11 * state.scaleY);

        g.fillStyle(COLORS.charcoal, 1);
        g.fillRect(sx(12), sy(5), 9 * state.scaleX, 4 * state.scaleY);
        g.fillRect(sx(18), sy(2), 7 * state.scaleX, 3 * state.scaleY);
        g.lineStyle(3, COLORS.ink, 1);
        g.strokeRect(sx(12), sy(5), 9 * state.scaleX, 4 * state.scaleY);
        g.strokeRect(sx(18), sy(2), 7 * state.scaleX, 3 * state.scaleY);

        if (state.shooting) {
          drawStar(g, sx(27), sy(3), 2 * avgScale, 7 * avgScale, 4, Math.PI / 4, COLORS.gold, COLORS.gold, 1);
        }

        if (state.flash) {
          g.fillStyle(COLORS.white, 0.32);
          g.fillCircle(x, y, 30 * avgScale);
        }
      }

      function drawEnemy(g, enemy, time) {
        const flash = enemy.hitFlashUntil > time;
        const alpha = flash ? 0.65 : 1;

        if (enemy.type === "snake") {
          g.fillStyle(COLORS.tan, alpha);
          g.fillEllipse(enemy.x, enemy.y, 36, 18);
          g.fillEllipse(enemy.x + 8, enemy.y - 2, 22, 12);
          g.lineStyle(OUTLINE_W - 1, COLORS.ink, 1);
          g.strokeEllipse(enemy.x, enemy.y, 36, 18);
          g.strokeEllipse(enemy.x + 8, enemy.y - 2, 22, 12);
          g.beginPath();
          g.moveTo(enemy.x + 20, enemy.y - 3);
          g.lineTo(enemy.x + 30, enemy.y - 8);
          g.lineTo(enemy.x + 34, enemy.y - 3);
          g.strokePath();
          g.beginPath();
          g.moveTo(enemy.x + 22, enemy.y + 2);
          g.lineTo(enemy.x + 31, enemy.y + 2);
          g.lineTo(enemy.x + 35, enemy.y - 1);
          g.strokePath();
          g.fillStyle(COLORS.bandana, 1);
          g.fillRect(enemy.x - 18, enemy.y - 2, 8, 2);
        } else if (enemy.type === "vulture") {
          g.fillStyle(COLORS.charcoal, alpha);
          const wing = [
            { x: enemy.x - 30, y: enemy.y },
            { x: enemy.x - 12, y: enemy.y - 16 },
            { x: enemy.x, y: enemy.y - 4 },
            { x: enemy.x + 14, y: enemy.y - 16 },
            { x: enemy.x + 30, y: enemy.y },
            { x: enemy.x, y: enemy.y + 6 }
          ];
          fillStrokePolygon(g, wing, COLORS.charcoal, alpha, COLORS.ink, OUTLINE_W - 1);
          g.fillCircle(enemy.x + 2, enemy.y - 11, 4);
        } else if (enemy.type === "heavy") {
          g.fillStyle(COLORS.sheriff, alpha);
          g.fillRect(enemy.x - 16, enemy.y - 12, 32, 28);
          g.fillEllipse(enemy.x, enemy.y - 18, 36, 10);
          g.fillRect(enemy.x - 12, enemy.y - 26, 24, 11);
          g.lineStyle(OUTLINE_W - 1, COLORS.ink, 1);
          g.strokeRect(enemy.x - 16, enemy.y - 12, 32, 28);
          g.strokeEllipse(enemy.x, enemy.y - 18, 36, 10);
          g.strokeRect(enemy.x - 12, enemy.y - 26, 24, 11);
          drawStar(g, enemy.x, enemy.y - 1, 3, 7, 5, Math.PI / 2, COLORS.gold, COLORS.ink, 1);
          if (enemy.hp === 1) {
            g.lineStyle(3, COLORS.ink, 0.85);
            g.beginPath();
            g.moveTo(enemy.x - 10, enemy.y - 4);
            g.lineTo(enemy.x + 12, enemy.y + 8);
            g.strokePath();
            g.beginPath();
            g.moveTo(enemy.x + 4, enemy.y - 9);
            g.lineTo(enemy.x + 10, enemy.y - 1);
            g.strokePath();
          }
        } else {
          g.fillStyle(COLORS.ufo, alpha);
          g.fillEllipse(enemy.x, enemy.y - 2, 46, 22);
          g.fillRect(enemy.x - 12, enemy.y + 4, 24, 8);
          g.lineStyle(OUTLINE_W - 1, COLORS.ink, 1);
          g.strokeEllipse(enemy.x, enemy.y - 2, 46, 22);
          g.strokeRect(enemy.x - 12, enemy.y + 4, 24, 8);
          drawStar(g, enemy.x, enemy.y - 3, 2, 6, 5, Math.PI / 2, COLORS.gold, COLORS.ink, 1);
          if (enemy.beamActive) {
            const pulse = 0.15 + (0.5 + Math.sin(time * 0.01) * 0.5) * 0.3;
            g.fillStyle(COLORS.gold, pulse);
            g.fillTriangle(enemy.x - 10, enemy.y + 12, enemy.x + 10, enemy.y + 12, enemy.x, enemy.y + Ufo_BEAM_HEIGHT);
          }
        }
      }

      function drawBlackHole(g, hole) {
        g.fillStyle(COLORS.blackHole, 1);
        g.fillCircle(hole.x, hole.y, 20);
        g.lineStyle(3, 0x5028A0, 0.4);
        g.strokeCircle(hole.x, hole.y, 24);
        g.lineStyle(3, COLORS.ink, 0.9);
        for (let i = 0; i < 4; i += 1) {
          const a0 = hole.angle + i * 0.7;
          const a1 = a0 + 0.85;
          g.beginPath();
          g.moveTo(hole.x + Math.cos(a0) * (6 + i * 2), hole.y + Math.sin(a0) * (6 + i * 2));
          g.lineTo(hole.x + Math.cos(a1) * (10 + i * 2), hole.y + Math.sin(a1) * (10 + i * 2));
          g.strokePath();
        }
      }

      function drawPickup(g, pickup) {
        if (pickup.type === "spring") {
          g.lineStyle(3, COLORS.gold, 1);
          for (let i = 0; i < 4; i += 1) {
            const y = pickup.y + 8 - i * 4;
            g.beginPath();
            g.moveTo(pickup.x - 8, y);
            g.lineTo(pickup.x, y - 2);
            g.lineTo(pickup.x + 8, y);
            g.strokePath();
          }
        } else if (pickup.type === "jetpack") {
          g.fillStyle(COLORS.oldBrass, 1);
          g.fillRect(pickup.x - 10, pickup.y - 12, 20, 24);
          g.fillRect(pickup.x - 14, pickup.y - 8, 4, 9);
          g.fillRect(pickup.x + 10, pickup.y - 8, 4, 9);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeRect(pickup.x - 10, pickup.y - 12, 20, 24);
        } else if (pickup.type === "rocket") {
          g.fillStyle(COLORS.rust, 1);
          g.fillTriangle(pickup.x, pickup.y - 14, pickup.x - 12, pickup.y + 12, pickup.x + 12, pickup.y + 12);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeTriangle(pickup.x, pickup.y - 14, pickup.x - 12, pickup.y + 12, pickup.x + 12, pickup.y + 12);
        } else if (pickup.type === "propeller") {
          g.fillStyle(COLORS.teal, 1);
          g.fillEllipse(pickup.x, pickup.y + 6, 22, 12);
          g.fillRect(pickup.x - 8, pickup.y + 1, 16, 7);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeEllipse(pickup.x, pickup.y + 6, 22, 12);
          g.strokeRect(pickup.x - 8, pickup.y + 1, 16, 7);
          g.beginPath();
          g.moveTo(pickup.x, pickup.y - 10);
          g.lineTo(pickup.x, pickup.y + 1);
          g.strokePath();
          g.beginPath();
          g.moveTo(pickup.x - 11, pickup.y - 10);
          g.lineTo(pickup.x + 11, pickup.y - 10);
          g.strokePath();
          g.beginPath();
          g.moveTo(pickup.x - 6, pickup.y - 7);
          g.lineTo(pickup.x + 6, pickup.y - 13);
          g.strokePath();
        } else if (pickup.type === "boots") {
          g.fillStyle(COLORS.gold, 1);
          g.fillRect(pickup.x - 12, pickup.y - 6, 10, 18);
          g.fillRect(pickup.x + 2, pickup.y - 6, 10, 18);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeRect(pickup.x - 12, pickup.y - 6, 10, 18);
          g.strokeRect(pickup.x + 2, pickup.y - 6, 10, 18);
        } else if (pickup.type === "shield") {
          g.fillStyle(0x64A0DC, 0.35);
          g.fillCircle(pickup.x, pickup.y, 16);
          g.lineStyle(3, COLORS.white, 0.9);
          g.strokeCircle(pickup.x, pickup.y, 16);
          drawStar(g, pickup.x, pickup.y, 3, 7, 5, Math.PI / 2, COLORS.white, COLORS.ink, 0.85);
        } else if (pickup.type === "repellent") {
          g.fillStyle(COLORS.cactus, 1);
          g.fillRect(pickup.x - 8, pickup.y - 12, 16, 24);
          g.fillRect(pickup.x - 3, pickup.y - 16, 6, 6);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeRect(pickup.x - 8, pickup.y - 12, 16, 24);
        }
      }

      function drawCollectible(g, item) {
        if (item.type === "gold") {
          const points = [
            { x: item.x - 6, y: item.y - 4 },
            { x: item.x - 2, y: item.y - 8 },
            { x: item.x + 6, y: item.y - 5 },
            { x: item.x + 7, y: item.y + 2 },
            { x: item.x + 1, y: item.y + 6 },
            { x: item.x - 7, y: item.y + 4 }
          ];
          fillStrokePolygon(g, points, COLORS.gold, 1, COLORS.ink, 3);
        } else {
          g.fillStyle(COLORS.silver, 1);
          g.fillCircle(item.x, item.y, 9);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeCircle(item.x, item.y, 9);
        }
      }

      function drawPellet(g, pellet) {
        pellet.trail.forEach((node, index) => {
          g.fillStyle(COLORS.charcoal, 0.16 - index * 0.04);
          g.fillCircle(node.x, node.y, 4 - index);
        });
        g.fillStyle(0x5A5A5A, 1);
        g.fillEllipse(pellet.x, pellet.y, 10, 5);
        g.lineStyle(2, COLORS.ink, 1);
        g.strokeEllipse(pellet.x, pellet.y, 10, 5);
      }

      function drawEffect(g, effect) {
        const alpha = clamp(effect.life / effect.maxLife, 0, 1);
        if (effect.type === "dust" || effect.type === "particle") {
          g.fillStyle(effect.color, alpha);
          g.fillCircle(effect.x, effect.y, effect.radius + (1 - alpha) * 4);
        } else if (effect.type === "ring") {
          const r = lerp(effect.endRadius, effect.radius, alpha);
          g.lineStyle(4, effect.color, alpha);
          g.strokeCircle(effect.x, effect.y, r);
        } else if (effect.type === "debris") {
          const hw = effect.w / 2;
          const hh = effect.h / 2;
          const c = Math.cos(effect.angle);
          const s = Math.sin(effect.angle);
          const points = [
            { x: effect.x + (-hw * c - -hh * s), y: effect.y + (-hw * s + -hh * c) },
            { x: effect.x + ( hw * c - -hh * s), y: effect.y + ( hw * s + -hh * c) },
            { x: effect.x + ( hw * c -  hh * s), y: effect.y + ( hw * s +  hh * c) },
            { x: effect.x + (-hw * c -  hh * s), y: effect.y + (-hw * s +  hh * c) }
          ];
          fillStrokePolygon(g, points, effect.color, alpha, COLORS.ink, 2);
        }
      }

      // ============================================================
      // Phaser bootstrap
      // ============================================================
      const game = new Phaser.Game({
        type: Phaser.AUTO,
        width: GAME_W,
        height: GAME_H,
        backgroundColor: CSS.parchment,
        parent: document.body,
        physics: {
          default: "arcade",
          arcade: {
            gravity: { y: GRAVITY },
            debug: false
          }
        },
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH
        },
        scene: [MenuScene, GameScene]
      });

      game.audioEngine = new AudioEngine();
    })();
  </script>
</body>
</html>
