      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function map(value, inMin, inMax, outMin, outMax) {
        const t = clamp((value - inMin) / (inMax - inMin), 0, 1);
        return lerp(outMin, outMax, t);
      }

        for (const sheet of BANDIT_SHEETS) {

          const texture = scene.textures.get(sheet.key);
          if (texture && texture.setFilter) {

          }

      function getBanditDirectionForState(state) {
        const moveIntent = clamp((state.vx || 0) / PLAYER_SPEED, -1, 1);
        if (Math.abs(moveIntent) < 0.08) {
          return "south";
        }
        return moveIntent < 0 ? "west" : "east";
      }

      function ensureBanditAnimations(scene) {
        if (!scene || !scene.anims || !scene.anims.create) {
          return;
        }
        const defs = [
          { key: "bandit-idle-south", sheet: "bandit-idle-south", end: 3, fps: 6, repeat: -1 },
          { key: "bandit-idle-east", sheet: "bandit-idle-east", end: 3, fps: 6, repeat: -1 },
          { key: "bandit-idle-west", sheet: "bandit-idle-west", end: 3, fps: 6, repeat: -1 },

          { key: "bandit-run-east", sheet: "bandit-run-east", end: 7, fps: 12, repeat: -1 },
          { key: "bandit-run-west", sheet: "bandit-run-west", end: 7, fps: 12, repeat: -1 },
          { key: "bandit-jump-south", sheet: "bandit-jump-south", end: 8, fps: 14, repeat: 0 },
          { key: "bandit-shoot-south", sheet: "bandit-shoot-south", end: 6, fps: 18, repeat: 0 }
        ];

        for (const def of defs) {
          if (scene.anims.exists && scene.anims.exists(def.key)) {
            continue;
          }
          scene.anims.create({
            key: def.key,
            frames: scene.anims.generateFrameNumbers(def.sheet, { start: 0, end: def.end }),
            frameRate: def.fps,
            repeat: def.repeat
          });
        }
      }

      function getBanditAnimKeyForState(state) {
        const dir = getBanditDirectionForState(state);
        const moving = Math.abs(state.vx || 0) > PLAYER_SPEED * 0.15;
        const ascending = (state.vy || 0) < -260;
        const shooting = !!state.shooting;

        // Shoot is a snappy one-shot; only front-facing exists right now.
        if (shooting && dir === "south") {
          return "bandit-shoot-south";
        }

        // Jump read is best when front-facing; otherwise keep directional run/idle.
        if (ascending && dir === "south") {
          return "bandit-jump-south";
        }

        if (moving) {
          return `bandit-run-${dir}`;
        }
        return `bandit-idle-${dir}`;
      }

      function syncBanditSprite(sprite, state, time, baseScale, yOffset = 0) {
        if (!sprite) {
          return;
        }

        const animKey = getBanditAnimKeyForState(state);
        if (sprite.anims && sprite.anims.play && sprite.anims.currentAnim?.key !== animKey) {
          sprite.play(animKey, true);
        } else if (sprite.setTexture) {
          // Fallback for any non-sprite GameObject (shouldn't happen anymore).
          sprite.setTexture(animKey);
        }
        sprite.setPosition(state.x, state.y + yOffset);
        sprite.setScale(baseScale * state.scaleX, baseScale * state.scaleY);
        sprite.setAlpha(state.flash && Math.floor(time / 50) % 2 === 0 ? 0.5 : 1);
      }

        const ca = Phaser.Display.Color.IntegerToColor(a);
        const cb = Phaser.Display.Color.IntegerToColor(b);
        return Phaser.Display.Color.GetColor(
          Math.round(lerp(ca.red, cb.red, t)),
          Math.round(lerp(ca.green, cb.green, t)),
          Math.round(lerp(ca.blue, cb.blue, t))
        );
      }

      function chooseWeighted(weights) {
        const total = Object.values(weights).reduce((sum, n) => sum + n, 0);
        let roll = Math.random() * total;
        for (const [key, value] of Object.entries(weights)) {
          roll -= value;
          if (roll <= 0) {
            return key;
          }
        }
        return Object.keys(weights)[0];
      }

      function noisyBox(x, y, w, h, jitter) {
        return [
          { x: x - w / 2 + Phaser.Math.Between(-jitter, jitter), y: y - h / 2 + Phaser.Math.Between(-jitter, jitter) },
          { x: x + w / 2 + Phaser.Math.Between(-jitter, jitter), y: y - h / 2 + Phaser.Math.Between(-jitter, jitter) },
          { x: x + w / 2 + Phaser.Math.Between(-jitter, jitter), y: y + h / 2 + Phaser.Math.Between(-jitter, jitter) },
          { x: x - w / 2 + Phaser.Math.Between(-jitter, jitter), y: y + h / 2 + Phaser.Math.Between(-jitter, jitter) }
        ];
      }

      function pathPolygon(g, points) {
        g.beginPath();
        g.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i += 1) {
          g.lineTo(points[i].x, points[i].y);
        }
        g.closePath();
      }

      function fillStrokePolygon(g, points, fillColor, fillAlpha, strokeColor, lineWidth) {
        g.fillStyle(fillColor, fillAlpha);
        pathPolygon(g, points);
        g.fillPath();
        g.lineStyle(lineWidth, strokeColor, 1);
        pathPolygon(g, points);
        g.strokePath();
      }

      function drawDashedLine(g, x1, y1, x2, y2, dash, gap, color, width, alpha) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        const step = dash + gap;
        const dirX = dx / len;
        const dirY = dy / len;
        g.lineStyle(width, color, alpha);
        for (let d = 0; d < len; d += step) {
          const start = d;
          const end = Math.min(d + dash, len);
          g.beginPath();
          g.moveTo(x1 + dirX * start, y1 + dirY * start);
          g.lineTo(x1 + dirX * end, y1 + dirY * end);
          g.strokePath();
        }
      }

      function drawDashedPolygon(g, points, dash, gap, color, width, alpha) {
        for (let i = 0; i < points.length; i += 1) {
          const a = points[i];
          const b = points[(i + 1) % points.length];
          drawDashedLine(g, a.x, a.y, b.x, b.y, dash, gap, color, width, alpha);
        }
      }

      function drawStar(g, x, y, innerRadius, outerRadius, points, rotation, fillColor, strokeColor, alpha) {
        const verts = [];
        const total = points * 2;
        for (let i = 0; i < total; i += 1) {
          const radius = i % 2 === 0 ? outerRadius : innerRadius;
          const angle = rotation + (Math.PI * i) / points;
          verts.push({ x: x + Math.cos(angle) * radius, y: y + Math.sin(angle) * radius });
        }
        fillStrokePolygon(g, verts, fillColor, alpha, strokeColor, 2);
      }

      function rectsOverlap(a, b) {
        return (
          Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
          Math.abs(a.y - b.y) < (a.h + b.h) / 2
        );
      }

      function distance(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
      }

      function wrapPlayableX(x) {
        let wrapped = x;
        while (wrapped < PLAYFIELD_MIN_X) {
          wrapped += PLAYFIELD_WRAP_SPAN;
        }
        while (wrapped > PLAYFIELD_MAX_X) {
          wrapped -= PLAYFIELD_WRAP_SPAN;
        }
        return clamp(wrapped, PLAYFIELD_MIN_X, PLAYFIELD_MAX_X);
      }

      function shortestWrappedDelta(fromX, toX) {
        const direct = toX - fromX;
        const wrappedLeft = direct - PLAYFIELD_WRAP_SPAN;
        const wrappedRight = direct + PLAYFIELD_WRAP_SPAN;
        const candidates = [direct, wrappedLeft, wrappedRight];
        return candidates.reduce((best, value) => (Math.abs(value) < Math.abs(best) ? value : best), direct);
      }

      function jumpFlightTimeForGap(jumpVelocity, verticalGap) {
        const jumpSpeed = Math.abs(jumpVelocity);
        const discriminant = jumpSpeed * jumpSpeed - 2 * GRAVITY * verticalGap;
        if (discriminant <= 0) {
          return 0;
        }
        return (jumpSpeed + Math.sqrt(discriminant)) / GRAVITY;
      }

      function formatPoints(value) {

          if (score >= tier.threshold) {
            earned = tier;
          } else if (!next) {
            next = tier;
          }
        }

        return { earned, next };
      }

      function getMedalProgressText(score) {
        const { earned, next } = getMedalStatus(score);
        if (earned && next) {
          return `${earned.label} MEDAL - ${next.label} AT ${formatPoints(next.threshold)} FT`;
        }
        if (earned) {
          return `${earned.label} MEDAL EARNED`;
        }
        return `NEXT MEDAL: BRONZE AT ${formatPoints(MEDAL_TIERS[0].threshold)} FT`;
      }

      function getMedalDisplayColor(score) {
        const { earned } = getMedalStatus(score);
        return earned ? earned.color : COLORS.woodDark;
      }

      function canUseOnlineLeaderboard() {
        return typeof window !== "undefined" && /^https?:$/i.test(window.location.protocol || "");
      }

      function sanitizeLeaderboardName(name) {
        return (name || "")
          .toUpperCase()
          .replace(/[^A-Z0-9 .'-]/g, "")
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, 12);
      }

      function formatLeaderboardEntries(entries) {
        if (!entries || entries.length === 0) {
          return "No outlaws posted yet.";
        }
        return entries
          .slice(0, 3)
          .map((entry, index) => `${index + 1}. ${entry.name} - ${formatPoints(entry.score)} FT`)
          .join("\n");
      }

      function bootDotsText(count) {
        return "● ".repeat(count).trim();
      }

      function isTouchDevice() {
        return typeof navigator !== "undefined" && (navigator.maxTouchPoints > 0 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent || ""));
      }

      function supportsTiltControls() {
        return typeof window !== "undefined" && (typeof window.DeviceOrientationEvent !== "undefined" || typeof window.DeviceMotionEvent !== "undefined");
      }

      function needsExplicitTiltPermission() {
        return typeof window !== "undefined" && (
          (typeof window.DeviceMotionEvent !== "undefined" && typeof window.DeviceMotionEvent.requestPermission === "function") ||
          (typeof window.DeviceOrientationEvent !== "undefined" && typeof window.DeviceOrientationEvent.requestPermission === "function")
        );
      }

      function isMotionSecureContext() {
        return typeof window !== "undefined" && !!window.isSecureContext;
      }

      function getScreenAngle() {
        if (typeof window === "undefined") {
          return 0;
        }
        if (window.screen && window.screen.orientation && typeof window.screen.orientation.angle === "number") {
          return window.screen.orientation.angle;
        }
        if (typeof window.orientation === "number") {
          return window.orientation;
        }
        return 0;
      }

      async function requestSensorPermission(sensorCtor) {
        if (typeof sensorCtor === "undefined") {
          return false;
        }
        const request = sensorCtor.requestPermission;
        if (typeof request === "function") {
          try {
            const result = await request.call(sensorCtor);
            return result === "granted";
          } catch (error) {
            return false;
          }
        }
        return true;
      }

      async function requestTiltPermission() {
        if (!supportsTiltControls()) {
          return false;
        }

        if (needsExplicitTiltPermission() && !isMotionSecureContext()) {
          return false;
        }

        if (typeof window.DeviceMotionEvent !== "undefined" && typeof window.DeviceMotionEvent.requestPermission === "function") {
          const granted = await requestSensorPermission(window.DeviceMotionEvent);
          if (granted) {
            return true;
          }
        }

        if (typeof window.DeviceOrientationEvent !== "undefined" && typeof window.DeviceOrientationEvent.requestPermission === "function") {
          return requestSensorPermission(window.DeviceOrientationEvent);
        }

        return true;
      }

      // ============================================================
      // Procedural Web Audio manager
      // ============================================================
      class AudioEngine {
        constructor() {
          this.ctx = null;
          this.master = null;
          this.jetpackOsc = null;
          this.jetpackGain = null;
          this.rumbleOsc = null;
          this.rumbleGain = null;
          this.unlocked = false;
        }

        unlock() {
          if (!this.ctx) {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) {
              return;
            }
            this.ctx = new Ctx();
            this.master = this.ctx.createGain();
            this.master.gain.value = 0.22;
            this.master.connect(this.ctx.destination);
          }
          if (this.ctx.state !== "running") {
            this.ctx.resume();
          }
          this.unlocked = true;
        }

        now() {
          return this.ctx ? this.ctx.currentTime : 0;
        }

        osc(type, frequency, gain, duration, sweepTo) {
          if (!this.unlocked || !this.ctx) {
            return;
          }
          const osc = this.ctx.createOscillator();
          const amp = this.ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(frequency, this.now());
          if (typeof sweepTo === "number") {
            osc.frequency.exponentialRampToValueAtTime(Math.max(20, sweepTo), this.now() + duration);
          }
          amp.gain.setValueAtTime(gain, this.now());
          amp.gain.exponentialRampToValueAtTime(0.0001, this.now() + duration);
          osc.connect(amp);
          amp.connect(this.master);
          osc.start();
          osc.stop(this.now() + duration);
        }

        noise(duration, gainValue) {
          if (!this.unlocked || !this.ctx) {
            return;
          }
          const sampleRate = this.ctx.sampleRate;
          const buffer = this.ctx.createBuffer(1, sampleRate * duration, sampleRate);
          const channel = buffer.getChannelData(0);
          for (let i = 0; i < channel.length; i += 1) {
            channel[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / channel.length, 2);
          }
          const source = this.ctx.createBufferSource();
          const filter = this.ctx.createBiquadFilter();
          const amp = this.ctx.createGain();
          filter.type = "lowpass";
          filter.frequency.value = 200;
          amp.gain.value = gainValue;
          source.buffer = buffer;
          source.connect(filter);
          filter.connect(amp);
          amp.connect(this.master);
          source.start();
        }

        jump() {
          this.osc("sine", 520, 0.08, 0.08, 340);
        }

        land() {
          this.noise(0.06, 0.05);
        }

        shoot() {
          this.osc("square", 1200, 0.035, 0.04, 780);
        }

        collectGold() {
          this.osc("sine", 523, 0.05, 0.04);
          setTimeout(() => this.osc("sine", 659, 0.05, 0.04), 45);
          setTimeout(() => this.osc("sine", 784, 0.05, 0.05), 90);
        }

        collectSilver() {
          this.osc("triangle", 392, 0.06, 0.05);
          setTimeout(() => this.osc("triangle", 494, 0.05, 0.07), 55);
        }

        enemyDeath() {
          this.osc("triangle", 200, 0.05, 0.15, 80);
        }

        powerup() {
          this.osc("sawtooth", 300, 0.05, 0.2, 900);
        }

        gameOver() {
          this.osc("triangle", 400, 0.08, 0.6, 100);
        }

        setJetpack(active) {
          if (!this.unlocked || !this.ctx) {
            return;
          }
          if (active) {
            if (!this.jetpackOsc) {
              this.jetpackOsc = this.ctx.createOscillator();
              this.jetpackGain = this.ctx.createGain();
              this.jetpackOsc.type = "sawtooth";
              this.jetpackOsc.frequency.value = 140;
              this.jetpackGain.gain.value = 0.03;
              this.jetpackOsc.connect(this.jetpackGain);
              this.jetpackGain.connect(this.master);
              this.jetpackOsc.start();
            }
          } else if (this.jetpackOsc) {
            this.jetpackOsc.stop();
            this.jetpackOsc.disconnect();
            this.jetpackGain.disconnect();
            this.jetpackOsc = null;
            this.jetpackGain = null;
          }
        }

        setBlackHoleLevel(level) {
          if (!this.unlocked || !this.ctx) {
            return;
          }
          if (!this.rumbleOsc) {
            this.rumbleOsc = this.ctx.createOscillator();
            this.rumbleGain = this.ctx.createGain();
            this.rumbleOsc.type = "triangle";
            this.rumbleOsc.frequency.value = 46;
            this.rumbleGain.gain.value = 0;
            this.rumbleOsc.connect(this.rumbleGain);
            this.rumbleGain.connect(this.master);
            this.rumbleOsc.start();
          }
          this.rumbleGain.gain.linearRampToValueAtTime(level * 0.07, this.now() + 0.03);
        }

        stopAll() {
          this.setJetpack(false);
          this.setBlackHoleLevel(0);
        }
      }

      // ============================================================
      // Shared background sketchbook renderer
      // ============================================================
      function getThemeAlpha(altitude, min, max) {
        if (altitude <= min) {
          return 0;
        }
        if (altitude >= max) {
          return 1;
        }
        return clamp((altitude - min) / (max - min), 0, 1);
      }

      function getThemeBaseColor(altitude) {
        if (altitude < 1000) {
          return COLORS.parchment;
        }
        if (altitude < 1000 + THEME_BLEND) {
          return mixColor(COLORS.parchment, 0xD8B38E, (altitude - 1000) / THEME_BLEND);
        }
        if (altitude < 3000) {
          return 0xD8B38E;
        }
        if (altitude < 3000 + THEME_BLEND) {
          return mixColor(0xD8B38E, COLORS.nightBrown, (altitude - 3000) / THEME_BLEND);
        }
        if (altitude < 5000) {
          return COLORS.nightBrown;
        }
        if (altitude < 5000 + THEME_BLEND) {
          return mixColor(COLORS.nightBrown, COLORS.indigo, (altitude - 5000) / THEME_BLEND);
        }
        return COLORS.indigo;
      }

      function drawBackgroundBase(g, baseColor) {
        g.clear();
        g.fillStyle(baseColor, 1);
        g.fillRect(0, 0, GAME_W, GAME_H);
        g.lineStyle(1, 0x8B6538, 0.07);
        for (let y = 0; y < GAME_H + 28; y += 28) {
          g.beginPath();
          g.moveTo(0, y);
          g.lineTo(GAME_W, y);
          g.strokePath();
        }
        g.lineStyle(2, 0xB45028, 0.18);
        g.beginPath();
        g.moveTo(58, 0);
        g.lineTo(58, GAME_H);
        g.strokePath();
      }

      function getBackgroundBaseBlend(altitude) {
        if (altitude < 1000) {
          return { primary: "parchment", secondary: null, alpha: 0 };
        }
        if (altitude < 1000 + THEME_BLEND) {
          return { primary: "parchment", secondary: "mesa", alpha: (altitude - 1000) / THEME_BLEND };
        }
        if (altitude < 3000) {
          return { primary: "mesa", secondary: null, alpha: 0 };
        }
        if (altitude < 3000 + THEME_BLEND) {
          return { primary: "mesa", secondary: "night", alpha: (altitude - 3000) / THEME_BLEND };
        }
        if (altitude < 5000) {
          return { primary: "night", secondary: null, alpha: 0 };
        }
        if (altitude < 5000 + THEME_BLEND) {
          return { primary: "night", secondary: "indigo", alpha: (altitude - 5000) / THEME_BLEND };
        }
        return { primary: "indigo", secondary: null, alpha: 0 };
      }

      function drawSketchbookBackground(scene, g, altitude, scrollY, time) {
        const mesaAlpha = clamp(getThemeAlpha(altitude, 900, 1200) - getThemeAlpha(altitude, 3000, 3200), 0, 1);
        const lanternAlpha = clamp(getThemeAlpha(altitude, 2900, 3200) - getThemeAlpha(altitude, 5000, 5200), 0, 1);
        const starsAlpha = getThemeAlpha(altitude, 4900, 5200);
        const tumbleX = ((time * 0.06) % (GAME_W + 80)) - 40;

        g.clear();

        g.lineStyle(3, COLORS.cactus, 0.22);
        g.strokeCircle(tumbleX, GAME_H * 0.55 + Math.sin(time * 0.002) * 12, 18);
        g.beginPath();
        g.moveTo(tumbleX - 14, GAME_H * 0.55 + 2);
        g.lineTo(tumbleX + 14, GAME_H * 0.55 - 4);
        g.strokePath();

        if (mesaAlpha > 0.01) {
          const offset = (scrollY * 0.06) % 180;
          g.fillStyle(0xA95D37, mesaAlpha * 0.72);
          const mesaA = [
            { x: -20, y: GAME_H - 110 + offset * 0.04 },
            { x: 58, y: GAME_H - 180 + offset * 0.02 },
            { x: 120, y: GAME_H - 120 },
            { x: 180, y: GAME_H - 160 },
            { x: 250, y: GAME_H - 100 },
            { x: 250, y: GAME_H }
          ];
          const mesaB = [
            { x: 180, y: GAME_H - 80 },
            { x: 260, y: GAME_H - 170 },
            { x: 332, y: GAME_H - 150 },
            { x: 412, y: GAME_H - 210 },
            { x: 520, y: GAME_H - 100 },
            { x: 520, y: GAME_H }
          ];
          pathPolygon(g, mesaA);
          g.fillPath();
          pathPolygon(g, mesaB);
          g.fillPath();
          g.fillStyle(0xC4704A, mesaAlpha * 0.12);
          g.fillRect(0, 0, GAME_W, GAME_H);
        }

        if (lanternAlpha > 0.01) {
          const lanternY = [110, 230, 360, 510, 660];
          lanternY.forEach((y, index) => {
            const x = index % 2 === 0 ? 28 : GAME_W - 28;
            const sway = Math.sin(time * 0.002 + index) * 3;
            const bodyY = y + sway;
            const frameX = index % 2 === 0 ? x + 8 : x - 8;
            const chainX = frameX;

            g.lineStyle(2, COLORS.ink, lanternAlpha * 0.55);
            g.beginPath();
            g.moveTo(chainX, bodyY - 34);
            g.lineTo(chainX, bodyY - 22);
            g.strokePath();
            g.beginPath();
            g.moveTo(chainX - 4, bodyY - 34);
            g.lineTo(chainX + 4, bodyY - 34);
            g.strokePath();

            g.fillStyle(COLORS.oldBrass, lanternAlpha * 0.95);
            g.fillRect(frameX - 9, bodyY - 16, 18, 24);
            g.lineStyle(3, COLORS.ink, lanternAlpha * 0.85);
            g.strokeRect(frameX - 9, bodyY - 16, 18, 24);

            g.fillStyle(COLORS.gold, lanternAlpha * 0.55);
            g.fillRect(frameX - 6, bodyY - 11, 12, 14);
            g.fillStyle(COLORS.gold, lanternAlpha * 0.22);
            g.fillTriangle(frameX - 7, bodyY + 10, frameX + 7, bodyY + 10, frameX, bodyY + 24);
            g.fillStyle(COLORS.gold, lanternAlpha * 0.12);
            g.fillTriangle(frameX - 11, bodyY + 10, frameX + 11, bodyY + 10, frameX, bodyY + 31);
            g.lineStyle(2, COLORS.ink, lanternAlpha * 0.3);
            g.beginPath();
            g.moveTo(frameX, bodyY - 11);
            g.lineTo(frameX, bodyY + 3);
            g.strokePath();
            g.beginPath();
            g.moveTo(frameX - 6, bodyY - 4);
            g.lineTo(frameX + 6, bodyY - 4);
            g.strokePath();

            g.lineStyle(2, COLORS.ink, lanternAlpha * 0.8);
            g.beginPath();
            g.moveTo(frameX - 5, bodyY - 16);
            g.lineTo(frameX, bodyY - 22);
            g.lineTo(frameX + 5, bodyY - 16);
            g.strokePath();
            g.beginPath();
            g.moveTo(frameX - 4, bodyY + 8);
            g.lineTo(frameX, bodyY + 13);
            g.lineTo(frameX + 4, bodyY + 8);
            g.strokePath();

            g.lineStyle(2, COLORS.gold, lanternAlpha * 0.24);
            g.beginPath();
            g.moveTo(frameX - 12, bodyY - 3);
            g.lineTo(frameX - 18, bodyY - 3);
            g.strokePath();
            g.beginPath();
            g.moveTo(frameX + 12, bodyY - 3);
            g.lineTo(frameX + 18, bodyY - 3);
            g.strokePath();
            g.beginPath();
            g.moveTo(frameX - 10, bodyY + 6);
            g.lineTo(frameX - 15, bodyY + 10);
            g.strokePath();
            g.beginPath();
            g.moveTo(frameX + 10, bodyY + 6);
            g.lineTo(frameX + 15, bodyY + 10);
            g.strokePath();
          });
        }

        if (starsAlpha > 0.01) {
          if (!scene.bgStars) {
            scene.bgStars = Array.from({ length: IS_MOBILE ? 24 : 48 }, () => ({
              x: Phaser.Math.Between(14, GAME_W - 14),
              y: Phaser.Math.Between(18, GAME_H - 18),
              r: Phaser.Math.Between(1, 2)
            }));
          }
          g.fillStyle(COLORS.white, starsAlpha);
          scene.bgStars.forEach((star) => {
            g.fillCircle(star.x, star.y, star.r);
          });
          g.lineStyle(2, COLORS.white, starsAlpha * 0.42);
          const hat = [
            { x: 98, y: 112 }, { x: 126, y: 88 }, { x: 152, y: 98 }, { x: 170, y: 130 }, { x: 120, y: 132 }, { x: 90, y: 124 }
          ];
          const pistol = [
            { x: 330, y: 190 }, { x: 366, y: 182 }, { x: 380, y: 202 }, { x: 358, y: 220 }, { x: 340, y: 240 }, { x: 324, y: 234 }
          ];
          for (let i = 0; i < hat.length - 1; i += 1) {
            g.beginPath();
            g.moveTo(hat[i].x, hat[i].y);
            g.lineTo(hat[i + 1].x, hat[i + 1].y);
            g.strokePath();
          }
          for (let i = 0; i < pistol.length - 1; i += 1) {
            g.beginPath();
            g.moveTo(pistol[i].x, pistol[i].y);
            g.lineTo(pistol[i + 1].x, pistol[i + 1].y);
            g.strokePath();
          }
        }
      }

          this.boardList = this.add.text(boardPanelX, boardListY, canUseOnlineLeaderboard() ? "Loading leaderboard..." : "Online board lives on the Vercel build.", {
            fontFamily: "Georgia, serif",
            fontSize: mobileBoard ? "14px" : "13px",
            fontStyle: "italic",
            color: "#6A513A",
            align: "center",
            lineSpacing: 4
          }).setOrigin(0.5, 0).setStroke("#F4E4BC", 2).setWordWrapWidth(boardWrapW).setVisible(false);

          this.boardButtonBounds = { x: boardButtonX, y: boardButtonY, w: boardButtonW, h: boardButtonH };
          this.boardCloseBounds = { x: boardCloseX, y: boardCloseY, w: 24, h: 24 };
          this.boardPanelBounds = { x: boardPanelX, y: boardPanelY, w: boardPanelW, h: boardPanelH };
          this.boardOpen = false;

          this.space = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
          this.menuRequiresExplicitTilt = showTiltButton;
          this.onMenuPointerDown = (pointer) => {
            if (this.handleMenuPointer(pointer)) {
              return;
            }
            if (!this.menuRequiresExplicitTilt) {
              void this.startGame();
            }
          };
          this.input.on("pointerdown", this.onMenuPointerDown);
          this.input.keyboard.once("keydown-SPACE", () => this.startGame());

          if (showTiltButton) {
            this.createMotionButton();
          }
          if (canUseOnlineLeaderboard()) {
            void this.loadLeaderboard();
          }
        }

        createMotionButton() {
          this.motionButton = document.createElement("button");
          this.motionButton.className = "motion-permission-btn";
          this.motionButton.textContent = "ENABLE TILT";
          this.motionButton.setAttribute("type", "button");

          this.positionMotionButton = () => {
            if (!this.motionButton || !this.game || !this.game.canvas) {
              return;
            }
            const rect = this.game.canvas.getBoundingClientRect();
            this.motionButton.style.left = `${rect.left + rect.width / 2 - 98}px`;
            this.motionButton.style.top = `${rect.top + rect.height * 0.73}px`;
            this.motionButton.style.width = "196px";
          };

          this.onMotionButtonPress = async (event) => {
            if (event && event.cancelable) {
              event.preventDefault();
            }
            if (this.motionButtonBusy) {
              return;
            }
            this.motionButtonBusy = true;
            const granted = await requestTiltPermission();
            if (granted) {
              this.controlsHint.setText("Tilt unlocked - steer by turning your phone");
              void this.startGame(true);
            } else {
              this.controlsHint.setText("Tilt permission was denied - allow motion access and try again");
              this.motionButtonBusy = false;
            }
          };

          this.motionButton.addEventListener("touchend", this.onMotionButtonPress, { passive: false });
          this.motionButton.addEventListener("click", this.onMotionButtonPress);
          document.body.appendChild(this.motionButton);
          this.positionMotionButton();
          window.addEventListener("resize", this.positionMotionButton);
        }

        shutdown() {
          if (this.onMenuPointerDown) {
            this.input.off("pointerdown", this.onMenuPointerDown);
          }
          if (this.motionButton) {
            this.motionButton.removeEventListener("touchend", this.onMotionButtonPress);
            this.motionButton.removeEventListener("click", this.onMotionButtonPress);
            this.motionButton.remove();
          }
          if (this.positionMotionButton) {
            window.removeEventListener("resize", this.positionMotionButton);
          }
          [
            this.bg,
            this.preview,
            this.previewBandit,
            this.titleShadow,
            this.title,
            this.subtitle,
            this.prompt,
            this.controlsHint,
            this.best,
            this.medalTrack,
            this.boardButtonBox,
            this.boardButtonText,
            this.boardPanel,
            this.boardPanelTitle,
            this.boardCloseText,
            this.boardList
          ].forEach((obj) => {
            if (obj && obj.destroy) {
              obj.destroy();
            }
          });
          this.bg = null;
          this.preview = null;
          this.previewBandit = null;
        }

        async startGame(forceMotionGranted) {
          if (this.starting) {
            return;
          }
          this.starting = true;
          this.audio.unlock();
          const motionGranted = typeof forceMotionGranted === "boolean" ? forceMotionGranted : await requestTiltPermission();
          this.scene.start("game", {
            motionGranted
          });
        }

        async loadLeaderboard() {
          try {
            const response = await fetch("/api/leaderboard");
            if (!response.ok) {
              throw new Error(`Leaderboard returned ${response.status}`);
            }
            const data = await response.json();
            this.boardList.setText(formatLeaderboardEntries(data.entries || []));
          } catch (error) {
            this.boardList.setText("Outlaw board unavailable right now.");
          }
        }

        setBoardOpen(open) {
          this.boardOpen = open;
          const visible = !!open;
          this.boardPanel.setVisible(visible);
          this.boardPanelTitle.setVisible(visible);
          this.boardCloseText.setVisible(visible);
          this.boardList.setVisible(visible);
        }

        handleMenuPointer(pointer) {
          const point = { x: pointer.x, y: pointer.y, w: 1, h: 1 };
          if (rectsOverlap(point, this.boardButtonBounds)) {
            this.setBoardOpen(!this.boardOpen);
            return true;
          }
          if (!this.boardOpen) {
            return false;
          }
          if (rectsOverlap(point, this.boardCloseBounds)) {
            this.setBoardOpen(false);
            return true;
          }
          if (!rectsOverlap(point, this.boardPanelBounds)) {
            this.setBoardOpen(false);
            return true;
          }
          return true;
        }

        update(time) {
          drawMenuParchment(this.bg, time);

          this.prompt.alpha = 0.35 + 0.65 * (0.5 + Math.sin(time * MENU_PROMPT_SPEED) * 0.5);

          const centerX = GAME_W / 2;
          const platformY = 520;
          const banditY = platformY - 58 - Math.abs(Math.sin((time / MENU_BOUNCE_PERIOD) * Math.PI)) * MENU_BOUNCE_HEIGHT;
          const previewState = {
            x: centerX,
            y: banditY,
            vx: Math.sin((time / MENU_BOUNCE_PERIOD) * Math.PI) * 120,
            vy: Math.cos((time / MENU_BOUNCE_PERIOD) * Math.PI) * 420,
            dir: 1,
            scaleX: 1,
            scaleY: 1,
            shooting: false,
            flash: 0,
            propeller: false,
            shield: false,
            jetpack: false,
            rocket: false
          };

          this.preview.clear();
          drawPlatform(this.preview, {
            x: centerX,
            y: platformY,
            w: 138,
            h: PLATFORM_H,
            type: "normal",
            noise: noisyBox(centerX, platformY, 138, PLATFORM_H, 2),
            grainOffsets: [-8, 0, 8],
            nails: [-34, 30]
          }, time);
          syncBanditSprite(this.previewBandit, previewState, time, BANDIT_MENU_SCALE, BANDIT_MENU_Y_OFFSET);
        }
      }

      // ============================================================
      // Game scene
      // ============================================================
      class GameScene extends Phaser.Scene {
        constructor() {
          super("game");
        }

        init(data) {
          this.motionGranted = !!(data && data.motionGranted);
        }

        preload() {
          preloadBanditTextures(this);
        }

        create() {
          this.audio = this.game.audioEngine || new AudioEngine();
          this.game.audioEngine = this.audio;
          this.audio.unlock();

          // Physics setup
          this.physics.world.gravity.y = GRAVITY;

          // Major render layers
          this.createRenderCaches();
          this.bgBase = this.add.image(GAME_W / 2, GAME_H / 2, this.backgroundBaseKeys.parchment).setScrollFactor(0).setDepth(-30);
          this.bgBlend = this.add.image(GAME_W / 2, GAME_H / 2, this.backgroundBaseKeys.parchment).setScrollFactor(0).setDepth(-29).setVisible(false).setAlpha(0);
          this.bg = this.add.graphics().setScrollFactor(0).setDepth(-20);
          this.worldLayer = this.add.graphics().setDepth(10);
          this.playerOverlayLayer = this.add.graphics().setDepth(16);
          this.uiLayer = this.add.graphics().setScrollFactor(0).setDepth(100);
          applyBanditTextureFilter(this);
          ensureBanditAnimations(this);
          this.playerSprite = this.add.sprite(GAME_W / 2, START_Y, "bandit-idle-south", 0)
            .setDepth(14)
            .setOrigin(0.5, BANDIT_SPRITE_ORIGIN_Y)
            .setScale(BANDIT_GAME_SCALE);

          // Invisible physics host for the player
          this.player = this.add.rectangle(GAME_W / 2, START_Y, PLAYER_BODY_W, PLAYER_BODY_H, 0xffffff, 0);
          this.physics.add.existing(this.player);
          this.player.body.setMaxVelocity(500, 2400);

          // Input
          this.cursors = this.input.keyboard.createCursorKeys();
          this.keys = this.input.keyboard.addKeys("A,D,SPACE,ENTER");
          this.lastTouchShotAt = 0;
          this.onPointerDown = (pointer) => {
            if (this.gameOverShown) {
              this.handleOverlayPointer(pointer);
              return;
            }
            if (IS_MOBILE && performance.now() - this.lastTouchShotAt < 450) {
              return;
            }
            void this.ensureMotionPermission();
            const aimPoint = this.cameras.main
              ? this.cameras.main.getWorldPoint(pointer.x, pointer.y)
              : { x: pointer.x, y: pointer.y };
            this.tryShoot(aimPoint.x, aimPoint.y);
          };
          this.input.on("pointerdown", this.onPointerDown);
          this.onPointerUp = (pointer) => {
            if (this.gameOverShown) {
              this.handleOverlayPointer(pointer);
            }
          };
          this.input.on("pointerup", this.onPointerUp);
          if (IS_MOBILE && this.game.canvas) {
            this.onCanvasTouchStart = (event) => {
              if (this.gameOverShown) {
                return;
              }
              const touch = event.changedTouches && event.changedTouches[0];
              if (!touch) {
                return;
              }
              if (event.cancelable) {
                event.preventDefault();
              }
              void this.ensureMotionPermission();
              const rect = this.game.canvas.getBoundingClientRect();
              const localX = ((touch.clientX - rect.left) / rect.width) * GAME_W;
              const localY = ((touch.clientY - rect.top) / rect.height) * GAME_H;
              const aimPoint = this.cameras.main
                ? this.cameras.main.getWorldPoint(localX, localY)
                : { x: localX, y: localY };
              this.lastTouchShotAt = performance.now();
              this.tryShoot(aimPoint.x, aimPoint.y);
            };
            this.game.canvas.addEventListener("touchstart", this.onCanvasTouchStart, { passive: false });
          }
          this.events.once(Phaser.Scenes.Events.SHUTDOWN, this.shutdown, this);
          this.setupMotionControls();

          // Core state
          this.playerState = {
            scaleX: 1,
            scaleY: 1,
            dir: 1,
            lastLandAt: 0,
            shootingUntil: 0,
            flashUntil: 0,
            jetpackUntil: 0,
            rocketUntil: 0,
            propellerUntil: 0,
            invincibleUntil: 0,
            springBoostActive: false,
            shield: false,
            springBoots: 0,
            repellentUntil: 0,
            abducting: false,
            abductionEnemy: null
          };

          this.highestY = this.player.y;
          this.bestScore = Number(localStorage.getItem(BEST_SCORE_KEY) || 0);
          this.lastShotAt = -SHOT_COOLDOWN;
          this.gameOverShown = false;
          this.pendingLeaderboardScore = 0;
          this.leaderboardSubmitMessage = "";
          this.awaitingLeaderboardName = false;
          this.topSpawnY = START_PLATFORM_Y;
          this.lastPlatformX = GAME_W / 2;
          this.lastSpawnPlatform = null;
          this.generatedPlatforms = 0;

          this.platforms = [];
          this.pickups = [];
          this.enemies = [];
          this.blackHoles = [];
          this.pellets = [];
          this.effects = [];
          this.poofTexts = [];
          this.idCounter = 1;

          this.createHUD();
          this.createGameOverOverlay();
          this.createLeaderboardNamePrompt();
          this.seedWorld();

          this.player.body.velocity.y = JUMP_VELOCITY;
          this.stretchLaunch();
          this.audio.jump();
          this.cameras.main.scrollY = 0;
        }

        hasSpringInvincibility(time = this.time.now) {
          return this.playerState.springBoostActive || time < this.playerState.invincibleUntil;
        }

        hasPowerupInvincibility(time = this.time.now) {
          return (
            this.hasSpringInvincibility(time) ||
            time < this.playerState.jetpackUntil ||
            time < this.playerState.rocketUntil ||
            time < this.playerState.propellerUntil ||
            this.playerState.springBoots > 0 ||
            time < this.playerState.repellentUntil
          );
        }

        createRenderCaches() {
          this.textureBuilder = this.make.graphics({ add: false });
          this.staticSpritePool = [];
          this.staticTextureKeys = new Set();
          this.backgroundBaseKeys = {
            parchment: "bg-base-parchment",
            mesa: "bg-base-mesa",
            night: "bg-base-night",
            indigo: "bg-base-indigo"
          };
          const backgroundColors = {
            parchment: COLORS.parchment,
            mesa: 0xD8B38E,
            night: COLORS.nightBrown,
            indigo: COLORS.indigo
          };

          Object.entries(this.backgroundBaseKeys).forEach(([name, key]) => {
            if (this.textures.exists(key)) {
              return;
            }
            drawBackgroundBase(this.textureBuilder, backgroundColors[name]);
            this.textureBuilder.generateTexture(key, GAME_W, GAME_H);
          });
          this.textureBuilder.clear();
        }

        getViewportBounds(topMargin = 0, bottomMargin = 0) {
          return {
            top: this.cameras.main.scrollY - topMargin,
            bottom: this.cameras.main.scrollY + GAME_H + bottomMargin
          };
        }

        isInUpdateBand(y, topMargin = UPDATE_MARGIN_TOP, bottomMargin = UPDATE_MARGIN_BOTTOM) {
          const scrollY = this.cameras.main.scrollY;
          return y >= scrollY - topMargin && y <= scrollY + GAME_H + bottomMargin;
        }

        isInRenderBand(y, topMargin = RENDER_MARGIN_TOP, bottomMargin = RENDER_MARGIN_BOTTOM) {
          const scrollY = this.cameras.main.scrollY;
          return y >= scrollY - topMargin && y <= scrollY + GAME_H + bottomMargin;
        }

        acquireStaticSprite(textureKey) {
          const sprite = this.staticSpritePool.pop() || this.add.image(0, 0, textureKey).setOrigin(0.5).setDepth(6);
          sprite.setTexture(textureKey);
          sprite.setVisible(true);
          return sprite;
        }

        releaseStaticSprite(sprite) {
          if (!sprite) {
            return;
          }
          sprite.setVisible(false);
          sprite.x = -9999;
          sprite.y = -9999;
          this.staticSpritePool.push(sprite);
        }

        releaseEntitySprite(entity) {
          if (!entity || !entity.sprite) {
            return;
          }
          this.releaseStaticSprite(entity.sprite);
          entity.sprite = null;
        }

        isPlatformSpriteCacheable(platform) {
          return platform.type === "normal" || platform.type === "movingV" || platform.type === "fragile";
        }

        getPlatformTextureKey(platform) {
          return `platform-${platform.type}-${platform.w}-${platform.spring ? 1 : 0}-${platform.variant}`;
        }

        ensurePlatformTexture(platform) {
          const key = this.getPlatformTextureKey(platform);
          if (this.staticTextureKeys.has(key) || this.textures.exists(key)) {
            this.staticTextureKeys.add(key);
            return key;
          }

          const textureW = platform.w + 32;
          const textureH = platform.spring ? 52 : 36;
          const centerX = textureW / 2;
          const centerY = textureH / 2 + (platform.spring ? 6 : 2);
          const noise = platform.noise.map((point) => ({
            x: centerX + (point.x - platform.x),
            y: centerY + (point.y - platform.y)
          }));

          const fakePlatform = {
            x: centerX,
            y: centerY,
            baseX: centerX,
            baseY: centerY,
            w: platform.w,
            h: platform.h,
            type: platform.type,
            noise,
            grainOffsets: platform.grainOffsets.slice(),
            nails: platform.nails.slice(),
            spring: platform.spring ? { xOffset: platform.spring.xOffset } : null,
            dir: 1,
            shakeUntil: 0,
            hiddenUntil: 0,
            explodeAt: 0,
            exploded: false
          };

          this.textureBuilder.clear();
          drawPlatform(this.textureBuilder, fakePlatform, 0);
          this.textureBuilder.generateTexture(key, textureW, textureH);
          this.textureBuilder.clear();
          this.staticTextureKeys.add(key);
          return key;
        }

        ensurePickupTexture(type) {
          const key = `pickup-${type}`;
          if (this.staticTextureKeys.has(key) || this.textures.exists(key)) {
            this.staticTextureKeys.add(key);
            return key;
          }

          const size = 44;
          this.textureBuilder.clear();
          drawPickup(this.textureBuilder, {
            type,
            x: size / 2,
            y: size / 2,
            bobPhase: 0,
            baseY: size / 2
          });
          this.textureBuilder.generateTexture(key, size, size);
          this.textureBuilder.clear();
          this.staticTextureKeys.add(key);
          return key;
        }

        syncPlatformSprite(platform, time) {
          if (!this.isPlatformSpriteCacheable(platform)) {
            this.releaseEntitySprite(platform);
            return false;
          }

          const visible = platform.visible && !platform.exploded && this.isInRenderBand(platform.y);
          if (!visible) {
            if (platform.sprite) {
              platform.sprite.setVisible(false);
            }
            return true;
          }

          const key = this.ensurePlatformTexture(platform);
          if (!platform.sprite) {
            platform.sprite = this.acquireStaticSprite(key);
          } else if (platform.sprite.texture.key !== key) {
            platform.sprite.setTexture(key);
          }

          const wobbleX = platform.shakeUntil > time ? Math.sin(time * 0.05) * 3 : 0;
          platform.sprite.setPosition(platform.x + wobbleX, platform.y);
          platform.sprite.setVisible(true);
          platform.sprite.setAlpha(1);
          return true;
        }

        syncPickupSprite(pickup) {
          const visible = this.isInRenderBand(pickup.y);
          if (!visible) {
            if (pickup.sprite) {
              pickup.sprite.setVisible(false);
            }
            return;
          }

          const key = this.ensurePickupTexture(pickup.type);
          if (!pickup.sprite) {
            pickup.sprite = this.acquireStaticSprite(key);
          } else if (pickup.sprite.texture.key !== key) {
            pickup.sprite.setTexture(key);
          }

          pickup.sprite.setPosition(pickup.x, pickup.y);
          pickup.sprite.setVisible(true);
        }

        updateBackgroundBase(altitude) {
          const blend = getBackgroundBaseBlend(altitude);
          this.bgBase.setTexture(this.backgroundBaseKeys[blend.primary]);
          if (blend.secondary) {
            this.bgBlend.setTexture(this.backgroundBaseKeys[blend.secondary]);
            this.bgBlend.setAlpha(blend.alpha);
            this.bgBlend.setVisible(true);
          } else {
            this.bgBlend.setVisible(false);
            this.bgBlend.setAlpha(0);
          }
        }

        // ------------------------------------------------------------
        // UI and overlay setup
        // ------------------------------------------------------------
        createHUD() {
          this.scoreText = this.add.text(HUD_X, 20, "0", {
            fontFamily: "Georgia, serif",

            fontStyle: "bold",
            color: CSS.ink
          }).setOrigin(0, 0).setScrollFactor(0).setDepth(120).setStroke("#F4E4BC", 2).setShadow(2, 2, "rgba(184,48,32,0.45)", 0);
        }

          }).setOrigin(0.5);

          }).setOrigin(0.5);
          this.gameOverLine = this.add.text(cx, GAME_OVER_LINE_Y, GOONER_LINES[0], {

            color: "#5E442C"
          }).setOrigin(0.5).setStroke("#F4E4BC", 2).setWordWrapWidth(300).setAlign("center");
          this.finalScore = this.add.text(cx, GAME_OVER_SCORE_Y, "0 FT", {
            fontFamily: "Georgia, serif",
            fontSize: "34px",
            fontStyle: "bold",
            color: CSS.ink
          }).setOrigin(0.5).setStroke("#F4E4BC", 3).setShadow(0, 2, "rgba(28,18,8,0.14)", 0);
          this.medalText = this.add.text(cx, GAME_OVER_MEDAL_Y, getMedalProgressText(0), {
            fontFamily: "Georgia, serif",
            fontSize: "15px",
            fontStyle: "bold",
            color: Phaser.Display.Color.IntegerToColor(getMedalDisplayColor(0)).rgba,
            align: "center"
          }).setOrigin(0.5).setStroke("#F4E4BC", 2).setWordWrapWidth(300).setShadow(0, 1, "rgba(28,18,8,0.10)", 0);
          this.submitBoardText = this.add.text(cx, GAME_OVER_SUBMIT_Y, "SAVE SCORE TO BOARD", {
            fontFamily: "Georgia, serif",
            fontSize: "16px",
            fontStyle: "bold",
            color: "#5E442C"
          }).setOrigin(0.5).setStroke("#F4E4BC", 2).setVisible(false);
          this.submitBoardHit = this.add.zone(cx, GAME_OVER_SUBMIT_Y, 240, 28).setInteractive({ useHandCursor: true }).setVisible(false);
          const rideBox = this.add.rectangle(cx, RIDE_AGAIN_Y, GAME_OVER_BUTTON_W, GAME_OVER_BUTTON_H, COLORS.parchment, 0.98).setStrokeStyle(3, COLORS.ink, 0.78);
          const rideText = this.add.text(cx, RIDE_AGAIN_Y, "RIDE AGAIN", {
            fontFamily: "Georgia, serif",
            fontSize: "26px",
            fontStyle: "bold",
            color: CSS.ink
          }).setOrigin(0.5).setStroke("#F4E4BC", 2);
          const rideHit = this.add.zone(cx, RIDE_AGAIN_Y, GAME_OVER_BUTTON_W, GAME_OVER_BUTTON_H).setInteractive({ useHandCursor: true });

          const saloonBox = this.add.rectangle(cx, SALOON_Y, GAME_OVER_BUTTON_W, GAME_OVER_BUTTON_H, COLORS.parchment, 0.98).setStrokeStyle(3, COLORS.ink, 0.78);
          const saloonText = this.add.text(cx, SALOON_Y, "SALOON", {
            fontFamily: "Georgia, serif",
            fontSize: "26px",
            fontStyle: "bold",
            color: CSS.ink
          }).setOrigin(0.5).setStroke("#F4E4BC", 2);
          const saloonHit = this.add.zone(cx, SALOON_Y, GAME_OVER_BUTTON_W, GAME_OVER_BUTTON_H).setInteractive({ useHandCursor: true });

          const activateRideAgain = () => {
            if (!this.overlay || !this.overlay.visible || this.overlay.alpha < 0.9) {
              return;
            }
            this.scene.restart();
          };
          const activateSaloon = () => {
            if (!this.overlay || !this.overlay.visible || this.overlay.alpha < 0.9) {
              return;
            }
            this.scene.start("menu");
          };
          const activateSubmitBoard = () => {
            if (!this.overlay || !this.overlay.visible || this.overlay.alpha < 0.9 || !this.pendingLeaderboardScore) {
              return;
            }
            this.showLeaderboardNamePrompt(this.pendingLeaderboardScore);
          };

          this.submitBoardHit.on("pointerdown", activateSubmitBoard);
          this.submitBoardHit.on("pointerup", activateSubmitBoard);
          rideHit.on("pointerdown", activateRideAgain);
          rideHit.on("pointerup", activateRideAgain);
          saloonHit.on("pointerdown", activateSaloon);
          saloonHit.on("pointerup", activateSaloon);

        getRandomGameOverLine() {

          }

        // ------------------------------------------------------------
        // World generation
        // ------------------------------------------------------------
        seedWorld() {
          const startPlatform = this.createPlatform(GAME_W / 2, START_PLATFORM_Y, "normal", PLATFORM_W + 30, true);
          this.platforms.push(startPlatform);
          this.generatedPlatforms = 1;
          this.topSpawnY = START_PLATFORM_Y;
          this.lastSpawnPlatform = startPlatform;
          this.lastPlatformX = startPlatform.x;
          while (this.topSpawnY > -GAME_H) {
            this.spawnPlatformRow();
          }
        }

        getAltitudeBand(altitude) {
          return PLATFORM_TABLE.find((entry) => altitude < entry.ceiling) || PLATFORM_TABLE[PLATFORM_TABLE.length - 1];
        }

        getEnemyWeights(altitude) {
          return altitude < 3500 ? ENEMY_WEIGHTS_LOW : ENEMY_WEIGHTS_HIGH;
        }

        getEnemyScreenCap(altitude) {
          if (altitude < 2200) {
            return 2;
          }
          if (altitude < 4500) {
            return 3;
          }
          return 4;
        }

        choosePlatformEnemyX(platform, enemyWidth) {
          const usableHalf = Math.max(16, platform.w / 2 - enemyWidth / 2 - 8);
          const laneHalf = PLATFORM_LANDING_STRIP / 2 + enemyWidth / 2;
          if (usableHalf <= laneHalf) {
            return null;
          }
          const edgeMin = laneHalf + 4;
          const edgeMax = usableHalf;
          const side = Math.random() > 0.5 ? 1 : -1;
          return wrapPlayableX(platform.x + side * Phaser.Math.Between(Math.round(edgeMin), Math.round(edgeMax)));
        }

        chooseAirEnemyX(platform, enemyWidth) {
          for (let attempt = 0; attempt < 8; attempt += 1) {
            const candidate = Phaser.Math.Between(40, GAME_W - 40);
            const laneDistance = Math.abs(shortestWrappedDelta(platform.x, candidate));
            if (laneDistance >= ENEMY_SAFE_LANE_WIDTH / 2 + enemyWidth / 2) {
              return candidate;
            }
          }
          return null;
        }

        canSpawnEnemyCandidate(enemy, platform, altitude) {
          let aliveCount = 0;
          for (const other of this.enemies) {
            if (!other.dead) {
              aliveCount += 1;
            }
          }
          if (aliveCount >= this.getEnemyScreenCap(altitude)) {
            return false;
          }

          const laneDistance = Math.abs(shortestWrappedDelta(platform.x, enemy.x));
          const requiredLane = enemy.platform ? PLATFORM_LANDING_STRIP / 2 + enemy.w / 2 : ENEMY_SAFE_LANE_WIDTH / 2 + enemy.w / 2;
          if (laneDistance < requiredLane) {
            return false;
          }

          let sameBandCount = 0;
          for (const other of this.enemies) {
            if (other.dead) {
              continue;
            }
            const verticalDistance = Math.abs(other.y - enemy.y);
            if (verticalDistance > ENEMY_BAND_SPACING) {
              continue;
            }
            sameBandCount += 1;
            if (Math.abs(shortestWrappedDelta(other.x, enemy.x)) < (other.w + enemy.w) / 2 + ENEMY_SAME_BAND_X_SPACING) {
              return false;
            }
          }

          if (sameBandCount >= 1) {
            return false;
          }

          return true;
        }

        getSpawnAnchor() {
          if (this.lastSpawnPlatform) {
            return this.lastSpawnPlatform;
          }
          if (this.platforms.length === 0) {
            return null;
          }
          return this.platforms.reduce((best, platform) => (!best || platform.y < best.y ? platform : best), null);
        }

        getSafeGapCap(altitude) {
          const gentleCap = altitude < SAFE_OPENING_ALTITUDE ? 118 : SAFE_VERTICAL_GAP_CAP;
          return clamp(gentleCap, 96, SAFE_VERTICAL_GAP_CAP);
        }

        getReachableCenterDelta(anchor, nextWidth, verticalGap, altitude) {
          const flightTime = jumpFlightTimeForGap(JUMP_VELOCITY, verticalGap);
          const horizontalTravel = PLAYER_SPEED * flightTime;
          const widthAssist = anchor.w * 0.5 + nextWidth * 0.5 - SAFE_JUMP_HORIZONTAL_MARGIN;
          const totalReach = Math.max(MIN_SPAWN_X_OFFSET, horizontalTravel + widthAssist);
          const challengeRatio = map(altitude, 0, 7000, EARLY_X_CHALLENGE, LATE_X_CHALLENGE);
          return Math.max(MIN_SPAWN_X_OFFSET, totalReach * challengeRatio);
        }

        chooseReachablePlatformX(anchor, nextWidth, verticalGap, altitude) {
          const maxOffset = this.getReachableCenterDelta(anchor, nextWidth, verticalGap, altitude);
          const minOffset = Math.min(MIN_SPAWN_X_OFFSET, maxOffset);
          let bestX = clamp(anchor.x, PLAYFIELD_MIN_X, PLAYFIELD_MAX_X);
          let bestDistance = 0;

          for (let attempt = 0; attempt < 8; attempt += 1) {
            const offsetMagnitude = Phaser.Math.Between(Math.round(minOffset), Math.round(maxOffset));
            const offset = offsetMagnitude * (Math.random() > 0.5 ? 1 : -1);
            const candidate = wrapPlayableX(anchor.x + offset);
            const wrappedDistance = Math.abs(shortestWrappedDelta(anchor.x, candidate));
            if (wrappedDistance <= maxOffset + 1) {
              return candidate;
            }
            if (wrappedDistance > bestDistance) {
              bestDistance = wrappedDistance;
              bestX = candidate;
            }
          }

          return bestX;
        }

        spawnPlatformRow() {
          const anchor = this.getSpawnAnchor() || { x: GAME_W / 2, y: START_PLATFORM_Y, w: PLATFORM_W + 30 };
          const altitude = Math.max(0, START_Y - anchor.y);
          const band = this.getAltitudeBand(altitude);
          const openingKickoff = this.generatedPlatforms < OPENING_PLATFORM_COUNT;
          const gapMin = openingKickoff ? OPENING_GAP_MIN : band.gapMin;
          const gapCap = openingKickoff
            ? OPENING_GAP_MAX
            : Math.min(band.gapMax, this.getSafeGapCap(altitude));
          const gap = Phaser.Math.Between(gapMin, gapCap);
          const nextY = anchor.y - gap;

          const type = openingKickoff
            ? OPENING_PLATFORM_PATTERN[Math.min(OPENING_PLATFORM_PATTERN.length - 1, this.generatedPlatforms - 1)]
            : altitude < SAFE_OPENING_ALTITUDE
            ? (Math.random() < 0.76 ? "normal" : "movingH")
            : chooseWeighted(band.weights);
          const width = PLATFORM_W + Phaser.Math.Between(-10, 18);
          const challengeAltitude = openingKickoff ? OPENING_CHALLENGE_ALTITUDE : altitude;
          const x = this.chooseReachablePlatformX(anchor, width, gap, challengeAltitude);
          const platform = this.createPlatform(x, nextY, type, width, false);
          this.topSpawnY = nextY;
          this.lastPlatformX = x;
          this.lastSpawnPlatform = platform;
          this.generatedPlatforms += 1;

          if (type === "normal" && Math.random() < band.springChance) {
            platform.spring = {
              xOffset: Phaser.Math.Between(-22, 22)
            };
          }

          this.platforms.push(platform);
          this.maybeSpawnPowerup(platform, altitude);
          this.maybeSpawnEnemy(platform, altitude);
          this.maybeSpawnBlackHole(platform, altitude);
        }

        createPlatform(x, y, type, width, safe) {
          const platform = {
            id: this.idCounter++,
            x,
            y,
            baseX: x,
            baseY: y,
            w: width,
            h: PLATFORM_H,
            type,
            noise: noisyBox(x, y, width, PLATFORM_H, 2),
            grainOffsets: [Phaser.Math.Between(-5, -1), Phaser.Math.Between(1, 5), Phaser.Math.Between(6, 10)],
            nails: [Phaser.Math.Between(-34, -22), Phaser.Math.Between(20, 34)],
            variant: Phaser.Math.Between(0, 2),
            dir: Math.random() > 0.5 ? 1 : -1,
            speed: PLATFORM_MOVING_SPEED,
            phase: Math.random() * Math.PI * 2,
            visible: true,
            active: true,
            safe,
            spring: null,
            hiddenUntil: 0,
            breakAt: 0,
            falling: false,
            fallSpeed: 0,
            respawnAt: 0,
            explodeAt: 0,
            exploded: false,
            shakeUntil: 0
          };
          return platform;
        }

        maybeSpawnPowerup(platform, altitude) {
          if (platform.safe || Math.random() > map(altitude, 0, 7000, 0.08, 0.13)) {
            return;
          }
          const powerupWeights = platform.spring
            ? {
                jetpack: POWERUP_WEIGHTS.jetpack,
                rocket: POWERUP_WEIGHTS.rocket,
                propeller: POWERUP_WEIGHTS.propeller,
                boots: POWERUP_WEIGHTS.boots,
                shield: POWERUP_WEIGHTS.shield,
                repellent: POWERUP_WEIGHTS.repellent
              }
            : POWERUP_WEIGHTS;
          const type = chooseWeighted(powerupWeights);
          this.pickups.push({
            id: this.idCounter++,
            type,
            x: platform.x + Phaser.Math.Between(-28, 28),
            y: platform.y - Phaser.Math.Between(36, 52),
            baseY: platform.y - Phaser.Math.Between(36, 52),
            bobPhase: Math.random() * Math.PI * 2,
            radius: PICKUP_RADIUS
          });
        }

        maybeSpawnEnemy(platform, altitude) {
          if (platform.safe || altitude < SAFE_ENEMY_START_ALTITUDE || this.playerState.repellentUntil > this.time.now || Math.random() > map(altitude, 0, 7000, 0.08, 0.18)) {
            return;
          }

          const type = chooseWeighted(this.getEnemyWeights(altitude));
          const enemy = {
            id: this.idCounter++,
            type,
            dead: false,
            stompPending: false,
            damaged: false,
            hitFlashUntil: 0,
            platform: null,
            baseY: platform.y,
            bobPhase: Math.random() * Math.PI * 2,
            beamCharge: 0,
            beamActive: false,
            dir: Math.random() > 0.5 ? 1 : -1,
            stepDistance: 0,
            stepIndex: 0
          };

          if (type === "snake") {
            const spawnX = this.choosePlatformEnemyX(platform, SNAKE_W);
            if (spawnX === null) {
              return;
            }
            enemy.x = spawnX;
            enemy.y = platform.y - 18;
            enemy.w = SNAKE_W;
            enemy.h = SNAKE_H;
            enemy.hp = 1;
            enemy.platform = platform;
          } else if (type === "heavy") {
            const spawnX = this.choosePlatformEnemyX(platform, HEAVY_W);
            if (spawnX === null) {
              return;
            }
            enemy.x = spawnX;
            enemy.y = platform.y - 26;
            enemy.w = HEAVY_W;
            enemy.h = HEAVY_H;
            enemy.hp = 2;
            enemy.platform = platform;
          } else if (type === "vulture") {
            const spawnX = this.chooseAirEnemyX(platform, VULTURE_W);
            if (spawnX === null) {
              return;
            }
            enemy.x = spawnX;
            enemy.y = platform.y - Phaser.Math.Between(56, 90);
            enemy.w = VULTURE_W;
            enemy.h = VULTURE_H;
            enemy.hp = 1;
          } else {
            const spawnX = this.chooseAirEnemyX(platform, UFO_W);
            if (spawnX === null) {
              return;
            }
            enemy.x = spawnX;
            enemy.y = platform.y - Phaser.Math.Between(64, 112);
            enemy.w = UFO_W;
            enemy.h = UFO_H;
            enemy.hp = 1;
          }

          if (!this.canSpawnEnemyCandidate(enemy, platform, altitude)) {
            return;
          }

          this.enemies.push(enemy);
        }

        maybeSpawnBlackHole(platform, altitude) {
          if (altitude < SAFE_BLACK_HOLE_START_ALTITUDE || Math.random() > map(altitude, SAFE_BLACK_HOLE_START_ALTITUDE, 7000, 0.05, 0.1)) {
            return;
          }
          const x = Phaser.Math.Between(70, GAME_W - 70);
          const y = platform.y - Phaser.Math.Between(86, 138);
          if (this.blackHoles.some((hole) => distance(hole.x, hole.y, x, y) < 240)) {
            return;
          }
          this.blackHoles.push({
            id: this.idCounter++,
            x,
            y,
            angle: Math.random() * Math.PI * 2,
            radius: 20
          });
        }

        // ------------------------------------------------------------
        // Update loop
        // ------------------------------------------------------------
        update(time, delta) {
          const dt = delta / 1000;
          const altitude = Math.max(0, START_Y - this.highestY);

          this.updatePlayerControl(time);
          this.updateCamera();
          this.updatePlatforms(time, dt);
          this.updatePickupsAndCollectibles(time);
          this.updateEnemies(time, dt);
          this.updateBlackHoles(dt);
          this.updatePellets(dt);
          this.checkPlatformLandings(time);
          this.checkPickupCollects(time);
          this.checkEnemyCollisions(time);
          this.checkShotInput(time);
          this.cleanupWorld();
          this.spawnAhead();
          this.updateScore();
          this.updateHUD(time);
          this.updateEffects(dt);
          this.renderAll(time, altitude);

          if (!this.gameOverShown) {
            this.highestY = Math.min(this.highestY, this.player.y);

            if (this.player.y > this.cameras.main.scrollY + GAME_H + 48) {
              this.triggerGameOver();
            }
          }

          this.prevPlayerX = this.player.x;
          this.prevPlayerY = this.player.y;
        }

        // ------------------------------------------------------------
        // Player movement and power-up logic
        // ------------------------------------------------------------
        setupMotionControls() {
          this.motion = {
            supported: supportsTiltControls(),
            active: this.motionGranted || (supportsTiltControls() && !needsExplicitTiltPermission()),
            orientationSupported: typeof window.DeviceOrientationEvent !== "undefined",
            motionSupported: typeof window.DeviceMotionEvent !== "undefined",
            permissionDenied: false
          };
          this.motion.orientation = {
            calibrated: false,
            baseline: 0,
            raw: 0,
            intent: 0,
            lastAt: 0
          };
          this.motion.accel = {
            calibrated: false,
            baseline: 0,
            raw: 0,
            intent: 0,
            lastAt: 0
          };

          if (!this.motion.supported) {
            return;
          }

          this.applyMotionChannel = (channel, rawValue, deadZone, fullScale) => {
            if (!Number.isFinite(rawValue)) {
              return;
            }

            channel.raw = rawValue;
            channel.lastAt = performance.now();

            if (!channel.calibrated) {
              channel.baseline = rawValue;
              channel.intent = 0;
              channel.calibrated = true;
            } else if (Math.abs(channel.intent) < TILT_MIN_INTENT) {
              channel.baseline = lerp(channel.baseline, rawValue, TILT_BASELINE_LERP);
            }

            const relative = rawValue - channel.baseline;
            const absValue = Math.abs(relative);
            const normalized = absValue <= deadZone ? 0 : clamp(relative / fullScale, -1, 1);
            const growing = Math.abs(normalized) > Math.abs(channel.intent);
            channel.intent = lerp(channel.intent, normalized, growing ? TILT_SMOOTHING_GAIN : TILT_SMOOTHING_RELEASE);
          };

          this.onDeviceOrientation = (event) => {
            if (!this.motion.active) {
              return;
            }

            const angle = getScreenAngle();
            let horizontalTilt = null;

            if (Math.abs(angle) === 90 || Math.abs(angle) === 270) {
              if (typeof event.beta === "number") {
                horizontalTilt = angle === 90 ? -event.beta : event.beta;
              }
            } else if (Math.abs(angle) === 180) {
              if (typeof event.gamma === "number") {
                horizontalTilt = -event.gamma;
              }
            } else if (typeof event.gamma === "number") {
              horizontalTilt = event.gamma;
            }

            if (horizontalTilt === null && typeof event.gamma === "number") {
              horizontalTilt = event.gamma;
            }
            if (horizontalTilt === null && typeof event.beta === "number") {
              horizontalTilt = event.beta;
            }
            if (horizontalTilt === null) {
              return;
            }

            horizontalTilt = clamp(horizontalTilt, -45, 45);
            this.applyMotionChannel(this.motion.orientation, horizontalTilt, TILT_DEAD_ZONE, TILT_FULL_STEER);
          };

          this.onDeviceMotion = (event) => {
            if (!this.motion.active) {
              return;
            }

            const acceleration = event.accelerationIncludingGravity || event.acceleration;
            if (!acceleration) {
              return;
            }

            let horizontalAccel = null;
            const angle = getScreenAngle();
            if (Math.abs(angle) === 90 || Math.abs(angle) === 270) {
              if (typeof acceleration.y === "number") {
                horizontalAccel = angle === 90 ? acceleration.y : -acceleration.y;
              }
            } else if (Math.abs(angle) === 180) {
              if (typeof acceleration.x === "number") {
                horizontalAccel = -acceleration.x;
              }
            } else if (typeof acceleration.x === "number") {
              horizontalAccel = acceleration.x;
            }

            if (horizontalAccel === null && typeof acceleration.x === "number") {
              horizontalAccel = acceleration.x;
            }
            if (horizontalAccel === null) {
              return;
            }

            this.applyMotionChannel(this.motion.accel, horizontalAccel, TILT_ACCEL_DEAD_ZONE, TILT_ACCEL_FULL_STEER);
          };

          this.onOrientationChange = () => {
            if (!this.motion) {
              return;
            }
            this.motion.orientation.calibrated = false;
            this.motion.orientation.intent = 0;
            this.motion.accel.calibrated = false;
            this.motion.accel.intent = 0;
          };

          window.addEventListener("deviceorientation", this.onDeviceOrientation);
          window.addEventListener("devicemotion", this.onDeviceMotion);
          window.addEventListener("orientationchange", this.onOrientationChange);
        }

        async ensureMotionPermission() {
          if (!this.motion || !this.motion.supported || this.motion.active) {
            return this.motion ? this.motion.active : false;
          }

          const granted = await requestTiltPermission();
          this.motion.active = granted;
          this.motion.permissionDenied = !granted;

          if (granted) {
            this.motion.orientation.calibrated = false;
            this.motion.orientation.intent = 0;
            this.motion.orientation.lastAt = 0;
            this.motion.accel.calibrated = false;
            this.motion.accel.intent = 0;
            this.motion.accel.lastAt = 0;
          }

          return granted;
        }

        getTiltAxis() {
          if (!this.motion || !this.motion.active) {
            return 0;
          }

          const now = performance.now();
          const orientationFresh = now - this.motion.orientation.lastAt < TILT_SOURCE_TIMEOUT_MS;
          const accelFresh = now - this.motion.accel.lastAt < TILT_SOURCE_TIMEOUT_MS;
          const orientationIntent = orientationFresh ? this.motion.orientation.intent : 0;
          const accelIntent = accelFresh ? this.motion.accel.intent : 0;

          let combined = 0;
          if (orientationFresh && accelFresh) {
            combined = Math.abs(orientationIntent) >= Math.abs(accelIntent) ? orientationIntent : accelIntent;
          } else if (orientationFresh) {
            combined = orientationIntent;
          } else if (accelFresh) {
            combined = accelIntent;
          }

          return Math.abs(combined) < TILT_MIN_INTENT ? 0 : clamp(combined, -1, 1);
        }

        updatePlayerControl(time) {
          const body = this.player.body;
          const left = this.cursors.left.isDown || this.keys.A.isDown;
          const right = this.cursors.right.isDown || this.keys.D.isDown;
          let move = 0;
          if (left) {
            move = -1;
          }
          if (right) {
            move = 1;
          }
          if (move === 0) {
            move = this.getTiltAxis();
          }

          if (!this.playerState.abducting && time < this.playerState.rocketUntil) {
            body.velocity.x = 0;
            body.velocity.y = Math.min(body.velocity.y, ROCKET_VELOCITY);
          } else if (!this.playerState.abducting) {
            body.velocity.x = move * PLAYER_SPEED;
          } else {
            body.velocity.x = 0;
          }

          if (move !== 0) {
            this.playerState.dir = move < 0 ? -1 : 1;
          }

          if (time < this.playerState.jetpackUntil) {
            body.velocity.y = Math.min(body.velocity.y, JETPACK_VELOCITY);
            this.audio.setJetpack(true);
          } else {
            this.audio.setJetpack(false);
          }

          if (time < this.playerState.propellerUntil) {
            body.velocity.y = Math.min(body.velocity.y, PROPELLER_LIFT_VELOCITY);
          }

          if (this.playerState.springBoostActive && body.velocity.y >= 0) {
            this.playerState.springBoostActive = false;
          }

          if (this.playerState.abducting && this.playerState.abductionEnemy && !this.playerState.abductionEnemy.dead) {
            const enemy = this.playerState.abductionEnemy;
            this.player.x = Phaser.Math.Linear(this.player.x, enemy.x, 0.08);
            body.velocity.y = -260;
            if (this.player.y < this.cameras.main.scrollY - 60) {
              this.triggerGameOver();
            }
          }

          if (this.player.x < -PLAYER_WRAP_MARGIN) {
            this.player.x = GAME_W + PLAYER_WRAP_MARGIN;
          } else if (this.player.x > GAME_W + PLAYER_WRAP_MARGIN) {
            this.player.x = -PLAYER_WRAP_MARGIN;
          }

          this.playerState.flashActive = time < this.playerState.flashUntil;
        }

        stretchLanding() {
          this.tweens.killTweensOf(this.playerState);
          this.playerState.scaleX = 0.8;
          this.playerState.scaleY = 1.3;
          this.tweens.add({
            targets: this.playerState,
            scaleX: 1,
            scaleY: 1,
            duration: 80,
            ease: "Quad.Out"
          });
        }

        stretchLaunch() {
          this.tweens.killTweensOf(this.playerState);
          this.playerState.scaleX = 1.2;
          this.playerState.scaleY = 0.75;
          this.tweens.add({
            targets: this.playerState,
            scaleX: 1,
            scaleY: 1,
            duration: 80,
            ease: "Quad.Out"
          });
        }

        applyBounce(baseVelocity, sourceY) {
          let jumpVelocity = baseVelocity;

          this.playerState.springBoostActive = false;

          if (this.playerState.springBoots > 0) {
            jumpVelocity = Math.min(jumpVelocity, BOOTS_VELOCITY);
            this.playerState.springBoots -= 1;
          }

          this.player.y = sourceY - PLAYER_BODY_H / 2 - 3;
          this.player.body.velocity.y = jumpVelocity;
          this.playerState.lastLandAt = this.time.now;
          this.stretchLanding();
          this.stretchLaunch();
          this.audio.land();
          this.audio.jump();
          this.spawnDust(this.player.x, sourceY);
        }

        consumeShield(pushSourceX, pushSourceY) {
          if (!this.playerState.shield) {
            return false;
          }
          const dx = this.player.x - pushSourceX;
          const dy = this.player.y - pushSourceY;
          const mag = Math.max(1, Math.hypot(dx, dy));
          this.player.body.velocity.x += (dx / mag) * 340;
          this.player.body.velocity.y = -580;
          this.playerState.shield = false;
          this.playerState.flashUntil = this.time.now + 120;
          return true;
        }

        // ------------------------------------------------------------
        // Camera, scoring, and HUD
        // ------------------------------------------------------------
        updateCamera() {
          const target = this.player.y - CAMERA_FOLLOW_OFFSET;
          if (target < this.cameras.main.scrollY) {
            this.cameras.main.scrollY = Phaser.Math.Linear(this.cameras.main.scrollY, target, CAMERA_SMOOTH);
          }
        }

        updateScore() {
          const height = Math.max(0, Math.floor(START_Y - this.highestY));
          this.score = height;
          this.heightOnly = height;
        }

        updateHUD(time) {
          this.scoreText.setText(`${formatPoints(this.heightOnly)} FT`);
        }

        // ------------------------------------------------------------
        // Platform logic
        // ------------------------------------------------------------
        updatePlatforms(time, dt) {
          for (const platform of this.platforms) {
            if (platform.type === "movingH") {
              platform.x += platform.dir * platform.speed * dt;
              if (platform.x < platform.w / 2 || platform.x > GAME_W - platform.w / 2) {
                platform.dir *= -1;
                platform.x = clamp(platform.x, platform.w / 2, GAME_W - platform.w / 2);
              }
            }

            if (platform.type === "movingV") {
              platform.y = platform.baseY + Math.sin(time * 0.002 + platform.phase) * PLATFORM_VERTICAL_RANGE * 0.5;
            }

            if (platform.breakAt > 0 && time >= platform.breakAt) {
              platform.falling = true;
              platform.active = false;
              platform.breakAt = 0;
              platform.respawnAt = time + FRAGILE_RESPAWN_MS;
            }

            if (platform.falling) {
              platform.fallSpeed += 1200 * dt;
              platform.y += platform.fallSpeed * dt;
              if (platform.y > this.cameras.main.scrollY + GAME_H + 80) {
                platform.visible = false;
              }
            }

            if (platform.type === "fragile" && platform.respawnAt > 0 && time >= platform.respawnAt) {
              platform.respawnAt = 0;
              platform.falling = false;
              platform.fallSpeed = 0;
              platform.breakAt = 0;
              platform.shakeUntil = 0;
              platform.x = platform.baseX;
              platform.y = platform.baseY;
              platform.active = true;
              platform.visible = true;
            }

            if (platform.type === "vanish" && platform.hiddenUntil > 0 && time >= platform.hiddenUntil) {
              platform.hiddenUntil = 0;
              platform.visible = true;
              platform.active = true;
            }

            if (platform.type === "explode" && platform.explodeAt > 0 && time >= platform.explodeAt && !platform.exploded) {
              this.spawnExplosion(platform.x, platform.y);
              platform.exploded = true;
              platform.active = false;
              platform.visible = false;
            }
          }
        }

        checkPlatformLandings(time) {
          if (this.gameOverShown || this.player.body.velocity.y <= 0 || this.playerState.abducting) {
            return;
          }

          const prevBottom = (this.prevPlayerY ?? this.player.y) + PLAYER_BODY_H / 2;
          const currBottom = this.player.y + PLAYER_BODY_H / 2;

          for (const platform of this.platforms) {
            if (!platform.active || !platform.visible || platform.exploded) {
              continue;
            }

            const top = platform.y - platform.h / 2;
            const overlapX = Math.abs(this.player.x - platform.x) < platform.w / 2 + PLAYER_BODY_W / 2 - 4;
            const crossedTop = prevBottom <= top + LANDING_TOLERANCE && currBottom >= top - 2;

            if (!overlapX || !crossedTop) {
              continue;
            }

            let bounceVelocity = JUMP_VELOCITY;
            if (platform.spring) {
              const springX = platform.x + platform.spring.xOffset;
              if (Math.abs(this.player.x - springX) < 16) {
                bounceVelocity = PLATFORM_SPRING_VELOCITY;
              }
            }

            this.applyBounce(bounceVelocity, top);

            if (platform.type === "fragile" && !platform.falling && platform.breakAt === 0) {
              platform.shakeUntil = time + 280;
              platform.breakAt = time + 500;
            }

            if (platform.type === "vanish") {
