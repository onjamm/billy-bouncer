              platform.active = false;
              platform.visible = false;
              platform.hiddenUntil = time + 2000;
            }

            if (platform.type === "explode" && platform.explodeAt === 0) {
              platform.explodeAt = time + 1000;
            }

            return;
          }
        }

        // ------------------------------------------------------------
        // Pickups, collectibles, and power-ups
        // ------------------------------------------------------------
        updatePickupsAndCollectibles(time) {
          for (const pickup of this.pickups) {
            if (!this.isInUpdateBand(pickup.y)) {
              continue;
            }
            pickup.y = pickup.baseY + Math.sin(time * PICKUP_BOB_SPEED + pickup.bobPhase) * 6;
          }
        }

        checkPickupCollects(time) {
          const playerHit = { x: this.player.x, y: this.player.y, w: PLAYER_BODY_W, h: PLAYER_BODY_H };
          let write = 0;
          for (let i = 0; i < this.pickups.length; i += 1) {
            const pickup = this.pickups[i];
            const hit = rectsOverlap(playerHit, { x: pickup.x, y: pickup.y, w: 28, h: 28 });
            if (!hit) {
              this.pickups[write] = pickup;
              write += 1;
              continue;
            }

            this.playerState.flashUntil = time + 90;
            this.audio.powerup();

            if (pickup.type === "spring") {
              this.player.body.velocity.y = PICKUP_SPRING_VELOCITY;
              this.playerState.springBoostActive = true;
              this.stretchLaunch();
            } else if (pickup.type === "jetpack") {
              this.playerState.jetpackUntil = time + JETPACK_MS;
            } else if (pickup.type === "rocket") {
              this.playerState.rocketUntil = time + ROCKET_MS;
            } else if (pickup.type === "propeller") {
              this.playerState.propellerUntil = time + PROPELLER_MS;
            } else if (pickup.type === "boots") {
              this.playerState.springBoots = BOOTS_BOUNCES;
            } else if (pickup.type === "shield") {
              this.playerState.shield = true;
            } else if (pickup.type === "repellent") {
              this.playerState.repellentUntil = time + REPellent_MS;
              this.scareOffEnemies();
            }
            this.releaseEntitySprite(pickup);
          }
          this.pickups.length = write;
        }

        activatePoofText(x, y) {
          const poof = this.add.text(x, y, "POOF", {
            fontFamily: "Georgia, serif",
            fontSize: "20px",
            fontStyle: "bold",
            color: CSS.ink
          }).setOrigin(0.5).setDepth(30);
          this.tweens.add({
            targets: poof,
            scale: 1.4,
            alpha: 0,
            y: y - 20,
            duration: 300,
            onComplete: () => poof.destroy()
          });
        }

        // ------------------------------------------------------------
        // Enemy logic and collisions
        // ------------------------------------------------------------
        updateEnemies(time, dt) {
          let write = 0;
          for (let i = 0; i < this.enemies.length; i += 1) {
            const enemy = this.enemies[i];
            if (!enemy.dead) {
              const platform = enemy.platform;
              if (platform && (!platform.visible || platform.exploded || platform.falling)) {
                enemy.dead = true;
              }
            }

            if (!enemy.dead && enemy.stompPending) {
              const playerAboveEnemy = this.player.body.velocity.y < 0 && this.player.y + PLAYER_BODY_H / 2 < enemy.y - enemy.h / 2 - 6;
              if (playerAboveEnemy) {
                enemy.dead = true;
                enemy.stompPending = false;
                this.audio.enemyDeath();
                this.spawnBurst(enemy.x, enemy.y, this.getEnemyColor(enemy), 5);
                this.activatePoofText(enemy.x, enemy.y - 16);
              }
            } else if (!enemy.dead && this.isInUpdateBand(enemy.y, UPDATE_MARGIN_TOP + 60, UPDATE_MARGIN_BOTTOM + 100)) {
              const platform = enemy.platform;
              if (enemy.type === "snake" && platform) {
                enemy.y = platform.y - 18 + Math.sin(time * 0.004 + enemy.bobPhase) * 4;
              } else if (enemy.type === "heavy" && platform) {
                const previousX = enemy.x;
                enemy.y = platform.y - 24;
                enemy.x += enemy.dir * HEAVY_SPEED * dt;
                const minX = platform.x - platform.w / 2 + 18;
                const maxX = platform.x + platform.w / 2 - 18;
                if (enemy.x < minX || enemy.x > maxX) {
                  enemy.dir *= -1;
                  enemy.x = clamp(enemy.x, minX, maxX);
                }
                enemy.stepDistance += Math.abs(enemy.x - previousX);
                if (enemy.stepDistance >= 30) {
                  enemy.stepDistance = 0;
                  enemy.stepIndex += 1;
                  if (enemy.stepIndex % 2 === 0) {
                    this.cameras.main.shake(80, 0.006);
                  }
                }
              } else if (enemy.type === "vulture") {
                enemy.x += enemy.dir * VULTURE_SPEED * dt;
                enemy.y = enemy.baseY + Math.sin(time * 0.003 + enemy.bobPhase) * 10;
                if (enemy.x < 34 || enemy.x > GAME_W - 34) {
                  enemy.dir *= -1;
                }
              } else if (enemy.type === "ufo") {
                enemy.x += enemy.dir * 80 * dt;
                enemy.y = enemy.baseY + Math.sin(time * 0.002 + enemy.bobPhase) * 8;
                if (enemy.x < 40 || enemy.x > GAME_W - 40) {
                  enemy.dir *= -1;
                }

                const inBeam =
                  Math.abs(this.player.x - enemy.x) <= Ufo_BEAM_WIDTH / 2 &&
                  this.player.y > enemy.y &&
                  this.player.y < enemy.y + Ufo_BEAM_HEIGHT &&
                  !this.gameOverShown;

                const beamBlocked = this.hasPowerupInvincibility(time) || this.playerState.shield;
                enemy.beamActive = inBeam && !beamBlocked;
                enemy.beamCharge = enemy.beamActive ? enemy.beamCharge + this.game.loop.delta : 0;
                if (enemy.beamCharge >= Ufo_ABDUCT_MS && !this.playerState.abducting) {
                  this.playerState.abducting = true;
                  this.playerState.abductionEnemy = enemy;
                }
              }
            }

            if (!enemy.dead || enemy.fadeUntil > time) {
              this.enemies[write] = enemy;
              write += 1;
            } else {
              this.releaseEntitySprite(enemy);
            }
          }
          this.enemies.length = write;
        }

        damageEnemy(enemy, amount) {
          enemy.hp -= amount;
          enemy.hitFlashUntil = this.time.now + 120;
          if (enemy.hp <= 0) {
            enemy.dead = true;
            this.audio.enemyDeath();
            this.spawnBurst(enemy.x, enemy.y, this.getEnemyColor(enemy), 5);
            this.activatePoofText(enemy.x, enemy.y - 16);
          }
        }

        stompEnemy(enemy, enemyTop) {
          enemy.stompPending = true;
          enemy.beamActive = false;
          enemy.beamCharge = 0;
          enemy.hitFlashUntil = this.time.now + 120;
          this.applyBounce(JUMP_VELOCITY, enemyTop);
        }

        checkEnemyCollisions() {
          if (this.gameOverShown) {
            return;
          }

          if (this.hasPowerupInvincibility()) {
            return;
          }

          const propellerActive = this.time.now < this.playerState.propellerUntil;

          const prevBottom = (this.prevPlayerY ?? this.player.y) + PLAYER_BODY_H / 2;
          const playerBottom = this.player.y + PLAYER_BODY_H / 2;
          const playerRect = { x: this.player.x, y: this.player.y, w: PLAYER_BODY_W, h: PLAYER_BODY_H };
          const prevStompBottom = prevBottom + PLAYER_STOMP_BOTTOM_BONUS;
          const stompBottom = playerBottom + PLAYER_STOMP_BOTTOM_BONUS;
          const stompLeft = this.player.x - PLAYER_STOMP_W / 2;
          const stompRight = this.player.x + PLAYER_STOMP_W / 2;

          for (const enemy of this.enemies) {
            if (enemy.dead || enemy.stompPending) {
              continue;
            }

            const enemyTop = enemy.y - enemy.h / 2;
            const enemyLeft = enemy.x - enemy.w / 2;
            const enemyRight = enemy.x + enemy.w / 2;
            const topOverlap = Math.min(stompRight, enemyRight) - Math.max(stompLeft, enemyLeft);
            const touchingEnemyTop =
              topOverlap >= STOMP_MIN_OVERLAP &&
              prevStompBottom <= enemyTop + STOMP_TOLERANCE &&
              stompBottom >= enemyTop - 2;
            const fallingOnTop = this.player.body.velocity.y > 0 && touchingEnemyTop;

            if (fallingOnTop) {
              this.stompEnemy(enemy, enemyTop);
              return;
            }

            const hit = rectsOverlap(playerRect, enemy);
            if (!hit) {
              continue;
            }

            if (propellerActive && enemy.y < this.player.y + 8) {
              this.damageEnemy(enemy, enemy.hp);
              continue;
            }

            if (this.playerState.shield) {
              this.damageEnemy(enemy, enemy.hp);
              this.consumeShield(enemy.x, enemy.y);
              return;
            }

            if (!this.consumeShield(enemy.x, enemy.y)) {
              this.triggerGameOver();
              return;
            }
          }
        }

        scareOffEnemies() {
          for (const enemy of this.enemies) {
            if (enemy.dead) {
              continue;
            }
            this.tweens.add({
              targets: enemy,
              x: enemy.x + 6,
              duration: 60,
              yoyo: true,
              repeat: 2,
              onComplete: () => {
                enemy.dead = true;
                this.spawnBurst(enemy.x, enemy.y, this.getEnemyColor(enemy), 4);
              }
            });
          }
        }

        getEnemyColor(enemy) {
          if (enemy.type === "snake") {
            return COLORS.tan;
          }
          if (enemy.type === "vulture") {
            return COLORS.charcoal;
          }
          if (enemy.type === "heavy") {
            return COLORS.sheriff;
          }
          return COLORS.ufo;
        }

        // ------------------------------------------------------------
        // Black hole hazard
        // ------------------------------------------------------------
        updateBlackHoles(dt) {
          let highestLevel = 0;
          for (const hole of this.blackHoles) {
            if (!this.isInUpdateBand(hole.y, UPDATE_MARGIN_TOP + 80, UPDATE_MARGIN_BOTTOM + 80)) {
              continue;
            }
            hole.angle += dt * (Math.PI / 3);
            const dist = distance(this.player.x, this.player.y, hole.x, hole.y);
            if (dist < BLACK_HOLE_PULL_RADIUS) {
              const t = 1 - dist / BLACK_HOLE_PULL_RADIUS;
              highestLevel = Math.max(highestLevel, t);
              const dx = hole.x - this.player.x;
              const dy = hole.y - this.player.y;
              const mag = Math.max(1, Math.hypot(dx, dy));
              const force = BLACK_HOLE_FORCE * t * t;
              this.player.body.velocity.x += (dx / mag) * force * dt;
              this.player.body.velocity.y += (dy / mag) * force * dt;
            }

            if (dist < BLACK_HOLE_KILL_RADIUS) {
              if (this.hasPowerupInvincibility()) {
                continue;
              }
              if (!this.consumeShield(hole.x, hole.y)) {
                this.triggerGameOver();
              }
            }
          }
          this.audio.setBlackHoleLevel(highestLevel);
        }

        // ------------------------------------------------------------
        // Shooting and pellets
        // ------------------------------------------------------------
        checkShotInput(time) {
          if (Phaser.Input.Keyboard.JustDown(this.keys.SPACE) || Phaser.Input.Keyboard.JustDown(this.keys.ENTER)) {
            if (this.gameOverShown) {
              this.scene.restart();
              return;
            }
            this.tryShoot(this.player.x, this.player.y - 400);
          }
          if (time >= this.playerState.shootingUntil) {
            this.playerState.shootingUntil = 0;
          }
        }

        tryShoot(targetX, targetY) {
          const now = this.time.now;
          if (this.gameOverShown || now - this.lastShotAt < SHOT_COOLDOWN || this.pellets.length >= MAX_PELLETS) {
            return;
          }

          const gunX = this.player.x + 14 * this.playerState.dir;
          const gunY = this.player.y + 4;
          if (IS_MOBILE && targetY >= gunY) {
            targetY = gunY - (targetY - gunY);
          }
          const dx = targetX - gunX;
          const dy = targetY - gunY;
          const mag = Math.max(1, Math.hypot(dx, dy));

          this.pellets.push({
            x: gunX,
            y: gunY,
            vx: (dx / mag) * PELLET_SPEED,
            vy: (dy / mag) * PELLET_SPEED,
            w: 10,
            h: 6,
            trail: []
          });

          this.lastShotAt = now;
          this.playerState.shootingUntil = now + 40;
          this.audio.shoot();
        }

        updatePellets(dt) {
          let write = 0;
          for (let i = 0; i < this.pellets.length; i += 1) {
            const pellet = this.pellets[i];
            pellet.trail.unshift({ x: pellet.x, y: pellet.y, life: 1 });
            pellet.trail = pellet.trail.slice(0, 3);
            pellet.x += pellet.vx * dt;
            pellet.y += pellet.vy * dt;

            let keep = true;
            for (const enemy of this.enemies) {
              if (enemy.dead) {
                continue;
              }
              if (rectsOverlap(pellet, enemy)) {
                this.damageEnemy(enemy, 1);
                keep = false;
                break;
              }
            }

            keep = keep && pellet.y > this.cameras.main.scrollY - 80 && pellet.y < this.cameras.main.scrollY + GAME_H + 80 && pellet.x > -40 && pellet.x < GAME_W + 40;
            if (keep) {
              this.pellets[write] = pellet;
              write += 1;
            }
          }
          this.pellets.length = write;
        }

        // ------------------------------------------------------------
        // Spawn maintenance and cleanup
        // ------------------------------------------------------------
        cleanupWorld() {
          const topCull = this.cameras.main.scrollY - CULL_ABOVE_MARGIN;
          const bottomCull = this.cameras.main.scrollY + GAME_H + CULL_BELOW_MARGIN;

          let platformWrite = 0;
          let topPlatform = null;
          for (let i = 0; i < this.platforms.length; i += 1) {
            const platform = this.platforms[i];
            const preserveFragileRespawn = platform.type === "fragile" && (platform.falling || platform.respawnAt > 0);
            const preserveVanishRespawn = platform.type === "vanish" && platform.hiddenUntil > 0;
            const keep = ((platform.y > topCull && platform.y < bottomCull) || preserveFragileRespawn || preserveVanishRespawn) && !platform.exploded;
            if (keep) {
              this.platforms[platformWrite] = platform;
              platformWrite += 1;
              if (!topPlatform || platform.y < topPlatform.y) {
                topPlatform = platform;
              }
            } else {
              this.releaseEntitySprite(platform);
            }
          }
          this.platforms.length = platformWrite;

          let pickupWrite = 0;
          for (let i = 0; i < this.pickups.length; i += 1) {
            const pickup = this.pickups[i];
            if (pickup.y > topCull && pickup.y < bottomCull) {
              this.pickups[pickupWrite] = pickup;
              pickupWrite += 1;
            } else {
              this.releaseEntitySprite(pickup);
            }
          }
          this.pickups.length = pickupWrite;

          let enemyWrite = 0;
          for (let i = 0; i < this.enemies.length; i += 1) {
            const enemy = this.enemies[i];
            if (enemy.y > topCull - 60 && enemy.y < bottomCull) {
              this.enemies[enemyWrite] = enemy;
              enemyWrite += 1;
            } else {
              this.releaseEntitySprite(enemy);
            }
          }
          this.enemies.length = enemyWrite;

          let holeWrite = 0;
          for (let i = 0; i < this.blackHoles.length; i += 1) {
            const hole = this.blackHoles[i];
            if (hole.y > topCull - 80 && hole.y < bottomCull) {
              this.blackHoles[holeWrite] = hole;
              holeWrite += 1;
            }
          }
          this.blackHoles.length = holeWrite;

          const maxEffects = IS_MOBILE ? 60 : 120;
          if (this.effects.length > maxEffects) {
            this.effects.splice(0, this.effects.length - maxEffects);
          }
          if (this.pellets.length > MAX_PELLETS) {
            this.pellets.splice(0, this.pellets.length - MAX_PELLETS);
          }
          if (topPlatform) {
            this.lastSpawnPlatform = topPlatform;
            this.topSpawnY = this.lastSpawnPlatform.y;
            this.lastPlatformX = this.lastSpawnPlatform.x;
          } else {
            this.lastSpawnPlatform = null;
          }
        }

        spawnAhead() {
          let guard = 0;
          while (guard < 24) {
            let highestPlatformY = this.cameras.main.scrollY + GAME_H;
            let visiblePlatforms = 0;
            for (const platform of this.platforms) {
              if (platform.y < highestPlatformY) {
                highestPlatformY = platform.y;
              }
              if (platform.y > this.cameras.main.scrollY - 40 && platform.y < this.cameras.main.scrollY + GAME_H + 40 && platform.visible) {
                visiblePlatforms += 1;
              }
            }
            this.topSpawnY = highestPlatformY;
            if (highestPlatformY <= this.cameras.main.scrollY - PLATFORM_SPAWN_AHEAD && visiblePlatforms >= PLATFORM_VISIBLE_MIN) {
              break;
            }
            this.spawnPlatformRow();
            guard += 1;
          }
        }

        // ------------------------------------------------------------
        // Effects helpers
        // ------------------------------------------------------------
        spawnDust(x, y) {
          for (let i = 0; i < 3; i += 1) {
            this.effects.push({
              type: "dust",
              x: x + Phaser.Math.Between(-12, 12),
              y,
              vx: Phaser.Math.Between(-10, 10),
              vy: -Phaser.Math.Between(10, 30),
              radius: Phaser.Math.Between(5, 8),
              life: 0.36,
              maxLife: 0.36,
              color: COLORS.tan
            });
          }
        }

        spawnBurst(x, y, color, count) {
          for (let i = 0; i < count; i += 1) {
            const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
            const speed = Phaser.Math.Between(40, 120);
            this.effects.push({
              type: "particle",
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              radius: Phaser.Math.Between(4, 6),
              life: 0.4,
              maxLife: 0.4,
              color
            });
          }
        }

        spawnExplosion(x, y) {
          this.effects.push({
            type: "ring",
            x,
            y,
            radius: 18,
            endRadius: 74,
            life: 0.45,
            maxLife: 0.45,
            color: COLORS.gold
          });
          for (let i = 0; i < 6; i += 1) {
            const angle = (Math.PI * 2 * i) / 6;
            const speed = Phaser.Math.Between(90, 150);
            this.effects.push({
              type: "debris",
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed - 10,
              angle: angle,
              spin: Phaser.Math.FloatBetween(-7, 7),
              w: 10,
              h: 5,
              life: 0.58,
              maxLife: 0.58,
              color: COLORS.rust
            });
          }
        }

        updateEffects(dt) {
          let write = 0;
          for (let i = 0; i < this.effects.length; i += 1) {
            const effect = this.effects[i];
            effect.life -= dt;
            if (effect.life <= 0) {
              continue;
            }
            if (effect.type === "dust" || effect.type === "particle" || effect.type === "debris") {
              effect.x += effect.vx * dt;
              effect.y += effect.vy * dt;
              effect.vy += 60 * dt;
            }
            if (effect.type === "debris") {
              effect.angle += effect.spin * dt;
            }
            this.effects[write] = effect;
            write += 1;
          }
          this.effects.length = write;
        }

        // ------------------------------------------------------------
        // Game over handling
        // ------------------------------------------------------------
        async submitLeaderboardScore(handle, score) {
          const response = await fetch("/api/leaderboard", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ name: handle, score })
          });
          if (!response.ok) {
            throw new Error(`Leaderboard returned ${response.status}`);
          }
          localStorage.setItem(LEADERBOARD_LAST_SUBMITTED_KEY, String(score));
        }

        async completeLeaderboardNameSubmit() {
          if (!this.pendingLeaderboardScore || !this.leaderboardPromptInput) {
            return;
          }

          const handle = sanitizeLeaderboardName(this.leaderboardPromptInput.value || "");
          if (!handle) {
            if (this.leaderboardPromptMessage) {
              this.leaderboardPromptMessage.textContent = "Pick a short outlaw name first.";
            }
            return;
          }

          try {
            await this.submitLeaderboardScore(handle, this.pendingLeaderboardScore);
            localStorage.setItem(LEADERBOARD_HANDLE_KEY, handle);
            this.pendingLeaderboardScore = 0;
            this.setLeaderboardSubmitVisible(false);
            this.hideLeaderboardNamePrompt();
            this.revealGameOverOverlay();
          } catch (error) {
            if (this.leaderboardPromptMessage) {
              this.leaderboardPromptMessage.textContent = "Board save failed. Try that again.";
            }
          }
        }

        async maybeSubmitLeaderboardScore(score) {
          if (!canUseOnlineLeaderboard() || score <= 0) {
            this.pendingLeaderboardScore = 0;
            this.setLeaderboardSubmitVisible(false);
            this.hideLeaderboardNamePrompt();
            return;
          }

          const lastSubmitted = Number(localStorage.getItem(LEADERBOARD_LAST_SUBMITTED_KEY) || 0);
          if (score <= lastSubmitted) {
            this.pendingLeaderboardScore = 0;
            this.setLeaderboardSubmitVisible(false);
            this.hideLeaderboardNamePrompt();
            return;
          }
          this.setLeaderboardSubmitVisible(false);
          this.showLeaderboardNamePrompt(score);
        }

        triggerGameOver() {
          if (this.gameOverShown) {
            return;
          }
          this.gameOverShown = true;
          this.pendingLeaderboardScore = 0;
          this.setLeaderboardSubmitVisible(false);
          this.hideLeaderboardNamePrompt();
          this.physics.world.pause();
          this.player.body.setVelocity(0, 0);
          this.audio.stopAll();
          this.audio.gameOver();
          this.gameOverLine.setText(this.getRandomGameOverLine());
          this.finalScore.setText(`${formatPoints(this.score)} FT`);
          this.medalText.setText(getMedalProgressText(this.score));
          this.medalText.setColor(Phaser.Display.Color.IntegerToColor(getMedalDisplayColor(this.score)).rgba);
          const nextBest = Math.max(this.bestScore, this.score);
          localStorage.setItem(BEST_SCORE_KEY, String(nextBest));
          const lastSubmitted = Number(localStorage.getItem(LEADERBOARD_LAST_SUBMITTED_KEY) || 0);
          if (canUseOnlineLeaderboard() && this.score > 0 && this.score > lastSubmitted) {
            this.showLeaderboardNamePrompt(this.score);
            return;
          }
          this.revealGameOverOverlay();
          void this.maybeSubmitLeaderboardScore(this.score);
        }

        shutdown() {
          this.audio.stopAll();
          if (this.onPointerDown) {
            this.input.off("pointerdown", this.onPointerDown);
          }
          if (this.onPointerUp) {
            this.input.off("pointerup", this.onPointerUp);
          }
          if (this.onCanvasTouchStart && this.game && this.game.canvas) {
            this.game.canvas.removeEventListener("touchstart", this.onCanvasTouchStart);
          }
          if (this.domRideBtn) { this.domRideBtn.remove(); this.domRideBtn = null; }
          if (this.domSaloonBtn) { this.domSaloonBtn.remove(); this.domSaloonBtn = null; }
          if (this.onDeviceOrientation) {
            window.removeEventListener("deviceorientation", this.onDeviceOrientation);
          }
          if (this.onDeviceMotion) {
            window.removeEventListener("devicemotion", this.onDeviceMotion);
          }
          if (this.onOrientationChange) {
            window.removeEventListener("orientationchange", this.onOrientationChange);
          }
          for (const platform of this.platforms) {
            this.releaseEntitySprite(platform);
          }
          for (const pickup of this.pickups) {
            this.releaseEntitySprite(pickup);
          }
          while (this.staticSpritePool && this.staticSpritePool.length > 0) {
            const sprite = this.staticSpritePool.pop();
            if (sprite && sprite.destroy) {
              sprite.destroy();
            }
          }
          this.platforms.length = 0;
          this.pickups.length = 0;
          this.enemies.length = 0;
          this.blackHoles.length = 0;
          this.pellets.length = 0;
          this.effects.length = 0;
          [
            this.overlay,
            this.finalScore,
            this.medalText,
            this.submitBoardText,
            this.scoreText,
            this.bgBase,
            this.bgBlend,
              this.bg,
              this.worldLayer,
              this.playerOverlayLayer,
              this.uiLayer,
              this.player,
              this.playerSprite,
            this.textureBuilder
          ].forEach((obj) => {
            if (obj && obj.destroy) {
              obj.destroy();
            }
          });
          if (this.leaderboardPromptEl) {
            this.leaderboardPromptEl.remove();
          }
          if (this.leaderboardPromptBackdropEl) {
            this.leaderboardPromptBackdropEl.remove();
          }
          this.overlay = null;
          this.finalScore = null;
          this.medalText = null;
          this.scoreText = null;
          this.bgBase = null;
          this.bgBlend = null;
          this.bg = null;
          this.worldLayer = null;
          this.playerOverlayLayer = null;
          this.uiLayer = null;
          this.player = null;
          this.playerSprite = null;
          this.textureBuilder = null;
        }

        // ------------------------------------------------------------
        // Rendering
        // ------------------------------------------------------------
        renderAll(time, altitude) {
          this.updateBackgroundBase(altitude);
          drawSketchbookBackground(this, this.bg, altitude, this.cameras.main.scrollY, time);
          this.worldLayer.clear();
          this.playerOverlayLayer.clear();

          const vanishSin = Math.sin(time * 0.005);

          for (const platform of this.platforms) {
            if (this.syncPlatformSprite(platform, time)) {
              continue;
            }
            if (platform.visible && !platform.exploded && this.isInRenderBand(platform.y)) {
              drawPlatform(this.worldLayer, platform, time, vanishSin);
            }
          }

          for (const hole of this.blackHoles) {
            if (this.isInRenderBand(hole.y, RENDER_MARGIN_TOP + 40, RENDER_MARGIN_BOTTOM + 60)) {
              drawBlackHole(this.worldLayer, hole);
            }
          }

          for (const pickup of this.pickups) {
            this.syncPickupSprite(pickup);
          }

          for (const enemy of this.enemies) {
            if (!enemy.dead && this.isInRenderBand(enemy.y, RENDER_MARGIN_TOP + 40, RENDER_MARGIN_BOTTOM + 60)) {
              drawEnemy(this.worldLayer, enemy, time);
            }
          }

          for (const pellet of this.pellets) {
            if (this.isInRenderBand(pellet.y, RENDER_MARGIN_TOP + 40, RENDER_MARGIN_BOTTOM + 40)) {
              drawPellet(this.worldLayer, pellet);
            }
          }

          for (const effect of this.effects) {
            if (this.isInRenderBand(effect.y, RENDER_MARGIN_TOP + 60, RENDER_MARGIN_BOTTOM + 60)) {
              drawEffect(this.worldLayer, effect);
            }
          }

          const playerDrawState = {
            x: this.player.x,
            y: this.player.y,
            vx: this.player.body.velocity.x,
            vy: this.player.body.velocity.y,
            dir: this.playerState.dir,
            scaleX: this.playerState.scaleX,
            scaleY: this.playerState.scaleY,
            shooting: this.playerState.shootingUntil > this.time.now,
            flash: this.playerState.flashUntil > this.time.now,
            propeller: this.time.now < this.playerState.propellerUntil,
            shield: this.playerState.shield,
            jetpack: this.time.now < this.playerState.jetpackUntil,
            rocket: this.time.now < this.playerState.rocketUntil
          };
          syncBanditSprite(this.playerSprite, playerDrawState, time, BANDIT_GAME_SCALE, BANDIT_GAME_Y_OFFSET);
          drawBanditFx(this.worldLayer, playerDrawState, time);
          drawBanditOverlayFx(this.playerOverlayLayer, playerDrawState, time);

          this.drawHUDDecor(time);
        }

        drawHUDDecor(time) {
          this.uiLayer.clear();
        }
      }

      // ============================================================
      // World drawing functions
      // ============================================================
      function drawPlatform(g, platform, time, vanishSin) {
        if (vanishSin === undefined) vanishSin = Math.sin(time * 0.005);
        const wobbleX = platform.shakeUntil > time ? Math.sin(time * 0.05) * 3 : 0;
        const points = platform.noise.map((p, index) => {
          const dx = index === 0 || index === 3 ? -wobbleX : wobbleX;
          return { x: p.x + (platform.x - platform.baseX) + dx, y: p.y + (platform.y - platform.baseY) };
        });

        let fillColor = COLORS.wood;
        let fillAlpha = 1;
        if (platform.type === "fragile") {
          fillColor = COLORS.woodDark;
        } else if (platform.type === "explode") {
          fillColor = platform.explodeAt > 0 && Math.floor(time / 90) % 2 === 0 ? COLORS.gold : 0x8B5A00;
        } else if (platform.type === "vanish") {
          fillColor = 0x648CC8;
          fillAlpha = platform.hiddenUntil > 0 ? 0 : 0.3 + vanishSin * 0.225;
        }

        g.fillStyle(fillColor, fillAlpha);
        pathPolygon(g, points);
        g.fillPath();

        if (platform.type === "vanish") {
          drawDashedPolygon(g, points, 8, 5, COLORS.ink, 3, 0.9);
        } else {
          g.lineStyle(3, COLORS.ink, 1);
          pathPolygon(g, points);
          g.strokePath();
        }

        if (!IS_MOBILE && (platform.type === "normal" || platform.type === "movingH" || platform.type === "movingV")) {
          g.lineStyle(2, COLORS.woodGrain, 0.45);
          platform.grainOffsets.forEach((offset) => {
            g.beginPath();
            g.moveTo(platform.x - platform.w / 2 + 12, platform.y + offset);
            g.lineTo(platform.x + platform.w / 2 - 12, platform.y + offset + Phaser.Math.Between(-1, 1));
            g.strokePath();
          });
          g.fillStyle(COLORS.silver, 1);
          platform.nails.forEach((offset) => g.fillCircle(platform.x + offset, platform.y, 3));
        }

        if (platform.type === "movingH") {
          const dashDir = platform.dir < 0 ? 1 : -1;
          g.lineStyle(3, COLORS.ink, 0.2);
          for (let i = 0; i < 3; i += 1) {
            const y = platform.y - 8 + i * 8;
            g.beginPath();
            g.moveTo(platform.x + dashDir * (platform.w / 2 + 8), y);
            g.lineTo(platform.x + dashDir * (platform.w / 2 + 20), y);
            g.strokePath();
          }
        }

        if (platform.type === "fragile") {
          g.lineStyle(3, COLORS.ink, 0.9);
          g.beginPath();
          g.moveTo(platform.x - platform.w / 2 + 18, platform.y - 4);
          g.lineTo(platform.x + platform.w / 2 - 18, platform.y + 4);
          g.strokePath();
          g.beginPath();
          g.moveTo(platform.x - platform.w / 2 + 8, platform.y + 1);
          g.lineTo(platform.x - platform.w / 2 + 2, platform.y + 8);
          g.strokePath();
          g.beginPath();
          g.moveTo(platform.x + platform.w / 2 - 8, platform.y - 1);
          g.lineTo(platform.x + platform.w / 2 + 2, platform.y - 8);
          g.strokePath();
        }

        if (platform.type === "explode") {
          g.lineStyle(2, COLORS.ink, 0.8);
          for (let i = 0; i < 4; i += 1) {
            const x = platform.x - 30 + i * 20;
            g.beginPath();
            g.moveTo(x, platform.y - 14);
            g.lineTo(x + 6, platform.y - 22);
            g.strokePath();
          }
        }

        if (platform.spring) {
          const springX = platform.x + platform.spring.xOffset;
          const top = platform.y - platform.h / 2 - 1;
          drawSpringShape(g, springX, top - 8, 0.9);
        }
      }

      function drawBanditFx(g, state, time) {
        const x = state.x;
        const y = state.y + BANDIT_GAME_Y_OFFSET;
        const avgScale = (state.scaleX + state.scaleY) * 0.5;
        const facing = state.dir < 0 ? -1 : 1;

        if (state.shield) {
          const pulse = 1 + Math.sin(time * 0.008) * 0.035;
          const shellW = 108 * avgScale * pulse;
          const shellH = 135 * avgScale * (1 - Math.sin(time * 0.008) * 0.02);
          const shellY = y - 2 * avgScale;
          g.fillStyle(0x64A0DC, 0.12);
          g.fillEllipse(x, shellY, shellW, shellH);
          g.lineStyle(3, 0xFFFFFF, 0.34);
          g.strokeEllipse(x, shellY, shellW, shellH);
          g.lineStyle(2, 0x64A0DC, 0.65);
          g.strokeEllipse(x, shellY, shellW - 6 * avgScale, shellH - 8 * avgScale);
        }

        if (state.jetpack) {
          for (let i = 0; i < 4; i += 1) {
            g.fillStyle(COLORS.poncho, 0.2 + i * 0.08);
            g.fillCircle(x - 8 + i * 5, y + 24 + i * 7, (8 + i * 2) * avgScale);
          }
        }

        if (state.rocket) {
          g.fillStyle(COLORS.gold, 0.78);
          g.fillCircle(x - 4 * facing, y + 22, 8 * avgScale);
          g.fillStyle(COLORS.rust, 1);
          g.fillTriangle(x - 12 * facing, y + 16, x - 4 * facing, y, x + 4 * facing, y + 16);
          g.lineStyle(2, COLORS.ink, 1);
          g.strokeTriangle(x - 12 * facing, y + 16, x - 4 * facing, y, x + 4 * facing, y + 16);
        }

        if (state.shooting) {
          drawStar(g, x + facing * 27, y + 8, 2 * avgScale, 7 * avgScale, 4, Math.PI / 4, COLORS.gold, COLORS.gold, 1);
        }

        if (state.flash) {
          g.fillStyle(COLORS.white, 0.3);
          g.fillCircle(x, y, 30 * avgScale);
        }
      }

      function drawBanditOverlayFx(g, state, time) {
        if (!state.propeller) {
          return;
        }

        const x = state.x;
        const y = state.y + BANDIT_GAME_Y_OFFSET;
        const avgScale = (state.scaleX + state.scaleY) * 0.5;
        const rising = state.vy < -50;
        const falling = state.vy > 120;
        const hatOffsetY = rising ? -2 : falling ? 2 : 0;
        const moveIntent = clamp((state.vx || 0) / PLAYER_SPEED, -1, 1);
        const hatShift = moveIntent * 6 * 0.7;
        const rotorAngle = time * 0.04;
        const rotorDx = Math.cos(rotorAngle) * 14;
        const rotorDy = Math.sin(rotorAngle) * 3;

        g.fillStyle(COLORS.teal, 1);
        g.fillEllipse(x + hatShift, y - 28 + hatOffsetY, 28 * state.scaleX, 10 * state.scaleY);
        g.lineStyle(OUTLINE_W, COLORS.ink, 1);
        g.strokeEllipse(x + hatShift, y - 28 + hatOffsetY, 28 * state.scaleX, 10 * state.scaleY);
        g.beginPath();
        g.moveTo(x + hatShift, y - 38 + hatOffsetY);
        g.lineTo(x + hatShift, y - 26 + hatOffsetY);
        g.strokePath();
        g.beginPath();
        g.moveTo(x - rotorDx + hatShift, y - 38 + hatOffsetY - rotorDy);
        g.lineTo(x + rotorDx + hatShift, y - 38 + hatOffsetY + rotorDy);
        g.strokePath();
        g.lineStyle(2, COLORS.ink, 0.35);
        g.beginPath();
        g.moveTo(x - 10 + hatShift, y - 38 + hatOffsetY);
        g.lineTo(x + 10 + hatShift, y - 38 + hatOffsetY);
        g.strokePath();

        if (state.flash) {
          g.fillStyle(COLORS.white, 0.16);
          g.fillEllipse(x + hatShift, y - 28 + hatOffsetY, 30 * avgScale, 12 * avgScale);
        }
      }

      function drawBandit(g, state, time) {
        const rising = state.vy < -50;
        const falling = state.vy > 120;
        const hatOffsetY = rising ? -2 : falling ? 2 : 0;
        const coatFlare = rising ? 6 : falling ? -1 : 2;
        const eyeRadius = rising ? 6 : 5;
        const pupilRadius = rising ? 3 : 2.5;
        const moveIntent = clamp((state.vx || 0) / PLAYER_SPEED, -1, 1);
        const facing = moveIntent === 0 ? state.dir : moveIntent < 0 ? -1 : 1;
        const moveLean = moveIntent * 6;
        const headTilt = state.shooting ? -2 : facing * 0.5;
        const bodyLean = moveLean;
        const shoulderShift = moveLean * 0.55;
        const hipShift = moveLean * 0.25;
        const hatShift = moveLean * 0.7;
        const legSwing = moveLean * 0.35;
        const x = state.x;
        const y = state.y;
        const avgScale = (state.scaleX + state.scaleY) * 0.5;
        const sx = (value) => x + value * state.scaleX;
        const sy = (value) => y + value * state.scaleY;
        const strokePoly = (points, fillColor, alpha = 1, width = OUTLINE_W - 1) => {
          fillStrokePolygon(g, points, fillColor, alpha, COLORS.ink, width);
        };

        if (state.shield) {
          const pulse = 1 + Math.sin(time * 0.008) * 0.035;
          const shellW = 108 * avgScale * pulse;
          const shellH = 135 * avgScale * (1 - Math.sin(time * 0.008) * 0.02);
          const shellY = y - 2 * avgScale;
          g.fillStyle(0x64A0DC, 0.12);
          g.fillEllipse(x, shellY, shellW, shellH);
          g.lineStyle(3, 0xFFFFFF, 0.34);
          g.strokeEllipse(x, shellY, shellW, shellH);
          g.lineStyle(2, 0x64A0DC, 0.65);
          g.strokeEllipse(x, shellY, shellW - 6 * avgScale, shellH - 8 * avgScale);

          const glintOffset = Math.sin(time * 0.01) * 2;
          g.lineStyle(3, 0xFFFFFF, 0.42);
          g.beginPath();
          g.moveTo(x - 25 * avgScale, shellY - 34 * avgScale + glintOffset);
          g.lineTo(x - 12 * avgScale, shellY - 45 * avgScale + glintOffset);
          g.lineTo(x + 3 * avgScale, shellY - 38 * avgScale + glintOffset);
          g.strokePath();

          g.lineStyle(2, 0xFFFFFF, 0.24);
          g.beginPath();
          g.moveTo(x + 18 * avgScale, shellY + 26 * avgScale);
          g.lineTo(x + 29 * avgScale, shellY + 16 * avgScale);
          g.strokePath();
        }

        if (state.jetpack) {
          for (let i = 0; i < 4; i += 1) {
            g.fillStyle(COLORS.poncho, 0.2 + i * 0.08);
            g.fillCircle(sx(-6 + i * 4 - moveLean * 0.3), sy(34 + i * 7), (8 + i * 2) * avgScale);
          }
        }

        if (state.rocket) {
          g.fillStyle(COLORS.rust, 1);
          g.fillTriangle(sx(-10 - hipShift), sy(16), sx(-2 - hipShift), sy(2), sx(6 - hipShift), sy(16));
          g.lineStyle(2, COLORS.ink, 1);
          g.strokeTriangle(sx(-10 - hipShift), sy(16), sx(-2 - hipShift), sy(2), sx(6 - hipShift), sy(16));
          g.fillStyle(COLORS.gold, 0.7);
          g.fillCircle(sx(-2 - hipShift), sy(22), 6 * avgScale);
        }

        const coatTailLeft = [
          { x: sx(-16 + shoulderShift), y: sy(4) },
          { x: sx(-22 - coatFlare + hipShift * 0.25), y: sy(14) },
          { x: sx(-18 - coatFlare * 0.7 + legSwing * 0.4), y: sy(30) },
          { x: sx(-8 + hipShift), y: sy(26) },
          { x: sx(-6 + shoulderShift * 0.6), y: sy(8) }
        ];
        const coatTailRight = [
          { x: sx(14 + shoulderShift), y: sy(4) },
          { x: sx(22 + coatFlare + hipShift * 0.25), y: sy(15) },
          { x: sx(18 + coatFlare * 0.7 + legSwing * 0.4), y: sy(31) },
          { x: sx(7 + hipShift), y: sy(27) },
          { x: sx(6 + shoulderShift * 0.6), y: sy(7) }
        ];
        strokePoly(coatTailLeft, COLORS.charcoal, 1, OUTLINE_W - 2);
        strokePoly(coatTailRight, COLORS.charcoal, 1, OUTLINE_W - 2);

        const armLeft = [
          { x: sx(-17 + shoulderShift), y: sy(-2) },
          { x: sx(-24 + shoulderShift * 0.6), y: sy(7) },
          { x: sx(-20 + shoulderShift * 0.5), y: sy(16) },
          { x: sx(-11 + shoulderShift * 0.7), y: sy(12) },
          { x: sx(-10 + shoulderShift), y: sy(1) }
        ];
        const armRight = [
          { x: sx(16 + shoulderShift), y: sy(-2) },
          { x: sx(24 + shoulderShift * 0.6), y: sy(7) },
          { x: sx(20 + shoulderShift * 0.5), y: sy(16) },
          { x: sx(11 + shoulderShift * 0.7), y: sy(12) },
          { x: sx(10 + shoulderShift), y: sy(1) }
        ];
        strokePoly(armLeft, COLORS.charcoal, 1, OUTLINE_W - 2);
        strokePoly(armRight, COLORS.charcoal, 1, OUTLINE_W - 2);
        g.fillStyle(COLORS.tan, 1);
        g.fillCircle(sx(-22 + shoulderShift * 0.55), sy(15), 5 * avgScale);
        g.fillCircle(sx(22 + shoulderShift * 0.55), sy(15), 5 * avgScale);
        g.lineStyle(OUTLINE_W - 2, COLORS.ink, 1);
        g.strokeCircle(sx(-22 + shoulderShift * 0.55), sy(15), 5 * avgScale);
        g.strokeCircle(sx(22 + shoulderShift * 0.55), sy(15), 5 * avgScale);

        const bodyPoints = [
          { x: sx(-12 - coatFlare * 0.3 + shoulderShift), y: sy(-1) },
          { x: sx(-17 - coatFlare * 0.4 + shoulderShift * 0.55), y: sy(10) },
          { x: sx(-12 + hipShift), y: sy(24) },
          { x: sx(0 + hipShift), y: sy(30) },
          { x: sx(12 + hipShift), y: sy(24) },
          { x: sx(17 + coatFlare * 0.4 + shoulderShift * 0.55), y: sy(10) },
          { x: sx(12 + coatFlare * 0.3 + shoulderShift), y: sy(-1) },
          { x: sx(0 + shoulderShift * 0.3), y: sy(-13) }
        ];
        strokePoly(bodyPoints, COLORS.charcoal, 1, OUTLINE_W - 1);

        const ponchoPoints = [
          { x: sx(-9 + shoulderShift * 0.8), y: sy(2) },
          { x: sx(-13 + shoulderShift * 0.45), y: sy(12) },
          { x: sx(-8 + hipShift), y: sy(20) },
          { x: sx(0 + hipShift), y: sy(24) },
          { x: sx(8 + hipShift), y: sy(20) },
          { x: sx(13 + shoulderShift * 0.45), y: sy(12) },
          { x: sx(9 + shoulderShift * 0.8), y: sy(2) },
          { x: sx(0 + shoulderShift * 0.35), y: sy(-8) }
        ];
        strokePoly(ponchoPoints, COLORS.poncho);

        g.fillStyle(COLORS.tan, 1);
        g.fillEllipse(sx(0 + shoulderShift * 0.55), sy(-13 + headTilt), 25 * state.scaleX, 24 * state.scaleY);
        g.lineStyle(OUTLINE_W - 1, COLORS.ink, 1);
        g.strokeEllipse(sx(0 + shoulderShift * 0.55), sy(-13 + headTilt), 25 * state.scaleX, 24 * state.scaleY);

        const bandanaPoints = [
          { x: sx(-12 + shoulderShift * 0.55), y: sy(-8 + headTilt) },
          { x: sx(12 + shoulderShift * 0.55), y: sy(-8 + headTilt) },
          { x: sx(0 + shoulderShift * 0.8), y: sy(10) }
        ];
        strokePoly(bandanaPoints, COLORS.bandana, 1, OUTLINE_W - 1);
        g.lineStyle(2, COLORS.ink, 0.35);
        g.beginPath();
        g.moveTo(sx(-7 + shoulderShift * 0.7), sy(-1 + headTilt));
        g.lineTo(sx(0 + shoulderShift * 0.8), sy(4));
        g.lineTo(sx(7 + shoulderShift * 0.7), sy(-1 + headTilt));
        g.strokePath();
        g.beginPath();
        g.moveTo(sx(-3 + shoulderShift * 0.75), sy(3));
        g.lineTo(sx(3 + shoulderShift * 0.75), sy(0));
        g.strokePath();
        g.beginPath();
        g.moveTo(sx(-11 + shoulderShift * 0.65), sy(4));
        g.lineTo(sx(-16 + shoulderShift * 0.35), sy(8));
        g.strokePath();
        g.beginPath();
        g.moveTo(sx(11 + shoulderShift * 0.65), sy(4));
        g.lineTo(sx(16 + shoulderShift * 0.35), sy(8));
        g.strokePath();

        g.fillStyle(COLORS.white, 1);
        g.fillEllipse(sx(-5 + shoulderShift * 0.55), sy(-14 + headTilt), 8 * state.scaleX, eyeRadius * 2 * state.scaleY);
        g.fillEllipse(sx(7 + shoulderShift * 0.55), sy(-14 + headTilt), 8 * state.scaleX, eyeRadius * 2 * state.scaleY);
        g.fillStyle(COLORS.ink, 1);
        const pupilShift = facing * 3;
        g.fillCircle(sx(-5 + shoulderShift * 0.55 + pupilShift * 0.55), sy(-14 + headTilt), pupilRadius * avgScale);
        g.fillCircle(sx(7 + shoulderShift * 0.55 + pupilShift * 0.55), sy(-14 + headTilt), pupilRadius * avgScale);

        g.lineStyle(3, COLORS.ink, 1);
        if (falling) {
          g.beginPath();
          g.moveTo(sx(-10 + shoulderShift * 0.55), sy(-20 + headTilt));
          g.lineTo(sx(-1 + shoulderShift * 0.55), sy(-22 + headTilt));
          g.strokePath();
          g.beginPath();
          g.moveTo(sx(12 + shoulderShift * 0.55), sy(-22 + headTilt));
          g.lineTo(sx(3 + shoulderShift * 0.55), sy(-20 + headTilt));
          g.strokePath();
        } else {
          g.beginPath();
          g.moveTo(sx(-10 + shoulderShift * 0.55), sy(-21 + headTilt));
          g.lineTo(sx(-1 + shoulderShift * 0.55), sy(-19 + headTilt));
          g.strokePath();
          g.beginPath();
          g.moveTo(sx(12 + shoulderShift * 0.55), sy(-19 + headTilt));
          g.lineTo(sx(3 + shoulderShift * 0.55), sy(-21 + headTilt));
          g.strokePath();
        }

        g.lineStyle(2, COLORS.ink, 0.35);
        g.beginPath();
        g.moveTo(sx(-10 + shoulderShift * 0.55), sy(-9 + headTilt));
        g.lineTo(sx(10 + shoulderShift * 0.55), sy(-9 + headTilt));
        g.strokePath();

        if (state.propeller) {
          const rotorAngle = time * 0.04;
          const rotorDx = Math.cos(rotorAngle) * 14;
          const rotorDy = Math.sin(rotorAngle) * 3;
          g.fillStyle(COLORS.teal, 1);
          g.fillEllipse(sx(0 + hatShift), sy(-28 + hatOffsetY), 28 * state.scaleX, 10 * state.scaleY);
          g.lineStyle(OUTLINE_W, COLORS.ink, 1);
          g.strokeEllipse(sx(0 + hatShift), sy(-28 + hatOffsetY), 28 * state.scaleX, 10 * state.scaleY);
          g.beginPath();
          g.moveTo(sx(0 + hatShift), sy(-38 + hatOffsetY));
          g.lineTo(sx(0 + hatShift), sy(-26 + hatOffsetY));
          g.strokePath();
          g.beginPath();
          g.moveTo(sx(-rotorDx + hatShift), sy(-38 + hatOffsetY - rotorDy));
          g.lineTo(sx(rotorDx + hatShift), sy(-38 + hatOffsetY + rotorDy));
          g.strokePath();
          g.lineStyle(2, COLORS.ink, 0.35);
          g.beginPath();
          g.moveTo(sx(-10 + hatShift), sy(-38 + hatOffsetY));
          g.lineTo(sx(10 + hatShift), sy(-38 + hatOffsetY));
          g.strokePath();
        } else {
          const brim = [
            { x: sx(-23 + hatShift), y: sy(-30 + hatOffsetY) },
            { x: sx(-15 + hatShift), y: sy(-36 + hatOffsetY) },
            { x: sx(-2 + hatShift), y: sy(-38 + hatOffsetY) },
            { x: sx(11 + hatShift), y: sy(-36 + hatOffsetY) },
            { x: sx(24 + hatShift), y: sy(-29 + hatOffsetY) },
            { x: sx(18 + hatShift), y: sy(-24 + hatOffsetY) },
            { x: sx(1 + hatShift), y: sy(-22 + hatOffsetY) },
            { x: sx(-16 + hatShift), y: sy(-24 + hatOffsetY) }
          ];
          const crown = [
            { x: sx(-13 + hatShift), y: sy(-41 + hatOffsetY) },
            { x: sx(-10 + hatShift), y: sy(-48 + hatOffsetY) },
            { x: sx(-2 + hatShift), y: sy(-51 + hatOffsetY) },
            { x: sx(8 + hatShift), y: sy(-49 + hatOffsetY) },
            { x: sx(12 + hatShift), y: sy(-43 + hatOffsetY) },
            { x: sx(10 + hatShift), y: sy(-32 + hatOffsetY) },
            { x: sx(-10 + hatShift), y: sy(-32 + hatOffsetY) }
          ];
          strokePoly(brim, COLORS.hat);
          strokePoly(crown, COLORS.hat);
          g.lineStyle(3, COLORS.oldBrass, 1);
          g.beginPath();
          g.moveTo(sx(-11 + hatShift), sy(-33 + hatOffsetY));
          g.lineTo(sx(10 + hatShift), sy(-33 + hatOffsetY));
          g.strokePath();
          drawStar(g, sx(4 + hatShift), sy(-36 + hatOffsetY), 2 * avgScale, 5 * avgScale, 5, Math.PI / 2, COLORS.gold, COLORS.ink, 1);
          const feather = [
            { x: sx(-11 + hatShift), y: sy(-45 + hatOffsetY) },
            { x: sx(-18 + hatShift), y: sy(-54 + hatOffsetY) },
            { x: sx(-12 + hatShift), y: sy(-53 + hatOffsetY) },
            { x: sx(-7 + hatShift), y: sy(-43 + hatOffsetY) }
          ];
          strokePoly(feather, COLORS.tan, 1, 2);
        }

        g.fillStyle(COLORS.boots, 1);
        const legLeft = [
          { x: sx(-8 + hipShift), y: sy(20) },
          { x: sx(-13 + hipShift - legSwing * 0.35), y: sy(30) },
          { x: sx(-10 + hipShift - legSwing * 0.55), y: sy(36) },
          { x: sx(-1 + hipShift - legSwing * 0.2), y: sy(35) },
          { x: sx(1 + hipShift), y: sy(24) }
        ];
        const legRight = [
          { x: sx(8 + hipShift), y: sy(20) },
          { x: sx(13 + hipShift + legSwing * 0.35), y: sy(30) },
          { x: sx(10 + hipShift + legSwing * 0.55), y: sy(36) },
          { x: sx(1 + hipShift + legSwing * 0.2), y: sy(35) },
          { x: sx(-1 + hipShift), y: sy(24) }
        ];
        strokePoly(legLeft, COLORS.boots, 1, OUTLINE_W - 2);
        strokePoly(legRight, COLORS.boots, 1, OUTLINE_W - 2);
        const bootLeft = [
          { x: sx(-14 + hipShift - legSwing * 0.55), y: sy(34) },
          { x: sx(-17 + hipShift - legSwing * 0.7), y: sy(39) },
          { x: sx(-7 + hipShift - legSwing * 0.2), y: sy(39) },
          { x: sx(-4 + hipShift), y: sy(35) }
        ];
        const bootRight = [
          { x: sx(14 + hipShift + legSwing * 0.55), y: sy(34) },
          { x: sx(17 + hipShift + legSwing * 0.7), y: sy(39) },
          { x: sx(7 + hipShift + legSwing * 0.2), y: sy(39) },
          { x: sx(4 + hipShift), y: sy(35) }
        ];
        strokePoly(bootLeft, COLORS.boots, 1, OUTLINE_W - 2);
        strokePoly(bootRight, COLORS.boots, 1, OUTLINE_W - 2);

        g.lineStyle(3, COLORS.oldBrass, 1);
        g.beginPath();
        g.moveTo(sx(-12 + hipShift), sy(13));
        g.lineTo(sx(13 + hipShift), sy(13));
        g.strokePath();
        g.lineStyle(2, COLORS.gold, 0.8);
        g.beginPath();
        g.moveTo(sx(-8 + shoulderShift * 0.65), sy(8));
        g.lineTo(sx(7 + hipShift), sy(18));
        g.strokePath();
        for (let i = 0; i < 4; i += 1) {
          g.fillStyle(COLORS.gold, 1);
          g.fillCircle(sx(-5 + i * 4 + shoulderShift * 0.5), sy(10 + i * 2), 2.2 * avgScale);
        }

        g.fillStyle(COLORS.charcoal, 1);
        g.fillRect(sx(13 + shoulderShift * 0.6), sy(8), 8 * state.scaleX, 4 * state.scaleY);
        g.fillRect(sx(19 + shoulderShift * 0.7), sy(5), 7 * state.scaleX, 3 * state.scaleY);
        g.lineStyle(3, COLORS.ink, 1);
        g.strokeRect(sx(13 + shoulderShift * 0.6), sy(8), 8 * state.scaleX, 4 * state.scaleY);
        g.strokeRect(sx(19 + shoulderShift * 0.7), sy(5), 7 * state.scaleX, 3 * state.scaleY);

        if (state.shooting) {
          drawStar(g, sx(27 + shoulderShift * 0.7), sy(9), 2 * avgScale, 7 * avgScale, 4, Math.PI / 4, COLORS.gold, COLORS.gold, 1);
        }

        if (state.flash) {
          g.fillStyle(COLORS.white, 0.32);
          g.fillCircle(x, y, 30 * avgScale);
        }
      }

      function drawEnemy(g, enemy, time) {
        const flash = enemy.hitFlashUntil > time;
        const alpha = flash ? 0.65 : 1;

        if (enemy.type === "snake") {
          g.fillStyle(COLORS.tan, alpha);
          g.fillEllipse(enemy.x, enemy.y, 36, 18);
          g.fillEllipse(enemy.x + 8, enemy.y - 2, 22, 12);
          g.lineStyle(OUTLINE_W - 1, COLORS.ink, 1);
          g.strokeEllipse(enemy.x, enemy.y, 36, 18);
          g.strokeEllipse(enemy.x + 8, enemy.y - 2, 22, 12);
          g.beginPath();
          g.moveTo(enemy.x + 20, enemy.y - 3);
          g.lineTo(enemy.x + 30, enemy.y - 8);
          g.lineTo(enemy.x + 34, enemy.y - 3);
          g.strokePath();
          g.beginPath();
          g.moveTo(enemy.x + 22, enemy.y + 2);
          g.lineTo(enemy.x + 31, enemy.y + 2);
          g.lineTo(enemy.x + 35, enemy.y - 1);
          g.strokePath();
          g.fillStyle(COLORS.bandana, 1);
          g.fillRect(enemy.x - 18, enemy.y - 2, 8, 2);
        } else if (enemy.type === "vulture") {
          g.fillStyle(COLORS.charcoal, alpha);
          const wing = [
            { x: enemy.x - 30, y: enemy.y },
            { x: enemy.x - 12, y: enemy.y - 16 },
            { x: enemy.x, y: enemy.y - 4 },
            { x: enemy.x + 14, y: enemy.y - 16 },
            { x: enemy.x + 30, y: enemy.y },
            { x: enemy.x, y: enemy.y + 6 }
          ];
          fillStrokePolygon(g, wing, COLORS.charcoal, alpha, COLORS.ink, OUTLINE_W - 1);
          g.fillCircle(enemy.x + 2, enemy.y - 11, 4);
        } else if (enemy.type === "heavy") {
          g.fillStyle(COLORS.sheriff, alpha);
          g.fillRect(enemy.x - 16, enemy.y - 12, 32, 28);
          g.fillEllipse(enemy.x, enemy.y - 18, 36, 10);
          g.fillRect(enemy.x - 12, enemy.y - 26, 24, 11);
          g.lineStyle(OUTLINE_W - 1, COLORS.ink, 1);
          g.strokeRect(enemy.x - 16, enemy.y - 12, 32, 28);
          g.strokeEllipse(enemy.x, enemy.y - 18, 36, 10);
          g.strokeRect(enemy.x - 12, enemy.y - 26, 24, 11);
          drawStar(g, enemy.x, enemy.y - 1, 3, 7, 5, Math.PI / 2, COLORS.gold, COLORS.ink, 1);
          if (enemy.hp === 1) {
            g.lineStyle(3, COLORS.ink, 0.85);
            g.beginPath();
            g.moveTo(enemy.x - 10, enemy.y - 4);
            g.lineTo(enemy.x + 12, enemy.y + 8);
            g.strokePath();
            g.beginPath();
            g.moveTo(enemy.x + 4, enemy.y - 9);
            g.lineTo(enemy.x + 10, enemy.y - 1);
            g.strokePath();
          }
        } else {
          g.fillStyle(COLORS.ufo, alpha);
          g.fillEllipse(enemy.x, enemy.y - 2, 46, 22);
          g.fillRect(enemy.x - 12, enemy.y + 4, 24, 8);
          g.lineStyle(OUTLINE_W - 1, COLORS.ink, 1);
          g.strokeEllipse(enemy.x, enemy.y - 2, 46, 22);
          g.strokeRect(enemy.x - 12, enemy.y + 4, 24, 8);
          drawStar(g, enemy.x, enemy.y - 3, 2, 6, 5, Math.PI / 2, COLORS.gold, COLORS.ink, 1);
          if (enemy.beamActive) {
            const pulse = 0.15 + (0.5 + Math.sin(time * 0.01) * 0.5) * 0.3;
            g.fillStyle(COLORS.gold, pulse);
            g.fillTriangle(enemy.x - 10, enemy.y + 12, enemy.x + 10, enemy.y + 12, enemy.x, enemy.y + Ufo_BEAM_HEIGHT);
          }
        }
      }

      function drawBlackHole(g, hole) {
        g.fillStyle(COLORS.blackHole, 1);
        g.fillCircle(hole.x, hole.y, 20);
        g.lineStyle(3, 0x5028A0, 0.4);
        g.strokeCircle(hole.x, hole.y, 24);
        g.lineStyle(3, COLORS.ink, 0.9);
        for (let i = 0; i < 4; i += 1) {
          const a0 = hole.angle + i * 0.7;
          const a1 = a0 + 0.85;
          g.beginPath();
          g.moveTo(hole.x + Math.cos(a0) * (6 + i * 2), hole.y + Math.sin(a0) * (6 + i * 2));
          g.lineTo(hole.x + Math.cos(a1) * (10 + i * 2), hole.y + Math.sin(a1) * (10 + i * 2));
          g.strokePath();
        }
      }

      function drawSpringShape(g, x, y, scale = 1) {
        const w = 14 * scale;
        const h = 18 * scale;
        const topY = y - h / 2;
        const bottomY = y + h / 2;

        g.fillStyle(COLORS.gold, 1);
        g.fillRect(x - 10 * scale, topY - 4 * scale, 20 * scale, 5 * scale);
        g.lineStyle(3, COLORS.ink, 1);
        g.strokeRect(x - 10 * scale, topY - 4 * scale, 20 * scale, 5 * scale);

        g.lineStyle(3, COLORS.gold, 1);
        for (let i = 0; i < 4; i += 1) {
          const t0 = i / 4;
          const t1 = (i + 1) / 4;
          const y0 = Phaser.Math.Linear(topY, bottomY, t0);
          const y1 = Phaser.Math.Linear(topY, bottomY, t1);
          g.beginPath();
          g.moveTo(x - w / 2, y0);
          g.lineTo(x + w / 2, (y0 + y1) / 2);
          g.lineTo(x - w / 2, y1);
          g.strokePath();
        }

        g.lineStyle(2, COLORS.oldBrass, 0.9);
        g.beginPath();
        g.moveTo(x + w / 2, topY + 1 * scale);
        g.lineTo(x + w / 2, bottomY - 1 * scale);
        g.strokePath();
      }

      function drawPickup(g, pickup) {
        if (pickup.type === "spring") {
          drawSpringShape(g, pickup.x, pickup.y + 1, 1);
        } else if (pickup.type === "jetpack") {
          g.fillStyle(COLORS.oldBrass, 1);
          g.fillRect(pickup.x - 10, pickup.y - 12, 20, 24);
          g.fillRect(pickup.x - 14, pickup.y - 8, 4, 9);
          g.fillRect(pickup.x + 10, pickup.y - 8, 4, 9);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeRect(pickup.x - 10, pickup.y - 12, 20, 24);
        } else if (pickup.type === "rocket") {
          g.fillStyle(COLORS.rust, 1);
          g.fillTriangle(pickup.x, pickup.y - 14, pickup.x - 12, pickup.y + 12, pickup.x + 12, pickup.y + 12);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeTriangle(pickup.x, pickup.y - 14, pickup.x - 12, pickup.y + 12, pickup.x + 12, pickup.y + 12);
        } else if (pickup.type === "propeller") {
          g.fillStyle(COLORS.teal, 1);
          g.fillEllipse(pickup.x, pickup.y + 6, 22, 12);
          g.fillRect(pickup.x - 8, pickup.y + 1, 16, 7);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeEllipse(pickup.x, pickup.y + 6, 22, 12);
          g.strokeRect(pickup.x - 8, pickup.y + 1, 16, 7);
          g.beginPath();
          g.moveTo(pickup.x, pickup.y - 10);
          g.lineTo(pickup.x, pickup.y + 1);
          g.strokePath();
          g.beginPath();
          g.moveTo(pickup.x - 11, pickup.y - 10);
          g.lineTo(pickup.x + 11, pickup.y - 10);
          g.strokePath();
          g.beginPath();
          g.moveTo(pickup.x - 6, pickup.y - 7);
          g.lineTo(pickup.x + 6, pickup.y - 13);
          g.strokePath();
        } else if (pickup.type === "boots") {
          g.fillStyle(COLORS.gold, 1);
          g.fillRect(pickup.x - 12, pickup.y - 6, 10, 18);
          g.fillRect(pickup.x + 2, pickup.y - 6, 10, 18);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeRect(pickup.x - 12, pickup.y - 6, 10, 18);
          g.strokeRect(pickup.x + 2, pickup.y - 6, 10, 18);
        } else if (pickup.type === "shield") {
          g.fillStyle(0x64A0DC, 0.35);
          g.fillCircle(pickup.x, pickup.y, 16);
          g.lineStyle(3, COLORS.white, 0.9);
          g.strokeCircle(pickup.x, pickup.y, 16);
          drawStar(g, pickup.x, pickup.y, 3, 7, 5, Math.PI / 2, COLORS.white, COLORS.ink, 0.85);
        } else if (pickup.type === "repellent") {
          g.fillStyle(COLORS.cactus, 1);
          g.fillRect(pickup.x - 8, pickup.y - 12, 16, 24);
          g.fillRect(pickup.x - 3, pickup.y - 16, 6, 6);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeRect(pickup.x - 8, pickup.y - 12, 16, 24);
        }
      }

      function drawCollectible(g, item) {
        if (item.type === "gold") {
          const points = [
            { x: item.x - 6, y: item.y - 4 },
            { x: item.x - 2, y: item.y - 8 },
            { x: item.x + 6, y: item.y - 5 },
            { x: item.x + 7, y: item.y + 2 },
            { x: item.x + 1, y: item.y + 6 },
            { x: item.x - 7, y: item.y + 4 }
          ];
          fillStrokePolygon(g, points, COLORS.gold, 1, COLORS.ink, 3);
        } else {
          g.fillStyle(COLORS.silver, 1);
          g.fillCircle(item.x, item.y, 9);
          g.lineStyle(3, COLORS.ink, 1);
          g.strokeCircle(item.x, item.y, 9);
        }
      }

      function drawPellet(g, pellet) {
        pellet.trail.forEach((node, index) => {
          g.fillStyle(COLORS.charcoal, 0.16 - index * 0.04);
          g.fillCircle(node.x, node.y, 4 - index);
        });
        g.fillStyle(0x5A5A5A, 1);
        g.fillEllipse(pellet.x, pellet.y, 10, 5);
        g.lineStyle(2, COLORS.ink, 1);
        g.strokeEllipse(pellet.x, pellet.y, 10, 5);
      }

      function drawEffect(g, effect) {
        const alpha = clamp(effect.life / effect.maxLife, 0, 1);
        if (effect.type === "dust" || effect.type === "particle") {
          g.fillStyle(effect.color, alpha);
          g.fillCircle(effect.x, effect.y, effect.radius + (1 - alpha) * 4);
        } else if (effect.type === "ring") {
          const r = lerp(effect.endRadius, effect.radius, alpha);
          g.lineStyle(4, effect.color, alpha);
          g.strokeCircle(effect.x, effect.y, r);
        } else if (effect.type === "debris") {
          const hw = effect.w / 2;
          const hh = effect.h / 2;
          const c = Math.cos(effect.angle);
          const s = Math.sin(effect.angle);
          const points = [
            { x: effect.x + (-hw * c - -hh * s), y: effect.y + (-hw * s + -hh * c) },
            { x: effect.x + ( hw * c - -hh * s), y: effect.y + ( hw * s + -hh * c) },
            { x: effect.x + ( hw * c -  hh * s), y: effect.y + ( hw * s +  hh * c) },
            { x: effect.x + (-hw * c -  hh * s), y: effect.y + (-hw * s +  hh * c) }
          ];
          fillStrokePolygon(g, points, effect.color, alpha, COLORS.ink, 2);
        }
      }

      // ============================================================
      // Phaser bootstrap
      // ============================================================
      const IS_MOBILE = isTouchDevice();
      const game = new Phaser.Game({
        type: Phaser.AUTO,
        width: GAME_W,
        height: GAME_H,
        backgroundColor: CSS.parchment,
        parent: document.body,
        antialias: false,
        roundPixels: true,
        resolution: IS_MOBILE ? Math.min(window.devicePixelRatio || 1, 2) : 1,
        physics: {
          default: "arcade",
          arcade: {
            gravity: { y: GRAVITY },
            debug: false
          }
        },
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
          width: GAME_W,
          height: GAME_H
        },
        scene: [MenuScene, GameScene]
      });

      game.audioEngine = new AudioEngine();
    })();
  </script>
</body>
</html>
